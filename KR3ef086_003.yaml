body:
  text: 卷三奔豚氣病脈證并治第八師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之按篇中只有奔豚一證而吐膿驚怖火邪皆簡脫必有缺文師曰奔豚病從少腹起上衝咽喉發作欲死復還止皆從驚恐得之注奔豚者腎病也以其病從少腹上衝咽喉有如豚竄奔突之狀故名之也發作則腎氣上乘於心而欲死作已則氣衰復還於腎而止故其病雖有微甚不同然必皆從驚恐得之蓋驚傷心恐傷腎兩藏交病也水能勝火腎上凌心故治法宜瀉腎而補心也集注張從政曰驚者為自不知故也恐者為自知也周揚俊曰少陰脈循喉嚨因其所繫之經而上衝殊便也發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上至心灸其核上各一壯與桂枝加桂湯主之注此條與傷寒論同傷寒論中無發汗後三字而有太陽傷寒者加溫針必驚也十一字當從傷寒論為是蓋明所以致驚之由非一端即寒侵針處亦能為是病也夫太陽傷寒者加溫針必驚也謂病傷寒之人卒然加以溫針其心必驚非謂溫針之後必生驚病也燒針即溫針也燒針取汗亦汗法也針處宜當避寒若不知謹外被寒襲火鬱脈中血不流行所以有結核腫赤之患也夫溫針取汗其法亦為迅烈矣既針而營不奉行作解必其人素寒陰盛也故雖有溫針之火但發核赤又被寒侵故不但不解反召陰邪而加針之時心既驚虛所以腎水陰邪得上凌心陽而發奔豚也奔豚者腎水陰邪之氣從少腹上衝於心若豚之奔也先灸核上各一壯者外祛其寒邪繼與桂枝加桂湯者內伐其腎邪也集注周揚俊曰奔豚北方腎邪也燒針令汗縱不合法與少陰何與而作奔豚蓋太陽相表裏也針處被寒核起而赤吾知前此之邪未散而後此之邪復入惟桂能伐腎邪也所以用桂加入桂枝湯中一以外解風邪一以內泄陰氣也先灸核上者因寒而腫惟灸消之也桂枝加桂湯方桂枝五兩芍藥三兩甘草炙二兩生薑三兩大棗十二枚上五味以水七升微火煮取三升去滓溫服一升奔豚氣上衝胸腹痛往來寒熱奔豚湯主之注奔豚氣上衝咽喉發作欲死是奔豚之甚者也氣上衝胸腹痛往來寒熱是奔豚之微者也甚者以桂枝加桂湯從腎逐陰降逆也微者以奔豚湯從心調血散逆也奔豚湯方甘草芎藭當歸各二兩半夏四兩黃芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升上九味以水二斗煮取五升溫服一升日三夜一服集解沈明宗曰用芎歸白芍甘草調養厥陰少陽血氣之正而邪自外出以生葛黃芩半夏生薑佐李根解半表半裏之寒熱而逆可散蓋奔豚雖屬腎病然兼厥陰少陽之邪而發者有之仲景用此方明非僅寒邪一端致然也發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之注發汗後心下悸者心陽虛本經自病也臍下悸者腎邪乘虛上干心病也奔豚者臍下氣動而上衝也欲作奔豚者有似奔豚之狀而將作未作也茯苓桂枝甘草大棗湯所以補火土而伐水邪也上條發明外感寒邪能病奔豚此條更申明內有水氣亦能病奔豚也集注徐彬曰仲景論證每合數條以盡其變言奔豚由於驚又言其從少腹衝至咽喉又言其兼腹痛而往來寒熱又言其兼核起而無他病又言汗後臍下悸欲作奔豚而未成者其淺深瞭然用和解用伐腎用桂不用桂酌治微妙奔豚一證病因證治無復剩義苟不會仲景立方之意則峻藥畏用平劑寡效豈古方不宜於今哉周揚俊曰汗本心之液發汗而臍下病悸者心氣虛而腎氣動也茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩甘草炙二兩大棗十五枚上四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水三升置大盆內以杓揚之數千遍水上有珠子五六千顆相逐取用之集解程林曰汗後臍下悸者陽氣虛而腎邪上逆也臍下為腎氣發源之地茯苓泄水以伐腎邪桂枝行陽以散逆氣甘草大棗甘溫助脾土以制腎水煎用甘瀾水者揚之無力全無水性取其不助腎邪也胸痹心痛短氣病脈證并治第九師曰夫脈當取太過不及陽微陰弦即胸痹而痛所以然者責其極虛也今陽虛知在上焦所以胸痹心痛者以其陰弦故也注脈太過則病不及亦病故脈當取太過不及而候病也陽微寸口脈微也陽得陰脈為陽不及上焦陽虛也陰弦尺中脈弦也陰得陰脈為陰太過下焦陰實也凡陰實之邪皆得以上乘陽虛之胸所以病胸痹心痛胸痹之病輕者即今之胸滿重者即今之胸痛也集注李彣曰內經云胃脈平者不可見太過不及則病見矣寸脈為陽以候上焦正應胸中部分若陽脈不及而微則為陽虛主病上焦故受病胸痹尺脈太過而弦則為陰盛知在下焦故上逆而為痛也尤怡曰上焦為陽之位而微脈為虛之甚故曰責其極虛平人無寒熱短氣不足以息者實也注平人無病之人也無寒熱無表邪也平人無故而有短氣不足以息之證不可責其虛也此必邪在胸中痹而不通阻礙呼吸當責其實也集注李彣曰上節云責其極虛此又云實何也經云邪之所湊其氣必虛留而不去其病為實是也然短氣與少氣有辨少氣者氣少不足於言內經云言而微終日乃復言者此奪氣是也短氣者氣短不能相續似喘非喘若有氣上衝故似喘而不搖肩似呻吟而無痛是也尤怡曰平人素無疾之人也無寒熱無新邪也而乃短氣不足以息當是裏氣因邪而實或痰或食或飲礙其升降之氣而然也胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白白酒湯主之注寸口脈沉而遲沉則為裏氣滯遲則為藏內寒主上焦藏寒氣滯也關上小緊而疾小為陽虛緊疾寒痛是主中焦氣急寒痛也胸背者心肺之宮城也陽氣一虛諸寒陰邪得以乘之則胸背之氣痹而不通輕者病滿重者病痛理之必然也喘息咳唾短氣證之必有也主之以栝蔞薤白白酒湯者用辛以開胸痹用溫以行陽氣也集注趙良曰凡寒濁之邪滯於上焦則阻其上下往來之氣塞其前後陰陽之位遂令為喘息為咳唾為痛為短氣也程林曰胸中者心肺之分故作喘息咳唾也諸陽受氣於胸而轉行於背氣痹不行則胸背為痛而氣為短也栝簍薤白白酒湯方栝蔞實搗一枚薤白半斤白酒七升上三味同煮取二升分溫再服胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之注上條胸痹胸背痛尚能臥以痛微而氣不逆也此條心痛徹背不得臥是痛甚而氣上逆也故仍用前方大加半夏以降逆也集注尤怡曰胸痹不得臥是胸中痛甚肺氣上而不下也心痛徹背是氣閉塞而前後不通故也其痹為尤甚矣所以然者有痰飲以為之援也栝蔞薤白半夏湯方栝蔞實搗一枚薤白三兩半夏半升白酒一斗上四味同煮取四升溫服一升日三服集解魏荔彤曰用半夏之苦以開鬱行氣痛甚則結甚故減薤白之濕用半夏之燥更能使膠膩之物隨湯而蕩滌也日三服亦從上治者應徐取頻服也心痛徹背背痛徹心烏頭赤石脂圓主之注上條心痛徹背尚有休止之時故以栝蔞薤白白酒加半夏湯平劑治之此條心痛徹背背痛徹心是連連痛而不休則為陰寒邪甚浸浸乎陽光欲熄非薤白白酒之所能治也故以烏頭赤石脂九主之方中烏附椒薑一派大辛大熱別無他顧峻逐陰邪而已集注李彣曰心痛在內而徹背則內而達於外矣背痛在外而徹心則外而入於內矣故既有附子之溫而復用烏頭之迅佐乾薑行陽大散其寒佐蜀椒下氣大開其鬱恐過於大散大開故復佐赤石脂入心以固澀而收陽氣也赤石脂圓方蜀椒一兩一法二分烏頭炮一分附子炮半兩一法一分赤石脂一兩一法二分乾薑一兩一法一分上五味末之蜜丸如桐子大先食服一丸日三服不知稍加服胸痹緩急者薏苡附子散主之注緩急者謂胸痹痛而時緩時急也當審其緩急而施治若緩而不急者以栝蔞薤白白酒湯主之今時緩時急故以薏苡附子散急通痹氣以迅掃陰邪也薏苡附子散方薏苡仁十五兩大附子炮十枚上二味杵為散服方寸匕日三服集解李彣曰緩急者或緩而痛暫止或急而痛復作也薏苡仁入肺利氣附子溫中行陽為散服則其效更速矣魏荔彤曰薏苡下氣寬胸附子溫中散邪為邪盛甚而陽微亦甚者立法也胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之注胸痹胸中急痛胸痹之重者也胸中氣塞胸痹之輕者也胸為氣海一有其隙若陽邪干之則化火火性氣開不病痹也若陰邪干之則化水水性氣闔故令胸中氣塞短氣不足以息而為胸痹也水盛氣者則息促主以茯苓杏仁甘草湯以利其水水利則氣順矣氣盛水者則痞塞主以橘皮枳實生薑湯以開其氣氣開則痹通矣集注沈明宗曰邪氣阻塞胸膈肺氣不得往來流利則胸中氣塞短氣方用杏仁使肺氣下通以茯苓導引濕下行甘草和中俾邪去則痹開而氣不短矣然胸痹乃胸中氣塞土濕寒濁陰氣以挾外邪上逆所致故橘枳生薑善於散邪下濁所以亦主之魏荔彤曰此證乃邪實而正不甚虛陽微而陰不甚盛蓋痹則氣必塞氣塞則必短氣前言之矣今開降其氣而諸證自除矣茯苓杏仁甘草湯方茯苓三兩杏仁五十個甘草一兩上三味以水一斗煮取五升溫服一升日三服不瘥更服橘皮枳實生薑湯方橘皮一斤枳實三兩生薑半斤上三味以水五升煎取二升分溫再服胸痹心中痞氣氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之注心中即心下也胸痹病心下痞氣悶而不通者虛也若不在心下而氣結在胸胸滿連脅下氣逆撞心者實也實者用枳實薤白桂枝湯主之倍用枳朴者是以破氣降逆為主也虛者用人參湯主之即理中湯是以溫中補氣為主也由此可知痛有補法塞因塞用之義也集注魏荔彤曰胸痹自是陽微陰盛矣心中痞氣氣結在胸正胸痹之病狀也再連脅下之氣俱逆而搶心則痰飲水氣俱乘陰寒之邪動而上逆胸胃之陽氣全難支拒矣故用枳實薤白桂枝湯行陽開鬱溫中降氣猶必先後煮治以融和其氣味俾緩緩蕩除其結聚之邪也再或虛寒已甚無敢恣為開破者故人參湯亦主之以溫補其陽使正氣旺而邪氣自消也尤怡曰心中痞氣氣痹而成痞也脅下逆搶心氣逆不降將為中之害也用此二方者一以去邪之實即以安正一以養陽之虛即以逐陰是在審其病之新久與氣之虛實而決之枳實薤白桂枝湯方枳實四枚厚朴四兩薤白半斤桂枝一兩栝蔞實搗一枚上五味以水五升先煮枳實厚朴取三升去滓內諸藥煮數沸分溫三服人參湯方人參甘草乾薑白朮各三兩上四味以水八升煮取三升溫服一升日三服心中痞諸逆心懸痛桂枝生薑枳實湯主之注心中痞即上條心中痞氣也諸逆諸氣上逆也上條之逆不過撞心而不痛此條之逆則心懸而空痛如空中懸物動搖而痛也用桂枝生薑枳實湯通陽氣破逆氣痛止痞開矣集注程林曰諸逆如脅下逆搶心之類邪氣獨留於上則心懸痛尤怡曰諸逆該痰飲客氣而言心懸痛謂如懸物動搖而痛逆氣使然也桂枝生薑枳實湯方桂枝三兩生薑三兩枳實五枚上三味以水六升煮取三升分溫三服集解趙良曰枳實生薑原以治氣塞況於痞乎故較前條稍減輕分兩使痞者下其氣以開之懸痛屬飲者得生薑以散之既足建功矣乃去橘皮而用桂枝者以所逆非一或通陽氣或破結氣或散寒氣皆能去痹也腹滿寒疝宿食病脈證并治第十跗陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之注跗陽胃脈也當緩而和今見弦脈是肝脈也肝脈見於脾部是木盛土虛也法當腹滿今不腹滿者肝脈微弦不盛而脾不虛故脾未受病也肝自鬱則失其條達之性必本經自病故便難兩胠痛也然非肝火實病此乃虛寒從下上也當以溫藥服之腹滿時減復如故此為寒當與溫藥按此篇無治虛寒腹滿之方當與溫藥之下當有宜厚朴生薑甘草半夏人參湯主之十四字必是脫簡閲傷寒論太陰篇自知注此承上條互詳其證以明其治也腹滿便難脾實病也今腹滿而不便難脾虛病也且腹滿有時而減有時復如不滿乃虛寒也當與溫藥主之以厚朴生薑甘草半夏人參湯消滿散寒緩中降逆補虛乃治虛滿之法也集注魏荔彤曰腹滿或服下藥或服補藥有時減退未幾旋腹滿如故則不可作實與熱治也仲景明此為寒裏寒從無下法惟有溫藥與服虛者以溫中補氣實者亦以溫中行氣為義是治氣寒腹滿第一善法也厚朴生薑甘草半夏人參湯方厚朴半斤生薑半斤半夏半斤人參一兩甘草炙三兩上五味以水一斗煮取三升去滓溫服一升日三服腹滿不減減不足言當須下之宜大承氣湯注腹滿時減時滿虛滿也腹滿常常而滿實滿也腹滿不減減不足言謂腹滿不減雖減不過稍減不足言減也虛滿當溫實滿當下故宜大承氣湯下之此治實滿之法也集注尤怡曰減不足言謂雖減而不足云減所以形其滿之至也故宜大下所謂中滿者瀉之於內也大承氣湯方見前痙病中病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去注前條腹滿以時減時不減別虛實此條腹滿以痛不痛辨有餘不足也腹滿按之不痛為虛虛者脾虛也可溫之則當與厚朴生薑甘草半夏人參湯也按而痛者為實實者胃實也可下之當與大承氣湯胃實者舌苔必黃若未下者下之黃苔自去也集注趙良曰腹滿亦有屬實實則非虛寒也明矣豈概以溫藥治之乎故有試之之法在痛與不痛之分虛實較然矣蓋胃實必熱熱蒸必舌黃下其實熱舌黃不自已乎有此一辨并虛者愈審已魏荔彤曰無形之虛氣作痞塞則按之無物何痛之有倘挾有形之實物為患如宿食在胃疝氣在少腹等是也按之有物阻礙於藏府之側焉有不痛者乎是於按之痛否以決其虛實之法也病者痿黃躁而不渴胸中寒實而利不止者死按躁而不渴當是燥而不渴文始通順胸中寒實當是胃中寒實若是胸中寒實如何曰下利不止者死皆是傳寫之訛注病者面色痿黃若口燥而渴者熱實也今痿黃口燥不渴寒實也寒實者當不下利若下利是寒虛也今下利不止乃寒虛胃氣下脫故死也集注程林曰痿黃者脾胃病也見燥而渴者為熱不渴者為寒病人既痿黃又兼下利不禁則脾氣衰絶故死李彣曰下利若燥而渴者為熱陽氣尚存猶為可治今燥而不渴胃中寒邪盛也若利不止則陰盛陽衰氣下脫矣故死夫瘦人繞臍痛必有風冷穀氣不行而反下之其氣必衝不衝者心下則痞注此承上條寒實證誤以寒藥下之之義也瘦人形氣虛弱難禦外邪若繞臍痛必有風冷傷胃致令穀氣不行也繞臍疼痛雖屬實邪但因風冷則為寒實醫者當溫而行之今反以寒藥下之其風冷之邪若上虛則氣上衝中虛則痞結心下理必然也集注尤怡曰瘦人藏虛氣弱風冷易入入則穀氣留滯不行繞臍疼痛有似裏實而實為虛冷是宜溫藥以助脾之行乃反下之穀出而風冷不與俱出正乃益虛邪乃無制勢必上衝若不衝者心下則痞寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也注此詳申首條兩胠疼痛屬寒之義也寸口脈弦即首條之弦也脅下拘急而痛即首條之兩胠疼痛也何以知其為寒也然必其人有陽虛嗇嗇惡寒之證始為肝寒而痛也即有腹滿亦當溫之可也集注程林曰弦肝脈陰也肝脈循脅裏寒主收引故脅下拘急而痛以寒勝於內而陽氣不行於外故外亦嗇嗇而惡寒也夫中寒家喜缺其人清涕出發熱色和者善嚏注中寒家謂素有中寒病之人也前以時減辨腹滿之中寒又以惡寒辨脅痛之中寒此以喜缺清涕出而辨心胸之中寒也缺者呵缺也夫人欲睡喜缺者陰引陽入也睡覺喜缺者陽引陰出也今中寒喜缺者是陰盛引陽也年老之人清涕出者是陽虛也遇寒之人清涕出者是寒盛也今中寒而清涕出者是陽氣虛寒也若發熱色和者非為中寒也乃為外寒所搏雖有清涕出亦因善嚏而出也中寒其人下利以裏虛也欲嚏不能此人肚中寒一云痛注上條以喜缺清涕自出辨心胸之中寒此條以下利欲嚏不能嚏而辨腹中寒也其人下利裏氣素虛也欲嚏不能嚏何以知此人腹中寒也蓋噴嚏者雷氣之義也其人內陽外陰陽氣奮發而為嚏也今欲嚏不能嚏是陽欲出而復留陰氣盛也故知腹中寒也集注沈明宗曰此脾經受寒現證也寒中太陰陰寒濕盛陽虛不固其人下利但通多不足故為裏虛蓋陽和則嚏而欲嚏不能乃陰寒凝滯於裏所以肚中病也腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之注腹中切痛寒也腹中雷鳴氣腹中寒氣故雷鳴切痛而胸脅逆滿者腸胃之外寒氣為之也腹痛雷鳴嘔吐者腸胃之中寒氣為之也主之以附子粳米湯勝寒氣和內外此治腹中寒之法也附子粳米湯方附子炮一枚半夏半升甘草一兩大棗十枚粳米半升上五味以水八升煮米熟湯成去滓溫服一升日三服心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛不可觸近大建中湯主之注心胸中大寒痛謂腹中上連心胸大痛也而名大寒痛者以有厥逆脈伏等大寒證之意也嘔逆不能飲食者是寒甚拒格於中也上衝皮起出見頭足者是寒甚聚堅於外也上下痛不可觸近是內而藏府外而經絡痛之甚亦由寒之甚也主之以大建中湯蜀椒乾薑大散寒邪人參膠飴大建中虛服後溫覆令有微汗則寒去而痛止此治心胸中寒之法也大建中湯方蜀椒去汗二合乾薑四兩人參二兩上三味以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一爨頃可飲粥二升後更服當一日食糜溫覆之寒氣厥逆赤丸主之按此條之文之方必有簡脫難以為後世法不釋赤丸方茯苓四兩半夏洗四兩一方用桂烏頭炮二兩細辛一兩上四味末之真朱為色煉丸丸如麻子大先食酒飲下三丸日再夜一服不知稍增之以知為度痛而閉者厚朴三物湯主之注腹滿而痛下利者用理中湯所以溫其中也腹滿而痛便閉者用厚朴三物湯所以開其下也厚朴三物湯方厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度其脈數而緊乃弦狀如弓弦按之不移脈弦數者當下其寒脈緊大而遲者必心下堅脈大而緊者陽中有陰可下之按其脈數而緊乃弦狀如弓弦按之不移脈弦數者之十九字當是衍文閲傷寒論辨脈法自知當下其寒之四字當在必心下堅之下文義始屬注脈緊大而遲者必心下堅硬乃寒實也當下其寒脈大而緊者陽中有陰也大者陽實緊者陰實也故可下之脅下偏痛發熱其脈緊弦此寒也宜溫藥下之以大黃附子湯按脅下偏痛之偏字當是滿字必是傳寫之訛注腹滿而痛脾實邪也脅下滿痛肝實邪也發熱若脈數大胃熱實邪也今脈緊弦脾寒實邪也當以溫藥下之故以大黃附子湯下其寒實方中佐細辛者以散其肝邪此下肝脾寒實之法也集注尤怡曰脅中滿痛而脈緊弦陰寒成聚也雖有發熱亦是陽氣被鬱所致是以非溫不能已其寒非下不能去其結故曰宜以溫藥下之大黃附子湯方大黃三兩附子炮三枚細辛二兩上三味以水五升煮取二升分溫三服若强人煮取二升半分溫三服服後如人行四五里進一服病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之注病腹滿裏證也發熱裏熱也然十日脈浮而數表熱亦未已也飲食如故胃熱能消穀也因胃熱裏實表熱發熱故用厚朴七物湯表裏均解腹滿發熱兩除也此桂枝湯小承氣湯之復方也集注程林曰腹滿者內有實熱也十日脈尚浮而數浮為在表表熱邪未已故發熱數為在裏裏熱能消穀故飲食如故與此方蕩腹滿而除表熱夫表裏俱實當先解表乃可攻裏今表邪微而裏邪甚故用承氣桂枝二湯相合以和表裏如傷寒之用大柴胡此其義也厚朴七物湯方厚朴半斤甘草三兩大黃二兩大棗十枚枳實五枚桂枝二兩生薑五兩上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤按之心下滿痛者此為實也當下之宜大柴胡湯按按之心下滿痛之下當有有潮熱之三字若無此三字則不當與大柴胡湯是必傳寫之遺注按之心下滿痛有潮熱者此為表裏俱實當下之宜大柴胡湯兩解之此二治皆下實滿之法也大柴胡湯方柴胡半斤黃芩三兩芍藥三兩半夏洗半斤枳實炙四枚大黃二兩大棗十二枚生薑五兩上八味以水一斗二升煮取六升去滓再煎溫服一升日三服腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝繞臍痛苦發則白汗出手足厥冷其脈沉緊者大烏頭煎主之按此條脈重出下條有證無脈其脈沉緊者之五字當在下條裏急之下然脈弦而緊是徑急之甚當屬寒疝之重者其白汗之白字當是自字下條其脈沉緊是裏痛之脈當屬寒疝之輕者必是傳寫之訛注疝病犯寒即發故謂之寒疝也其病發則繞臍少腹急痛惡寒汗出手足厥冷不欲飲食脈弦而緊主急主痛此寒疝應有之證脈也主之烏頭煎者是專以破邪治標為急虛實在所不論故曰强人服七合弱人服五合也烏頭煎方烏頭熬去皮不㕮咀大者五枚上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升强人服七合弱人服五合不瘥明日更服不可一日再服寒疝腹中痛及脅痛裏急者當歸生薑羊肉湯主之按脅痛裏急之下當有上條其脈沉緊四字注寒疝腹中痛及脅痛裏急脈見沉緊較之繞臍苦痛輕矣且無惡寒汗出手足厥冷故不用烏頭煎之大溫大散而用當歸生薑羊肉湯養正為本散寒為次此治寒疝之和劑也服烏頭煎病勢退者亦當與之集注李彣曰疝屬肝病肝藏血其經布脅肋腹脅并痛者血氣寒而凝澀也當歸通經活血生薑溫中散寒裏急者內虛也用羊肉補之內經云形不足者溫之以氣精不足者補之以味是也沈明宗曰按此連衝脈為疝治當溫補也肝木受邪乘脾則腹中痛本經之氣不舒故脅亦痛連及衝脈則裏急矣所以當歸補養衝任而散風寒羊肉溫補營衛之氣脾邪散而痛自止方後云痛而多嘔乃肝氣上逆臨胃故加橘朮補之當歸生薑羊肉湯方當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之按抵當二字衍文也注寒疝腹中痛逆冷手足不仁身體疼痛此疝之寒重者也灸刺諸藥不能取效則急以烏頭煎加桂枝湯五合以解內外之盛寒也集注徐彬曰起於寒疝腹痛而至逆冷手足不仁則陽氣大痹加以身疼痛營衛俱不和更灸刺諸藥不能治是或攻其外或攻其內邪氣牽制不服也故以烏頭攻寒為主而合桂枝全湯以和營衛所謂七分治裏三分治表也烏頭桂枝湯方烏頭上一味以蜜二斤煎減半去滓以桂枝湯五合解之令得一升初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病方解以桂枝湯五合解之者溶化也令得一升謂以烏頭所煎之蜜五合加桂枝湯五合溶化令得一升也不知不效也又不知又不效也其知者已效也如醉狀外寒方散得吐者內寒已伸故為中病也問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食大承氣湯主之按尺中亦微而澀之微字當按傷寒論作大字是注宿食病即今之傷食病也謂食隔宿不化也人病腹滿而痛何以別之為宿食也寸口脈浮而大按之反澀謂按且大且澀且有力也關上尺中亦然大澀有力為實而不利故知有宿食也當下之宜大承氣湯脈數而滑者實也此有宿食下之愈宜大承氣湯注腹滿而痛脈數而滑者實也此有宿食故當下之集注李彣曰滑者水穀之氣勝也若滑而兼數則實熱已入胃府矣故云有宿食可下之下利不欲食者有宿食也當下之宜大承氣湯注初下利不欲食者是傷食惡食不欲食也久下利不欲食者是傷脾不能食也今初下利即不欲食以有宿食故也當下之宜大承氣湯無疑矣集注沈明宗曰此傷食而致下利也驟傷宿食停滯胃中壅遏升降之機不轉腸中水穀不分而下奔則利宿食在胃故不欲食必當攻去宿食利得止而欲食故宜大承氣湯宿食在上脘當吐之宜瓜蒂散注胃有三脘宿食在上脘者隔間痛而吐可吐不可下也在中脘者心中痛而吐或痛不吐可吐可下也在下脘者臍上痛而不吐不可吐可下也今食在上脘故當以瓜蒂散吐之也瓜蒂散方瓜蒂熬黃一分赤小豆煮一分上二味杵為散以香豉七合煮取汁和散一錢匕溫服之不吐者少加之以快吐為度而止亡血及虛者不可與之脈緊如轉索無常者有宿食也注轉索無常緊脈之狀也若浮緊傷寒沉緊冷痛冷犯胃脘穀氣不行故曰有宿食也脈緊頭痛風寒腹中有宿食不化也一云寸口脈緊注脈緊頭痛是外傷風寒病也脈緊腹痛是內傷宿食病也集注李彣曰按此脈與證似傷寒而非傷寒者以身不疼腰脊不强故也然脈緊亦有辨浮而緊者為傷寒沉而緊者為傷食甲乙經曰人迎緊甚傷於寒氣口緊甚傷於食則寒與食又以左右手為辨已是以知腹中有宿食不化也五藏風寒積聚病脈證并治第十一肺中風者口燥而喘身運而重冒而腫脹按身運而重當是頭運而身重冒而腫脹當是冒風而腫脹始與文義相合此必傳寫之訛可知注肺主氣外合皮毛肺中風邪風傷氣則津結不行故口燥風傷肺則氣逆上壅故喘咳頭運而身重者氣傷而力乏也冒風而腫脹者皮傷風水也集注李彣曰肺主氣風邪中之則氣壅而津液不行故口燥氣逆而呼吸不利故氣喘也肺中寒吐濁涕注肺中寒邪胸中之陽氣不治則津液聚而不行故吐濁涎如涕也集注李彣曰五液入肺為涕肺合皮毛開竅於鼻寒邪從皮毛而入於肺則肺竅不利而鼻塞涕唾濁涎壅遏不通吐出於口也肺死藏浮之虛按之弱如蔥葉下無根者死注肺中風寒之邪脈若見浮之極虛按之弱如蔥葉之空下無根者乃肺藏之死脈也以下五藏俱言浮者是明外中之邪應得之脈也集注程林曰真肺脈至如以毛羽中人膚非浮之虛乎蔥葉中空按之弱如蔥葉下又無根則浮毛虛弱是無胃氣也此真藏已見故死肝中風者頭目瞤兩脅痛行常傴令人嗜甘注肝主風外合於筋肝中風邪風勝則動故頭目瞤動也兩脅肝之部肝受病故兩脅痛也風傷筋故行常傴僂也肝苦急欲甘緩之故令人嗜甘也集注徐彬曰高巔之上惟風可到風性動搖故頭目瞤動肝脈上貫膈今脅肋有邪故痛肝主筋風勝則筋急故傴人以脾胃為主木邪甚而土負甘益脾嗜甘所以自救也肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也按兩臂不舉舌本燥二句而汗出三字文義不屬必是錯簡不釋注肝性條達氣行於胸側肝中寒邪故有氣抑不伸喜太息氣滯不行痛不得轉側也食則吐亦寒邪上逆也肝死藏浮之弱按之如索不來或曲如蛇行者死注肝中風寒之邪若脈見浮之極弱按之不弦是失其肝之本脈也今按之如索不來曲如蛇行而去夫索曲蛇行去而不來非皆肝藏之死脈乎集注周揚俊曰按之如索則弦緊俱見脈有來去乃陰陽往復之理今曰不來但去是無胃氣也否則真氣將散出入强勉有委而不前屈且難伸之狀故曲如蛇行也肝著其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之按旋覆花湯主之六字與肝著之病不合當是衍文注肝著者為肝氣著而不行致胸痞塞不快也故其人常欲按摩其胸以疏通其氣也其先未曾痞塞苦時但欲飲熱者乃寒氣為病也集注李彣曰肝主疏泄著則氣鬱不伸常欲人蹈其胸上以舒其氣又以寒氣固結於中欲飲熱以勝其寒也心中風者翕翕發熱不能起心中飢食即嘔吐按翕翕發熱中風之本證也不能起心中飢食即嘔吐文義不屬必是錯簡不釋心中寒者其人苦病心如噉蒜狀劇者心痛徹背背痛徹心譬如蠱注其脈浮者自吐乃愈注其人苦病心如噉蒜狀謂辛辣刺心之狀也劇者心痛徹背背痛徹心謂心背相應而痛也譬如蠱注謂似蟲之往來不已而痛也此皆心中寒邪之證若其脈浮是心得本脈為寒邪上越之候故自吐則邪去乃愈也集注徐彬曰寒則為陰邪外束之則火內鬱故如噉蒜狀其似辣而非痛也劇則邪盛故外攻背痛內攻心痛徹者相應也譬如蠱注狀其綿綿不息若脈浮是邪未結故自吐而愈心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心藏傷所致也按其脈弦之弦字當是沉字沉為腎脈文義相屬必是傳寫之訛注心傷者謂心傷病之人也因其人勞倦則擾其心心之陽盛於上故頭面赤也上盛則下虛故下重而無力也心中痛自煩發熱當臍跳其脈沉腎乘心傷之所致也集注尤怡曰心傷者其人勞倦即頭面赤而下重蓋心虛者其陽易浮上盛者其下必虛也心中痛而自煩發熱者心虛失養而熱動於中也當臍跳者心虛於上而腎動於下也邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲陽氣衰者為狂按陰氣衰者為癲之癲字當是狂字陽氣衰者為狂之狂字當是癲字內經曰重陰者癲重陽者狂必是傳寫之訛注邪哭謂心傷之人無故而哭也邪哭則使人魂魄不安心之血氣少也血氣少而心虛則令人畏合目欲眠則夢遠行此是精神離散魂魄妄行也心之血陰也陰過衰則陽盛陽盛則為病狂也心之氣陽也陽過衰則陰盛陰盛則病癲也心死藏浮之實如丸豆按之益躁疾者死注心中風寒之邪若脈見浮之極實如丸豆之狀按之益徑躁疾亂動者乃心藏之死脈也集注李彣曰難經云心脈浮大而散若浮之實如麻豆按之益躁疾則真藏脈見胃氣全無故死內經云真心脈至堅而搏如尋薏苡子纍纍然即如麻豆意可與此同參脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣按脾缺中寒之文必是簡脫注脾中風邪翕翕發熱中風之本證也形如醉人亦風熱攘亂於中應有之證也腹中不快而煩身體懈惰而重皮目瞤瞤動而氣短皆脾經證也集注李彣曰風屬陽邪而氣疏泄形如醉人言其面赤而四肢軟也風氣內擾故腹中煩重皮目上下眼胞也脾死藏浮之大堅按之如覆杯潔潔狀如搖者死注脾中風寒之邪若脈見浮之大堅失其和緩按之狀如覆杯高章明潔有力如搖乃脾藏之死脈也集注李彣曰脈弱以滑是有胃氣浮之大堅則胃氣絶真藏脈見矣覆杯則內空潔潔者空而無有之象也狀如搖者脈躁疾不寧氣將散也故死跗陽脈浮而澀浮則胃氣强澀則小便數浮澀相搏大便則堅其脾為約麻子仁丸主之按此條當在腹滿篇中便難之下必是錯簡在此注跗陽胃脈也若脈澀而不浮脾陰虛也則胃氣亦不强不堪下矣今脈浮而澀胃陽實也則為胃氣强脾陰亦虛也脾陰虛不能為胃上輸精氣水獨下行故小便數也胃氣强約束其脾不化津液故大便難也以麻仁丸主之養液潤燥清熱通幽不敢恣行承氣者蓋因脈澀終是虛邪也集注徐彬曰脾約病用丸不作湯者取其緩以開結不敢驟傷元氣也要知人至脾約皆因元氣不充津液不到所致耳李彣曰跗陽胃脈也胃為水穀之海浮為陽脈故胃氣强而能食小便數則津液亡故脈澀蓋脾主為胃行津液此以胃强脾弱約束津液不能四布但輸膀胱致小便數而大便堅也麻子仁丸通幽潤燥麻子仁丸方麻子仁二升芍藥半斤枳實一斤大黃一斤厚朴一尺杏仁一升上六味末之煉蜜為丸梧子大飲服十丸日三以知為度腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣裏冷濕久久得之腰以下冷痛腹重如帶五千錢甘薑苓朮湯主之按腎缺中風中寒二條必是簡脫注腎著者謂腎為寒濕所傷著而不行之為病也腎受寒濕故體重腰冷如坐水中雖形如水腫之狀反不渴而小便自利非水也乃濕也飲食如故以病屬下焦腎而不屬中焦脾故也詢其所以得之之由身勞汗出衣裏冷濕久久傷之也是以腰下冷痛寒勝也腹重濕勝也如帶五千錢形容重著之甚也以甘薑苓朮湯補上以制水散寒以滲濕也集注尤怡曰其病不在腎之中藏而在腎之外府故其治不在溫腎以散寒而在燠土以勝水也甘草乾薑茯苓白朮湯方甘草二兩白朮二兩乾薑四兩茯苓四兩上四味以水五升煮取三升分溫三服腰中即溫腎死藏浮之堅按之亂如轉丸益下入尺中者死注腎中風寒之邪若見浮之極堅按之亂動有如轉丸及下入尺中通然亂動皆腎死真藏之脈也集注程林曰腎藏死浮之堅與內經辟辟如彈石曰腎死同意皆堅之象也按之則亂如轉丸下入尺中者此陰陽離決之狀也故死以上真藏與內經互有異同總之脈無胃氣現於三部中脈象形容不一也問曰三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消穀故能噫耳下焦竭即遺尿失便其氣不和不能自禁制不須治久則愈注三焦竭部者謂三焦因虛竭而不各歸其部不相為用也上焦受氣於中焦下焦生氣於中焦互相為用則為和也若中焦虛竭不能消化水穀穀氣不受則上焦不相為用而失和也失和則穀氣鬱而不宣故善噫也下焦虛竭不能供升生之氣於中焦則失和也失和則腎氣獨沉自不能禁故前遺尿而後失便也不須治久則愈在善噫可也若遺尿失便未有不治能愈者恐是錯簡集注程林曰竭虛也本經云三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲上焦胃上口也中焦脾也脾善噫脾不和則食息迫逆於胃口而為噫也經云膀胱不約為遺尿因氣不和則溲便不約故遺失而不能自禁制也師曰熱在上焦者因咳為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋祕不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔注熱在上焦者篇中所謂肺痿吐涎沫也熱在中焦者篇中所謂腹滿堅痛也熱在下焦者篇中所謂小便淋瀝也其外大腸有寒者多清徹鶩溏即下利溏瀉也有熱者便稠黏腸垢即下利膿血也小腸有寒者下重便血即結陰便血也有熱者熱流於大腸蓄於肛門必病痔也集注徐彬曰小腸為受盛之官與心為表裏丙小腸也挾火以濟陰而陰不滯挾氣以化血而血歸經有寒則氣不上通而下重血無主氣而妄行矣直腸者大腸之頭也門為肛小腸有熱則大腸傳導其熱而氣結於肛門故痔痔者滯其丙小腸之熱於此也問曰病有積有聚有䅽氣何謂也師曰積者藏病也終不移聚者府病也發作有時展轉痛移為可治䅽氣者脅下痛按之則愈復發為䅽氣諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍傍上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之䅽作漀解見首篇注病有積有聚有䅽氣當別之也積者藏病無時不有不移其處也聚者府病發作有時展轉痛移也為可治謂府病易治也䅽氣者飲積脅下痛也按之則止不按復痛以水氣得按暫散故痛暫止也此即其證而言之然諸積大法尤當以診候之也脈來沉伏附骨而細者乃諸積之診也若見兩寸積在胸中也微出近魚際積在喉中也兩關積在臍傍也上關近寸積在心下也微下近尺積在少腹也尺中積在氣衝也脈出左積在左脈出右積在右脈兩出謂左右俱見積在中央也各以其部之處而診積之所在也集注徐彬曰積者跡也病氣之屬陰者也藏屬陰兩陰相得故不移不移者有專痛之處而無遷改也聚則如市井之物偶聚而已病氣之屬陽者也府屬陽兩陽相比則非如陰之凝故寒氣感則發否則已所謂有時也既無定著則痛無常處故展轉痛移其根不深故比積為可治也李彣曰積為藏病深入在裏故脈細而附骨也寸關尺上下左右別積病之所在皆指細而附骨之部分即內經前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也驚悸吐衄下血胸滿瘀血病脈證并治第十二寸口脈動而弱動即為驚弱則為悸注寸口通指三部也脈動而弱主驚悸病也動即為驚以驚為外觸而動也弱即為悸以悸為內生而怯也集注徐彬曰驚為外邪襲心故其寸口脈動動者脈來亂動也悸乃神不自主故其寸口脈弱弱者脈沉無力也邪之所襲因心之虛故驚悸並見李彣曰此寸口脈兼三部而言蓋驚自外至者也驚則氣亂故脈動而不寧悸自內惕者也悸因中虛故脈弱而無力師曰夫脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止注浮脈主陽主表若目睛清潔主陽表病也目睛暈黃主血脈病也蓋以諸脈絡於目而血熱則赤血瘀則黃今目睛黃暈知其衄未止也若黃暈去目睛慧了知其衄已止故曰衄今止也又曰從春至夏衄者太陽從秋至冬衄者陽明注衄血陽絡傷也下血陰絡傷也太陽主外春夏主外故從春至夏衄血屬太陽也陽明主內秋冬主內故從秋至冬衄血屬陽明也集注李彣曰衄血出於鼻手太陽經上䪼抵鼻目下為䪼足太陽經從巔入絡腦鼻與腦通手陽明經挾鼻孔足陽明經起鼻交額中四經皆循鼻分故皆能致衄太陽行身之表經云太陽為開是春生夏長陽氣在外有開之義故春夏衄者太陽陽明行身之裏經云陽明為闔是秋斂冬藏陽氣在內有藏之義故秋冬衄者陽明尤怡曰少陽之脈不入鼻額故不主衄衄家不可汗汗出必額上陷脈緊急直視不能眴不得眠注衄該吐血而言也衄血吐血之家陰已亡矣若發其汗汗出液竭諸脈失養則額角上陷中之脈為熱所灼緊且急也目直視目瞪不轉睛也不能眴目睫不合也亦為熱灼其脈引縮使然也不得眠陽氣不能行於陰也凡此之病皆陽盛陰微之危證故衄家慎不可汗也集注趙良曰足太陽經主表上巔入額貫目睛衄則在上絡脈之血己脫若更發汗是重竭津液津液竭則脈枯故額上陷中脈緊而急牽引其目視不能合也無血陰虛故不得眠病人面無血色無寒熱脈沉弦者衄脈浮弱手按之絶者下血煩咳者必吐血按脈沉當是脈浮脈浮當是脈沉文義始屬必傳寫之訛注赤色血色也面無血色謂面白之人純白而天赤面黃之人純黃而不紅也人有恐怖則面色脫白其狀驚駭人有愧心乍白乍紅其狀惶怯今無故而面無血色則可知非驚愧致氣亂血散也且無寒熱病又可知非虛損不生血少血也既非血散又非血少當詢之病人必有失血之故診之於脈必有吐衄下血之因衄吐屬陽故脈見浮弦按之必芤營血空也下血屬陰脈見沉弱按之欲絶營氣微也且脈色如斯而證兼煩咳是病在心肺故必吐血也夫吐血咳逆上氣其脈數而有熱不得臥者死注吐血咳逆肺大傷也上氣肺無降也脈數有熱火爍肺金也不得臥者陽不入陰故曰死也集注趙良曰脈數有熱陽獨勝也不能臥陰已絶也陰既絶陽豈獨生耶故死若得臥者陰未絶未可言死程林曰吐血咳逆上氣則肺藏傷矣脈數則虛熱不去火來刑金矣陰血消亡故不得臥死可必矣夫酒客咳者必致吐血此因極飲過度所致也注酒性大熱潰脈傷經極飲過度必致咳嗽吐血也集注徐彬曰此言吐血不必由於氣不攝血亦不必由於陰火熾盛其有酒客而致咳則肺傷已極又為咳所擊動必致吐血故曰極飲過度所致則治之者當以清酒熱為主也亡血不可發其表汗出則寒栗而振注凡失血之後血氣未復為亡血也皆不可發汗失血之初固屬陽熱亡血之後熱隨血去熱雖消而氣逐血虛陽亦微矣若發其汗則陽氣衰微力不能支故身寒噤栗而振振聳動也發陰虛之汗汗出則亡陰即發吐衄之汗也故見不得眴不得眠亡陰之病也發陽虛之汗汗出則亡陽即發亡血之汗也故見寒栗而振亡陽之病也集注李彣曰奪血者無汗以汗與血俱屬心液血亡液竭無復餘液作汗也今又發表則陰虛且更亡陽表間衛氣虛極故寒栗而振吐血不止者柏葉湯主之注吐血之病熱傷陽絡當清其熱勞傷陽絡當理其損今以柏葉湯溫散之品而治吐血不止者則必是熱伏陰分用此宣發使熱行陽分血不為熱所迫則自止矣柏葉湯方柏葉乾薑各三兩艾三把上三味以水五升取馬通汁一升合煮取一升分溫再服集解程林曰神農經云柏葉主吐血乾薑止唾血艾葉止吐血馬通者白馬尿也凡尿必達洞腸乃出故曰通亦微溫止吐血四味皆辛溫行陽之品使血歸經遵行隧道而血自止故吐血不止以柏葉湯主之也心氣不足吐血衄血瀉心湯主之按心氣不足二字當是有餘二字若是不足如何用此方治之必是傳寫之訛注心氣有餘熱盛也熱盛而傷陽絡迫血妄行為吐為衄故以大黃黃連黃芩大苦大寒直瀉三焦之熱熱去而吐衄自止矣瀉心湯方大黃二兩黃連黃芩各一兩上三味以水三升煮取一升頓服之病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血注表實無汗胸滿而喘者風寒之胸滿也裏實便澀胸滿煩熱者熱壅之胸滿也面目浮腫胸滿喘不得臥者停飲之胸滿也呼吸不快胸滿太息而稍寬者氣滯之胸滿也今病人無寒熱他病惟胸滿唇痿舌青口燥漱水不欲咽乃瘀血之胸滿也唇舌血華之處也血病不榮故痿瘁色變也熱在血分故口燥漱水不欲咽也脈微大來遲陰凝之診則當腹滿今腹不滿詢之其人言我滿在胸在腹也與上如是之證推之為有瘀血也病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之注此承上文互詳證脈以明其治也如熱狀即所謂心煩胸滿口乾燥渴之熱證也其人當得數大之陽脈今反見沉伏之陰脈是為熱伏於陰乃瘀血也血瘀者當下之宜桃核承氣抵當湯丸之類也集注李彣曰血瘀內無實熱故外證但如熱狀而其脈不數疾反無熱也煩滿者血瘀經氣不舒燥渴者血瘀津液不布血屬陰瘀則脈伏於內故為陰伏當下之以去瘀生新也下血先便後血此遠血也黃土湯主之下血先血後便此近血也赤小豆當歸散主之注先便後血此遠血也謂血在胃也即古之所謂結陰今之所謂便血也先血後便此近血也謂血在腸也即古之所謂腸澼為痔下血今之所謂藏毒腸風下血也一用黃土湯以治結陰之血從溫也一用赤小豆當歸散以治藏毒之血從清也集注趙良曰腸胃陽明經也以下血言胃居大腸之上若聚於胃必先便後血去肛門遠故曰遠血若聚大腸去肛門近故曰近血故治遠血黃土湯主之治近血赤小豆當歸散主之黃土湯方甘草乾地黃白朮附子炮阿膠黃芩各三兩竈中黃土半斤上七味以水八升煮取三升分溫二服赤小豆當歸散方見狐惑寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相擊此名曰革婦人則半産漏下男子則亡血注詳見傷寒辨脈篇內不復釋火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之按此方是治火逆驚狂者與首條之脈動驚病不合必是錯簡桂枝去芍藥加蜀漆牡蠣龍骨救逆湯方桂枝三兩甘草炙二兩生薑三兩牡蠣熬五兩龍骨四兩大棗十二枚蜀漆洗去腥三兩上為末以水一斗二升先煮蜀漆減一升內諸藥煮三升溫服一升心下悸者半夏麻黃丸主之按此方是治寒水心下悸者與首條之脈弱悸病不合必是錯簡半夏麻黃丸方半夏麻黃等分上二味末之煉蜜和丸小豆大飲服三丸日三服
