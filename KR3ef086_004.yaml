body:
  text: 卷四痰飲咳嗽病脈證并治第十三夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後裏虛脈偏弦者飲也按此條微者短氣之下古本有脈雙弦者寒也等句文義不屬當另分為一條在後注凡病人食少飲多小便利者為消渴病小便不利者為留飲病留飲者即今之停水飲病也若水停上焦胸中則壅肺氣不得降故暴喘滿也若水停中焦心下甚者則凌心故病悸動不安微者則礙肺故病呼吸短氣若水停下焦少腹則不輸膀胱故必苦裏急也仲景於此但言上中二焦不及下焦者非略之也謂已詳於傷寒論中也集注程林曰飲水多則水氣停泛於胸膈必暴喘滿也凡人食少飲多則胃土不能游溢精氣甚者必停於心下而為悸微者則阻於胸膈而為短氣也先渴後嘔為水停心下此屬飲家小半夏茯苓湯主之注水停心下中焦部也中焦屬胃故不止病悸短氣而亦病嘔也病悸短氣者是水停胃外從膈下而上干於胸也病嘔者是水停胃內從胃中而上越於口也然必先渴飲水多而後作嘔者方屬飲家嘔病也主小半夏湯者以止嘔也加茯苓者以飲水多而病嘔故兼利水也集注魏荔彤曰水停心下阻隔正氣不化生津液上於胸咽故渴也渴必飲水水得水而愈恣其衝逆所以先渴而後必嘔也此屬飲家當治其飲不可以為渴家治其渴也治飲則用辛燥治渴必用寒潤大相徑庭可不明其屬於何家而妄治之乎尤怡曰先渴後嘔者本無嘔病因渴飲水水多不下而反上逆也故曰此屬飲家小半夏止嘔降逆加茯苓去其停水小半夏加茯苓湯方半夏一升生薑半斤茯苓三兩上三味以水七升煮取一升五合分溫再服嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之注飲家渴者是水停氣不化生津液而渴也嘔家渴者是嘔吐胃乾燥傷津液而渴也故曰嘔家本應渴也先嘔後渴者當少少與飲之以和胃生津為欲解也若嘔吐後反不渴者是必心下素有支飲故也惟主小半夏湯止嘔而不加茯苓者以不渴並無新飲且嘔後己傷津液不可再行利水重竭津液也集注李彣曰此專以治嘔言嘔家渴者為欲解以胃氣復而津液生也若心下素有支飲則不燥自當不渴泛溢而嘔也半夏生薑溫能和胃氣辛能散逆氣為嘔家聖藥小半夏湯方半夏一升生薑半斤上二味以水七升煮取一升半分溫再服集解沈明宗曰此支飲上溢而嘔之方也凡作嘔必傷津液應當作渴故為嘔家本渴渴則病從嘔去謂之欲解若心下有支飲停蓄胸膈致燥故嘔而不渴則當治飲所以生薑散邪半夏滌飲嘔自止矣卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之注卒然嘔吐雖然不渴而心下痞塞是膈間有水凝結也眩者是水阻陽氣不升也悸者是水氣上干於心也即不渴無新飲而平日飲盛可知則不必顧及津液亦必加茯苓以利水斯結可開而阻可通也集注趙良曰心下痞膈間有水眩悸者陽氣必不宣散也經云以辛散之半夏生薑皆味辛本草半夏可治膈上痰心下堅嘔逆眩者亦上焦陽氣虛不能升發所以半夏生薑並治之悸則心受水凌非半夏可獨治必加茯苓去水下腎逆以安神神安則悸愈也尤怡曰飲氣逆於胃則嘔吐滯於氣則心下痞凌於心則悸蔽於陽則眩半夏生薑止嘔降逆加茯苓去其水也半夏加茯苓湯方見前假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散主之按瘦人之瘦字當是病字癲眩之癲字當是巔字巔者頭也文義相屬此傳寫之訛注悸者築築然跳動病也上條心下有悸是水停心下為病也此條臍下有悸是水停臍下為病也若欲作奔豚則為陽虛當以茯苓桂枝甘草大棗湯主之今吐涎沫水逆胃也巔眩水阻陽也則為水盛故以五苓散主之也五苓散方澤瀉一兩一分猪苓去皮三分茯苓三分白朮三分桂去皮二分上五味為末白飲服方寸匕日三服多飲暖水汗出愈夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之注水停心下甚者病悸已明其治矣微者短氣其治有二氣虛短氣是氣少不能長息而短也微飲短氣是水停阻礙呼吸而短也若呼之氣短是心肺之陽有礙也用苓桂朮甘湯以通其陽陽氣通則膀胱之竅利矣吸之氣短是肝腎之陰有礙也用腎氣丸以通其陰陰氣通則小便之關開矣故曰苓桂朮甘湯主之腎氣丸亦主之也茯苓桂枝白朮甘草湯方茯苓四兩桂枝白朮各三兩甘草二兩上四味以水六升煮取三升分溫三服小便則利腎氣丸方見婦人雜病中集解尤怡曰飲水病也治水必自小便去之苓桂朮甘益土氣以行水腎氣丸溫陽氣以行水雖所主不同而利小便則一也夫心下有留飲其人背寒冷如掌大留飲者脅下痛引缺盆咳嗽則轉甚胸中有留飲其人短氣而渴四肢厯節痛脈沉者有留飲按此條古本內於四肢厯節痛之下有脈沉者有留飲一句當另為一條始合論脈之義短氣而渴之渴字當是喘字四肢上當有缺文皆傳寫之訛注停飲初病即以小半夏湯加茯苓五苓散腎氣丸等藥治之而愈者微邪也若邪甚而不去者留於心上則阻心陽必背寒冷留於脅下則礙肝氣必脅下痛引缺盆咳嗽轉甚留於胸中則壅肺氣必短氣而喘留於身體則塞經絡必四肢厯節痛也由此推之留於脾則腹腫身重留於腎則囊足脛腫理必然也膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲注傷飲之病留而不去謂之留飲伏而難攻謂之伏飲伏飲者乃飲留膈上伏而不出發作有時者也即今之或值秋寒或感春風發則必喘滿咳吐痰盛寒熱背痛腰疼咳劇則目泣自出咳甚則振振身動世俗所謂吼喘病也集注程林曰痰飲留於膈則令人喘咳吐發於外則令人寒熱背痛腰疼咳甚則肺葉舉而目泣出喘甚則息搖肩而振振身瞤如此劇者必有伏飲脈浮而細滑傷飲注凡飲病得脈浮而細滑者為痰飲初病水邪未深之診也集注李彣曰飲脈當沉今脈浮者水在肺也脈沉者有留飲按此條係在四肢厯節痛之下今分在此注凡飲病得脈沉者為留飲水邪將深之診也集注程林曰脈得諸沉者當責有水故脈沉者為水飲李彣曰經云沉潛水蓄是也病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之按此為留飲欲去故也句當在利反快之下必傳寫之訛注凡飲病得脈伏者為伏飲水邪已深之診也凡病飲之人欲自下利利後通快此為所留之飲欲自去而愈故也若雖利利反不快心下續有堅滿乃所留之飲盤結不欲去也宜攻之以甘遂半夏湯方中反佐甘草以激之意在所向無前即潛伏難攻水結未有不破者因自下利故又佐芍藥以約束之防勝後窮追不止也甘遂半夏湯方甘遂大者三枚半夏以水一升煮取半升去滓十二枚芍藥五枚甘草炙如指大一枚上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之集解程林曰留者行之用甘遂以決水飲結者散之用半夏以散痰飲甘遂之性直達恐其過於行水緩以甘草白蜜之甘收以芍藥之酸雖甘草甘遂相反而實有以相使此酸收甘緩約之之法也靈樞經曰約方猶約囊其斯之謂歟尤怡曰甘草與甘遂相反而同用之者蓋欲其一戰而留飲盡去因相激而相成也芍藥白蜜不特安中亦緩藥毒耳問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳吐引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息氣短不得臥其形如腫謂之支飲注設問曰夫飲不止於留飲伏飲也而世謂飲有四者何也師曰留飲伏飲言飲病新久深淺之理也今世所謂四者有痰飲懸飲溢飲支飲言飲病之情狀也四飲亦不外乎留飲伏飲之理但因其水流之處特分之為四耳由其狀而命之名故有四也痰飲者水飲走腸間不瀉水精留膈間不輸得陽煎熬成痰得陰凝聚為飲凡所在處有聲故在上則喉中有漉漉之聲在下則腸間有瀝瀝之聲即今之遇秋冬則發至春夏則止久咳嗽痰喘病也懸飲者飲後水流在脅下不上不下懸結不散咳唾引痛即今之脅下有水氣停飲脅痛病也溢飲者飲後水流行歸於四肢當汗出而不汗出壅塞經表身體疼重即今之風水水腫病也支飲者飲後水停於胸咳逆礙息短氣不得臥其形如水腫狀即今之停飲喘滿不得臥之病也集注趙良曰水行走下而高原之水流入於川川入於海塞其川則洪水泛溢而人之飲水亦若是內經曰飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經并行今所飲之水或因脾氣而不上散或因肺氣而不下通以致流溢隨處停積而為病也程林曰內經云土鬱之發飲發於中以其性流衍不常治法亦有汗下溫利之異李彣曰夫飲有四而此獨以痰飲名總之水積陰或為飲飲凝陽或為痰則分而言之飲有四合而言之總為痰飲而已尤怡曰素盛今瘦知其津液盡化痰飲故不復外充形體而反下走腸間也飲水流溢者水多氣逆也其流於脅下者則為懸飲其歸於四肢者則為溢飲懸者懸於一處溢者溢於四旁其偏結而上附心肺者則為支飲支飲者如水之有派木之有枝附近於藏而不正中也咳逆倚息不得臥者上迫肺也水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸按心下悸之心字當是臍字必傳寫之訛注四飲之水或留膈間或留腸間或留脅下或留肢體或留胸中然不能盡水之為病也故又發明水之在心者心下堅硬短氣而悸不欲飲水也水之在肺者吐涎沫渴欲飲水也水之在脾者少氣身重也水之在肝者脅下支滿嚏而痛也水之在腎者臍下悸也醫者以此觸類而通之則水之病自無遁情矣支飲胸滿者厚朴大黃湯主之按支飲胸滿之胸字當是腹字若是胸字無用承氣湯之理是傳寫之訛注支飲胸滿邪在肺也宜用木防己湯葶藶大棗湯支飲腹滿邪在胃也故用厚朴大黃湯即小承氣湯也集注尤怡曰胸滿疑作腹滿支飲多胸滿此何以獨用下法厚朴大黃與小承氣湯同設非腹中痛而閉者未可以此輕試也厚朴大黃湯方厚朴一尺大黃六兩枳實四枚上三味以水五升煮取二升分溫再服心下有痰飲胸脅支滿目眩苓桂朮甘湯主之注此承上條詳出其證以明其治也心下有痰飲謂痰飲之水流在膈間故胸脅支滿支滿則阻礙陽氣不得上通於頭目故目眩也主以苓桂朮甘湯者利水而通陽氣也集注李彣曰胸脅支滿痰飲停滯於中也目眩阻遏陽氣不上升也茯苓淡滲以利水飲桂枝宣導以行陽氣白朮去濕健脾甘草和中益氣同為補土制水之劑苓桂朮甘湯方見上腹滿口舌乾燥此腸間有水氣己椒藶黃丸主之注此又承上條互詳其證以別其治也心下有痰飲喉間有漉漉聲腸間有水氣腸中有瀝瀝聲者用苓桂朮甘湯即溫藥和之之法也若更腹滿則水結實矣口舌乾燥則水不化矣故以防己椒目葶藶大黃前後分攻水結水結開豁則腹滿可除水化津生則口燥可滋小服而頻示緩治之意稍增者稍稍增服之口中有津液渴者乃飲渴也加芒硝者以峻藥力耳集注李彣曰腹滿水聚於胃也腸間有水氣則濕漬中焦津液不為灌溉故口舌乾燥前云水走腸間瀝瀝有聲為痰飲此腸間有水氣即痰飲也防己椒目葶藶大黃丸方防己椒目葶藶熬大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩集解程林曰防己椒目導飲於前清者從小便而出大黃葶藶推飲於後濁者得從大便而下也此前後分消則腹滿減而水飲行脾氣轉而津液生矣若渴則甚於口舌乾燥加芒硝佐諸藥以下腹滿而救脾土脈沉而弦者懸飲內痛注沉主裏弦主飲懸飲之病屬飲停裏故主懸飲內痛也病懸飲者十棗湯主之注此承上條以明其治也主以十棗湯亦形氣實者宜之若形氣稍虛又當臨證斟酌也集注趙良曰脈沉病在裏也凡弦者為痛為飲為癖懸飲結積在內作痛故脈見沉弦十棗湯方芫花熬甘遂大戟各等分上三味搗篩以水一升五合先煮肥大棗十枚取八合去滓內藥末强人服一錢匕羸人服半錢平旦溫服之不下者明日更服半錢得快利後糜粥自養集解李彣曰三物皆味苦苦以泄之能直達水飲窠囊之處但恐峻利泄人真元故加大棗甘以緩之且棗為脾果補土所以制水也病溢飲者當發其汗大青龍湯主之小青龍湯亦主之注溢飲病屬經表雖當發汗然不無寒熱之別也熱者以辛涼發其汗大青龍湯寒者以辛溫發其汗小青龍湯故曰大青龍湯主之小青龍湯亦主之也集注尤怡曰水氣流行歸於四肢當汗出而不汗出身體重痛謂之溢飲夫四肢陽也水在陰者宜利在陽者宜汗大青龍湯方麻黃去節六兩桂枝二兩甘草炙二兩杏仁去皮尖四十個生薑三兩大棗十二枚石膏如雞子大上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗多者溫粉撲之小青龍湯方麻黃去節三兩芍藥三兩五味子半升乾薑三兩甘草炙三兩細辛三兩桂枝三兩半夏湯洗半升上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升集解尤怡曰大青龍合桂麻而去芍藥加石膏則水氣不甚而挾熱者宜之倘飲多而寒伏則必以小青龍為當也肺飲不弦但苦喘短氣注弦為諸飲之診然專主者肝也水在肝部則病懸飲故脈沉弦也水在肺部則病支飲故脈不弦也喘咳短氣肺飲證也脅下引痛肝飲證也今亦不見脅下引痛之肝證但見苦喘短氣之肺證故曰肺飲不弦也集注李彣曰弦為肝脈故肺飲不弦苦喘短氣肺邪迫塞也前云咳逆倚息短氣為支飲是也支飲亦喘而不能臥加短氣其脈平也注支飲水在肺之病故亦喘而不能臥短氣也其脈平謂見肺之平脈或浮或澀或短此詳申上條不弦之義也支飲不得息葶藶大棗湯主之注此承上條以明其治也喘咳不能臥短氣不得息皆水在肺之急證也故以葶藶大棗湯直瀉肺水也集注沈明宗曰此支飲偏溢於肺也支飲貯於胸膈上干於肺氣逆則呼吸難以通徹故不得息然急則治標所以佐大棗之甘以保脾葶藶之苦以泄肺俾肺氣通調脾得轉輸為峻攻支飲在肺之方也尤怡曰不得息肺滿而氣閉也葶藶入肺通閉泄滿用大棗者不使傷正也葶藶大棗湯方見肺癰中膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之注支飲則喘滿不得息水在胸肺也更兼心下痞堅則水盤結連引膈間故曰膈間支飲也面色黧黑水邪深結之色也其脈沉緊水邪深結之脈也水邪深結故有喘滿痞堅之證也得之數十日醫或吐之不愈者是水邪不單結在上故越之而不愈也或下之不愈者是水邪不單結在下雖竭之亦不愈也心下痞堅飲結在中可知故以木防己湯開三焦水結通上中下之氣方中用人參以吐下後傷正也故水邪虛結者服之即愈若水邪實結者雖愈亦復發也即復與前方亦不能愈當以前方減石膏之寒凝加芒硝峻開堅結加茯苓直輸水道未有不愈者也集注李彣曰喘滿痞堅膈間支飲逆上也面黑者飲屬北方水色也脈沉為飲緊為寒皆陰脈以水飲稟陰寒之氣也吐下俱行不愈則陰陽之氣俱虛木防己湯補虛散飲虛者受補即愈實者飲邪固結不解故復發不愈乃寒氣凝聚未解故去石膏恐寒胃也加茯苓淡以滲飲芒硝鹹以軟堅木防己湯方木防己三兩石膏雞子大十二枚桂枝二兩人參四兩上四味以水六升煮取二升分溫再服木防己加茯苓芒硝湯方木防己桂枝各二兩人參茯苓各四兩芒硝三合上四味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈心下有支飲其人苦冒眩澤瀉湯主之注心下膈下也水在膈上則喘滿水在膈間則痞悸水在膈下則惟苦眩暈以澤瀉湯之平和小劑主之治支飲之輕者可也若陽虛水盛又當從事乎苓桂朮甘湯五苓散矣集注尤怡曰水飲之邪上乘清陽之位則為冒眩冒者昏冒而神不清如有物冒蔽之也眩者目眩轉而乍見眩黑也澤瀉泄水氣白朮補土氣以勝水也澤瀉湯方澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服病痰飲者當以溫藥和之注稠濁為痰陽之盛也稀清為飲陰之盛也有痰無飲當以涼藥治之有飲無痰當以熱藥溫之若痰而兼飲者此不可純涼又不可純熱故當以溫藥和之可也夫有支飲家咳煩胸中痛者不卒死至一百日或一歲宜十棗湯注支飲水在膈之上下也水乘肺則咳水乘心則煩水結胸則痛其人形氣俱實以十棗湯攻之可也然病此卒不死或至百日或延至一年者以飲陰邪陰性遲故不卒死也十棗湯方見上咳家其脈弦為有水十棗湯主之注此承上條以出其脈也咳家謂久咳之家也咳家未可攻也若脈弦其咳則為有水也有水可攻故以十棗湯攻之集注魏荔彤曰咳嗽者有飲冷而咳嗽者有因外感風寒而咳嗽者所謂形寒飲冷則傷肺也此外感風寒之咳嗽也有因傷倦而咳嗽者所謂陰虛內熱火刑肺金此內傷虛勞之咳嗽也於此俱無涉也仲景命之曰咳家專為痰飲在內逆氣上衝之咳嗽言也故其脈必弦無外感家之浮無內虛家之數但見弦者知有水飲在中為患也主之以十棗湯使水邪有所制斯下注而免於上厥也脈雙弦者寒也皆大下後裏虛脈偏弦者飲也按此條係在首條微者短氣之下今分在此注脈雙弦者兩手左右脈皆弦也偏弦者或左或右脈單弦也偏弦者飲也故當下之雙弦者寒也不當下也即偏弦當下亦不可大下若大下之則虛其裏單弦變而為雙弦矣弦為陰脈重陰則寒故曰雙弦者寒也此又示人不可以弦脈專主飲也脈弦數有寒飲冬夏難治按脈弦數之數字當是遲字始與寒飲之理合是傳寫之訛注單弦主飲固當下也若單弦兼遲而有寒飲不可下也寒飲之咳冬夏難治者以夏陰極於內冬陰極於外故也此承上二條詳申弦脈飲病可下不可下之義也久咳數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家注久咳數歲即今之年年舉發痰飲咳嗽水喘之病也若其脈弱者知邪不進則為可治若實大數者知邪日進故死也若脈虛者知正氣虛必苦冒也審其人素本有支飲則不必治其咳宜於痰飲家求治法也集注尤怡曰久咳數歲不己者支飲漬肺而咳飲久不已則咳久不愈也咳久者其氣必虛而脈反實大數者則其邪猶盛以猶盛之邪而臨已虛之氣其能久持乎故死若脈虛者正氣固虛而飲氣亦衰故可治然飲雖衰而正不能御亦足以上蔽清陽之氣故其人必苦冒也此病為支飲所致去其飲則病自愈故曰治屬飲家咳逆倚息不得臥小青龍湯主之青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從少腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時復冒者與茯苓桂枝五味甘草湯治其氣衝衝氣即低而反更咳胸滿者用苓桂五味甘草湯去桂加乾薑細辛以治其咳滿咳滿即止而更復渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水茯苓桂枝五味甘草湯去甘草桂枝加細辛乾薑半夏湯主之水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃發其陽故也若面熱如醉此為胃熱上衝熏其面加大黃以利之按小青龍湯下已之下字當是汗字大小青龍湯皆汗劑必是傳寫之訛注咳逆古咳嗽名也倚息今呼吸促也咳嗽呼吸氣促不得臥久病多屬痰飲新病每兼形寒故宜以小青龍湯汗之以散內飲外寒也小青龍湯辛溫大散惟有餘之人宜之若誤施之於不足之人辛熱則傷陰故多唾口燥也大散則傷陽故手足厥逆也面熱如醉陽外浮也小便難氣上衝陰內竭也脈沉微裏氣弱也手足痹表氣虛也時復冒虛之甚也雖陰陽表裏俱虛然屬誤汗寒熱錯雜之壞病故與茯苓桂枝五味甘草湯先通陽和陰俟上衝氣平再議他法也今氣衝雖下而反更咳嗽胸滿者則知寒飲貯胸故嫌桂枝偏於走表加乾薑細辛獨勝中之寒飲也服之咳滿即止而更復渴衝氣復發則知陰火上逆為乾薑細辛熱藥所動故也若服之時遂渴稍時而渴反止者則為其人素有支飲也支飲者法當冒冒者是因飲逆胸中作嘔而冒非陽虛為飲所阻不升之冒也故仍以本方復加半夏者以去水也更去甘草者恐甘助嘔也水去嘔止其人面形腫者加杏仁以降嘔咳上逆之餘邪若不因嘔咳面腫則為風邪所襲應加麻黃今其人血虛手足痹陽虛手足厥且因嘔咳後而腫故不加也若兼有面熱如醉此為胃熱上衝熏其面更加大黃以利胃熱可也苓桂五味甘草湯方茯苓四兩桂枝四兩甘草炙三兩五味子半升上四味以水八升煮取三升去滓分溫三服苓甘五味薑辛湯方茯苓四兩甘草乾薑細辛各三兩五味子半升上五味以水八升煮取三升去滓溫服半升日三服苓桂五味甘草去甘草去桂加乾薑細辛半夏湯方茯苓四兩細辛乾薑各二兩五味子半夏各半升上五味以水八升煮取三升去滓溫服半升日三苓甘五味加薑辛半夏杏仁湯方茯苓四兩甘草三兩五味子半升乾薑三兩細辛三兩半夏半升杏仁去皮尖半升上七味以水一斗煮取三升去滓溫服半升日三苓甘五味加薑辛半杏大黃湯方茯苓四兩半夏半升甘草三兩五味子半升乾薑三兩細辛三兩杏仁去皮尖半升大黃三兩上八味以水一斗煮取三升去滓溫服半升日三消渴小便利淋病脈證并治第十四厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐蛔下之利不止按此條是傷寒論厥陰經正病與雜病消渴之義不同必是錯簡寸口脈浮而遲浮即為虛遲即為勞虛則衛氣不足勞則榮氣竭按此條當在虛勞篇中錯簡在此注寸口通指左右三部而言也浮而有力為風浮而無力為虛按之兼遲即為虛勞之診故主衛外榮內虛竭也跗陽脈浮而數浮即為氣數即消穀而大堅氣盛則溲數溲數即堅堅數相摶即為消渴按而大堅句不成文大字之下當有便字必是傳寫之遺注跗陽胃脈也胃脈浮盛按之而數為胃氣熱故善消穀也火盛消穀則大便必堅氣盛消水則小便必數故溲數即堅也堅數相摶即為消穀消渴之病跗陽脈數胃中有熱即消穀引食大便必堅小便即數注此復申上條大便堅小便數之義也男子消渴小便反多以飲一斗小便一斗腎氣丸主之注飲水多而小便少者水消於上故名上消也食穀多而大便堅者食消於中故名中消也飲水多而小便反多者水消於下故名下消也上中二消屬熱惟下消寒熱兼之以腎為水火之藏也飲一溲一其中無熱消耗可知矣故與腎氣丸從陰中溫養其陽使腎陰攝水則不直趨下源腎氣上蒸則能化生津液何消渴之有耶集注程林曰小便多則消渴經曰飲一溲二者不治今飲一溲一故與腎氣丸治之腎中之動氣即水中之命火下焦腎中之火蒸其水之精氣達於上焦若肺金清肅如雲升而雨降則水精四布五經并行自無消渴之患今其人必攝養失宜腎水衰竭龍雷之火不安於下但炎於上而刑肺金肺熱葉焦則消渴引飲其飲入於胃遊溢滲出下無火化直入膀胱則飲一斗尿亦一斗也故用桂附腎氣丸助真火蒸化上升津液何消渴之有哉沈明宗曰男子二字是指房勞傷腎火旺水虧而成消渴者腎氣丸方見婦人雜病中脈浮小便不利微熱消渴者宜利小便發汗五苓散主之注脈浮病生於外也脈浮微熱熱在表也小便不利水停中也水停則不化津液故消渴也發表利水止渴生津之劑惟五苓散能之故以五苓散主之也於此推之曰脈浮可知上條脈沉也曰微熱可知上條無熱也且可知凡脈沉無熱之消渴皆當用腎氣丸方也五苓散方見痰飲中脈浮發熱渴欲飲水小便不利者猪苓湯主之注此與上條文同義異文同者脈浮小便不利發熱微熱渴欲飲水消渴也而義異者一以五苓散利水發汗一以猪苓湯利水滋乾也審其所以義異之意必在有汗無汗之間也何以知之一以發汗為主其因無汗可知一以滋乾為主其因有汗可知故文同而義異病同而治別也仲景之書言外寓意處甚多在學者以意會之自識也猪苓湯方猪苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內膠煬消溫服七合日三服渴欲飲水口乾舌燥者白虎加人參湯主之注消渴則渴欲飲水水入即消而仍口乾舌燥者是熱邪盛也故以白虎加人參湯清熱生津也白虎加人參湯方見中喝中渴欲飲水水入則吐者名曰水逆五苓散主之注渴欲飲水水入即吐名水逆者是裏熱微而水邪盛也故以五苓散利水止吐也集注李彣曰內有積水故水入則拒格而上吐名水逆也五苓散利水故主之渴欲飲水不止者文蛤散主之注渴欲飲水水入則吐小便不利者五苓散證也渴欲飲水水入則消口乾舌燥者白虎人參湯證也渴欲飲水而不吐水非水邪盛也不口乾舌燥非熱邪盛也惟引飲不止故以文蛤一味不寒不溫不清不利專意於生津止渴也或云文蛤即今吳人所食花蛤性寒味鹹利水勝熱然屢試而不效嘗考五倍子亦名文蛤按法制之名百藥煎大能生津止渴故嘗用之屢試屢驗也文蛤散方文蛤五兩上一味杵為散以沸湯五合和服方寸匕小便不利者有水氣其人苦渴栝蔞瞿麥丸主之注小便不利水蓄於膀胱也其人苦渴水不化生津液也以薯蕷花粉之潤燥生津而苦渴自止以茯苓瞿麥之滲泄利水而小便自利更加炮附宣通陽氣上蒸津液下行水氣亦腎氣丸之變制也然其人必脈沉無熱始合法也栝蔞瞿麥丸方栝蔞根即花粉二兩茯苓三兩薯蕷三兩附子炮一枚瞿麥一兩上五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知集解李彣曰此方與五苓散同為利水津之劑此用薯蕷即五苓用白朮之義也但五苓兼外有微熱故用桂枝走表此內惟水氣故用附子溫下也尤怡曰此下焦陽弱氣冷而水氣不行之證故以附子益陽氣茯苓瞿麥行水氣觀方後云腹中溫為知可以推矣其人苦渴則是水氣偏結於下而燥火獨聚於上夫上浮之焰非滋不熄下積之陰非暖不消而寒潤辛溫並行不悖此方為良法也求變通者於此三復焉小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之注無表裏他證小便不利而渴者消渴水邪病也小便不利不渴者小便癃閉病也主蒲灰散滑石白魚散者蒲灰亂髮血分藥也滑石白魚利水藥也然必是水鬱於血分故并主是方也觀東垣以通關丸治熱鬱血分之小便不利則可知在血分多不渴也主茯苓戎鹽湯者茯苓淡滲白朮燥濕戎鹽潤下亦必是水濕鬱於下也鹽為渴者之大戒觀用戎鹽則不渴可知也集注魏荔彤曰小便不利者所因有不同治法亦不一仲師併列三方以俟主治者擇其善而從之蒲灰散方蒲灰七分滑石三分上二味杵為散飲服方寸匕日三服滑石白魚散方滑石二分亂髮燒三分白魚二分上三味杵為散飲服半錢匕日三服茯苓戎鹽湯方茯苓半斤白朮二兩戎鹽彈丸大一枚上三味以水五升煮取三升分溫三服淋之為病小便如粟狀小腹弦急痛引臍中注小便不利及淋病皆或有少腹弦急痛引臍中之證然小便不利者水道澀少而不痛淋則溲數水道澀少而痛有不同也小便尿出狀如粟米者即今之所謂石淋也淋家不可發汗發汗必便血注淋家濕熱蓄於膀胱之病也若發其汗濕從汗去熱則獨留水府告匱熱迫陰血從小便出即今之所謂血淋也集注高世栻曰淋家之膀胱津液先虛故不可發汗若發汗更奪其津液則膀胱氣竭胞中併虛故必便血便血尿血也水氣病脈證并治第十五少陰脈緊而沉緊則為痛沉則為水小便即難脈得諸沉者當責有水身體腫重按脈得諸沉者一條乃始論水氣病之脈當列於篇首但古本脈得諸沉之上有少陰脈緊而沉四句文義不屬并有脫簡不釋注咳喘而不腫脹謂之痰飲腫重而不咳喘謂之水氣沉脈得於諸部身體不腫重者當責為氣也腫重者當責有水也以水蓄於裏故脈沉水溢於表故腫重也水病脈出者死注水病肉腫脈當不見今脈出者是氣外散也故死集注沈明宗曰脈得諸沉沉為氣鬱不行於表則絡脈虛虛即水泛皮膚肌肉故身體腫重當責有水但沉為正水而正水乃陰盛陽鬱脈必沉極若陡見浮起是真氣離根之象故曰水病脈出者死若風皮二水脈浮洪不在此例問曰病下利後渴飲水小便不利腹滿陰腫者何也答曰此法當病水若小便自利及汗出者自當愈注病下利則虛其土傷其津也土虛則水易妄行津傷則必欲飲水若小便自利及汗出者則水精輸布何水病之有惟小便不利則水無所從出故必病水病水者脾必虛不能制水故腹滿也腎必虛不能主水故陰腫也於此推之凡病後傷津渴欲飲水不便不利者皆當防病水也集注程林曰病下利則脾土衰而津液竭故渴引飲而土又不能制水故小便不利脾惡濕故腹滿腎主水故陰腫此為病水無疑若小便利則水行汗出則水散雖不藥而亦自愈矣夫水病人目下有臥蠶而目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之按其人消渴之下古本有病水腹大小便不利其脈沉絶者有水可下之四句與上文義不屬當另分為一條在本門五條之次始合裏水脈證注目下窠太陰也目下微腫水也惟土不能制水則水泛溢為病故水始病必先見微腫於目下也有臥蠶狀水病證也面目鮮澤水病色也沉甚脈伏水病脈也消渴引飲水病因也此皆水病先見之徵也集注趙良曰內經曰色澤者病溢飲溢飲者渴而多飲溢於腸胃之外又曰水陰也目下亦陰也腹者至陰之所居也故水在腹便目下腫也靈樞曰水始起也目下微腫如蠶如新臥起之狀其人初由水穀不化津液以成消渴必多飲多飲則水積水積則氣道不宣故脈伏矣沈明宗曰水外走則泛溢於皮膚肌肉內逆則浸淫於藏府腸胃相隨胃脈上注於面目下如臥蠶之狀水主明亮而光潤故面鮮澤為水病之驗也然水病因陽微陰盛經隧不利所以脈伏而胃中津液水飲外溢皮膚肌肉不溉喉舌故作消渴誠非真消渴也師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈注諸有水者謂諸水病也治諸水之病當知表裏上下分消之法腰以上腫者水在外當發其汗乃愈越婢青龍等湯證也腰以下腫者水在下當利小便乃愈五苓猪苓等湯證也集注趙良曰身半以上天之分陽也身半以下地之分陰也而身之腠理行天分之陽小便通地分之陰故水停於天者開腠理而水從汗散水停於地者決其出關而水自出矣即內經開鬼門潔淨府法也尤怡曰發汗利小便因其勢而利導之也病水腹大小便不利其脈沉絶者有水可下之注上條為水之在外在下者立法也若水在裏者非其治矣腹者至陰脾也故病水必腹大也水蓄於內故小便不利也其脈沉絶即伏脈也脈伏腹大小便不利裏水已成故可下之十棗神祐之類酌而用之可也集注程林曰腹大者為水在裏小便不利者為水不行是以脈必沉伏也故宜下之以利其水裏水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之按越婢加朮湯主之七字當在後太陽病脈浮而緊條發汗即愈之下文義始屬必是錯簡在此觀其裏有水之文自可知非越婢加朮湯發表之藥所能治矣注此承上條言裏水未實不可下不可利之義也裏水者謂裏有水也一身面目黃腫有水之證也脈沉有水之脈也雖有是證脈猶必渴而小便不利腹大者始為裏有水也設不腹大滿急此裏水未實不可下也若小便自利此亡津液作渴非裏有水作渴亦不可利小便也集注尤怡曰裏水水從裏積與風水不同故其脈不浮而沉而盛於內者必溢於外故一身面目悉黃腫也水病小便當不利今反自利則津液消亡水病已而渴病起矣越婢加朮湯方見下心下堅大如盤邊如旋盤水飲所作枳實白朮湯主之注心下堅大如盤邊如旋盤此裏水所作也似當下而不可下者以堅大而不滿痛是為水氣虛結未可下也故以白朮倍枳實補正而兼破堅氣行則結開兩得之矣此裏水不可下之和劑也集注趙良曰心下胃上脘也胃氣弱則所飲之水入而不消痞結而堅必强其胃乃可消痞白朮健脾强胃枳實善消心下痞逐停水散滯氣程林曰此證如盤而不如杯是水飲散漫之狀也以散漫於心下如盤不必辛熱之劑以發之但用枳朮以散之得腹中軟而水自消矣沈明宗曰見心下堅大如盤當審虛實寒熱脈之浮沉遲數大小為異毋得執方而誤用也尤怡曰言水飲所作者所以別於氣分也氣無形以辛甘散之水有形以苦泄之枳實白朮湯方枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即當散也集解李彣曰枳實消脹苦以泄之也白朮去濕苦以燥之也後張元素治痞用枳朮丸亦從此湯化出但此乃水飲所作則用湯以蕩滌之彼屬食積所傷則用丸以消磨之一湯一丸各有深意非漫無主張也跗陽脈當伏今反緊本自有寒疝瘕腹中痛醫反下之下之則胸滿短氣跗陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水注此明裏有水兼寒兼熱誤下之義也裏水脈伏非謂三部脈皆當伏乃謂跗陽胃脈當伏也若脈不伏反緊其人必本自有寒也水寒同病則疝瘕腹中痛醫誤以為裏水而下之水去寒留更虛其中故胸滿短氣也若脈不伏反數其人必本自有熱也水熱同病當消穀而小便數不病水也今小便反不利此欲作水之病也集注趙良曰跗陽當伏者非跗陽胃氣之本脈也為水蓄於下其氣伏故脈亦伏脈法曰伏者為水魏荔彤曰跗陽有水邪則當伏以胃陽為衣濕陰寒所固閉故陽明之脈不出也今反緊不惟水盛於裏而且寒盛於中矣蓋其人不止有水氣之邪而更兼平日有積寒疝瘕腹中常常作痛水邪中又兼寒邪也醫者不識其為陰寒乃以為水邪可下雖水下沉而寒邪上逆故胸滿短氣矣此病跗陽脈當伏今反數為本自有熱然本自有熱則當消穀小便數大便堅如傷寒胃實之證也今小便反不利則知為欲作水與濕熱之邪無疑也肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通注以上發明表裏上下之水以下發明五藏氣血之水也肝主筋腹脅是其部也水邪干之外則筋緩不能自轉側內則腹大脅痛淋溲也集注魏荔彤曰肝水者水附肝則肝水也肝經有水必存兩脅故腹大而脅下痛少陽陰陽往來之道路有邪窒礙故不能自轉側肝有水邪必上衝胸咽故時時津液微生及上升而下降小便不利者又續通此水邪隨肝木往來升降之氣上下為患也見此知肝經有水當於肝藏治之也尤怡曰肝之府在脅而氣連少腹肝之水不行則腹大不能轉側脅下腹痛也時時津液微生小便續通者肝喜沖逆而主疏泄水液隨之而上下也心水者其身重而少氣不得臥煩而躁其人陰腫按其人陰腫四字當在腎水條內錯簡在此注心主脈膻中是其部也水邪干之外則周身之脈不行其身重也內則少氣心煩不得臥而躁也集注程林曰內經云心主身之血脈上經曰水在心心下堅築短氣是以身重少氣也內經曰諸有水病者不得臥夫心屬火水在心是以不得臥而煩躁也魏荔彤曰夫水邪亦積聚之類也切近於其處則伏留於是藏即可以藏而名證水附於心則心水也心經有水四肢百骸皆可灌注故身重氣為水邪所阻故少氣水邪逼處神魂不安故不得臥神明擾亂故躁而煩見此知心經有水當於心經治之也脾水者其腹大四肢苦重津液不生但苦少氣則小便難注脾主腹四肢是其部也水邪干之外則四肢苦重內則腹大少氣小便難也集注魏荔彤曰脾水者水附於脾則脾水也脾專主腹故腹大脾主旋運又主四肢旋運不利故四肢苦重津液不生氣不行於上下則阻礙不通故上則苦少氣下則小便難見此知有水在脾當於脾藏治水也尤怡曰脾主腹而氣行四肢脾受水氣則腹大四肢重津氣生於穀穀氣運於脾脾濕不運則津液不生而少氣小便難者濕不行也肺水者其身腫小便難時時鴨溏注肺主氣皮毛是其部也水邪干之外則周身皮腫內則不輸小便大腸乃其府水走大腸故鴨溏也集注趙良曰肺主皮毛行榮衛與大腸合今有水病則水充滿皮膚肺本通調水道下輸膀胱為尿溺今既不通水不得自小便出反從其合與糟粕混成鴨溏也魏荔彤曰肺水者水附於肺則肺水也肺主氣氣引水行亦能使之周身浮腫肺不肅則氣化壅故小便難小便難則清濁不分故便鴨溏此知為有水在肺當於肺藏治水也尤怡曰鴨溏如鴨之後水糞雜下也腎水者其腹大臍腫腰痛不得尿陰下濕如牛鼻上汗其足逆冷面反瘦按面反瘦之下當有上條其人陰腫四字注腎主腰足陰是其部也水邪干之外則陰腫陰下濕足冷面瘦內則腹大臍腫腰痛不得尿也此五者指水氣等脹為言故俱不喘咳也集注程林曰腎者胃之關也關門不利故令聚水而生病是以有腹大臍腫之證也腰者腎之外候故令腰痛膀胱者腎之府故冷不得尿也以其不得尿則水氣不得泄浸漬於睪囊而為陰汗流注於下焦而為足冷夫腎為水藏又被水邪則上焦之氣血隨水性而下趨故其人面反瘦非若風水裏水之面目浮腫也魏荔彤曰腎水者水附於腎則腎水也腎主少腹少腹水濕固沍故腹水臍腫腰痛腰以下俱腎主之也水濕在下焦膀胱之氣反塞故不惟小便難而且竟不得尿陰寒下盛故陰下濕如牛鼻上汗冷而且黏其足皆逆冷也面乃陽之部位下陰盛上陽衰故面必瘦見此知水在腎當於腎藏治水也尤怡曰身半以下腎氣主之水在腎則腰痛臍腫腹大也不得尿陰下濕如牛鼻上汗其足逆冷者腎為陰水亦為陰兩陰相得陽氣不行而濕寒獨勝也面反瘦者面為陽陰盛於下則陽衰於上也師曰寸口脈沉而遲沉則為水遲則為寒寒水相搏跗陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分注寸口兩寸也脈沉而遲沉則為水遲則為寒水寒相搏於胸中則陽氣不運故跗陽兩關之脈伏而不起水穀不化也若脾氣衰則鶩溏胃氣衰則身腫也少陽右尺脈陷下少陰左尺脈細小亦因寒水太甚命火受制故男子水精不化小便為之不利女子血化為水經水為之不通也經血而曰經水者以水為血之體也女子以血為主故曰血分也集注趙良曰仲景脈法寸口多與跗陽合何也蓋寸口屬肺手太陰之所過肺朝百脈十二經各以其時來見於寸口脾胃二經出在右關胃乃水穀之海五藏皆稟氣於胃則胃又五藏之本所以經脈尤為諸經之要領也邪或干於胃者必再就跗陽診之跗陽胃脈之源也尤怡曰此合診寸口跗陽而知為寒水勝而胃陽不行也胃陽不行則水穀不化水穀不化則脾胃俱衰脾氣主裏故衰則騖溏胃氣主表故衰則身腫也少陽者生氣也少陰者地道也而俱受氣於脾胃脾胃衰則少陽脈卑而生氣不榮少陰脈細而地道不通男子則小便不利婦人則經血不通而其所以然者則皆陽氣不行陰氣乃結之故曰血分者謂雖病於水而實出於血也師曰寸口脈遲而澀遲則為寒澀為血不足跗陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿腸鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷陰氣不通即骨疼陽氣前通則惡寒陰氣前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分按名曰氣分之下當有下條桂枝去芍藥加麻黃附子細辛湯主之十五字注寸口脈遲為寒脈澀少血跗陽脈微乏氣遲亦為寒是則氣血俱虛為寒氣所干榮衛不利陰陽不通故身寒骨痛手足逆冷腹滿腸鳴惡寒麻痹失氣遺尿也此氣血俱虛寒氣內客氣脹故曰氣分而下條發明主治用桂枝去芍藥加麻黃附子細辛湯者溫養榮衛陰陽發散寒邪之氣也集注程林曰氣散必從前後而去邪氣實則失氣於後正氣虛則遺尿於前也尤怡曰微則為氣者為氣不足也寒氣不足該寸口跗陽為言寒而氣血復不足也寒氣不足則手足無氣而逆冷榮衛無源而不利由是藏府之中真氣不充而客寒獨勝則腹滿腸鳴相逐氣轉膀胱而下輸也榮衛俱勞者榮衛俱乏竭也陽氣溫於表故不通則身冷陰氣榮於裏故不通即骨疼不通者虛極而不能行與有餘而壅者不同陽前通則惡寒陰前通則痹不仁者陽先行而陰不與俱行則陰失陽而惡寒陰先行而陽不與俱行則陽獨滯而痹不仁也蓋陰與陽常相須也不可失失則氣機不續而邪乃著不失則上下交通而邪不容故曰陰陽相得其氣乃行大氣一轉其氣乃散失氣遺尿謂分虛實而散也曰氣分者謂寒氣乘陽之虛而病於氣也氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻黃附子細辛湯主之按氣分心下堅大如盤邊如旋杯水飲所作之十六字當是衍文觀心下堅之本條自知桂枝去芍藥加麻黃附子細辛湯主之十五字當在上條氣分之下義始相屬正是氣分之治法必是錯簡在此桂枝去芍藥加麻黃附子細辛湯方桂枝三兩生薑三兩甘草二兩大棗十二枚麻黃細辛各一兩附子炮一枚上七味以水七升煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證跗腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿注風水得之內有水氣外感風邪風則從上腫故面浮腫骨節疼痛惡風風在經表也皮水得之內有水氣皮受濕邪濕則從下腫故跗浮腫其腹如鼓按之沒指水在皮裏也非風邪故不惡風因水濕故不渴也其邪俱在外故均脈浮皆當從汗從散而解也正水水之在上病也石水水之在下病也故在上則胸滿自喘在下則腹滿不喘也其邪俱在內故均脈沉遲皆當從下從溫解也黃汗者汗出柏汁色也其脈沉遲藏內有寒飲身發熱者經外有伏熱寒飲故胸滿四肢頭面浮腫伏熱若久不愈故必致癰膿也由此推之可知黃汗是內飲外熱蒸鬱於中從土化而成也以黃汗而列水病之門者亦因水之為病而腫也集注程林曰風水與皮水相類屬表正水與石水相類屬裏但風水惡風皮水不惡風正水自喘石水不自喘為異耳尤怡曰風水水為風搏因風而病水也風傷皮毛而濕流關節故脈浮惡風而骨節疼痛也皮水水行皮中內合肺氣故其脈亦浮不兼風故不惡風也其腹如鼓即內經𪔣𪔣然不堅之意以其病在皮膚而不及腸藏故外有脹形而內無喘滿也水在皮者宜從汗解故曰當發其汗正水腎藏之水自盛也石水水之聚而不行者也正水乘陽之虛而浸及上焦故脈沉遲而喘石水因陰之盛而結於少腹故脈沉腹滿而不喘也黃汗汗出沾衣如柏汁得之濕熱交病而濕居熱外其盛於上而陽不行則身熱胸滿四肢頭面腫久則浸及於裏而榮不通則逆於肉裏而為癰膿也脈浮而洪浮則為風洪則為氣風氣相搏風强則為隱疹身體為癢癢為泄風久為痂癩氣强則為水難以俯仰風氣相擊身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗按身體洪腫之洪字當是浮字此為黃汗四字當是衍文注六脈俱浮而洪浮則為風洪則為氣風氣相搏之病若風强於氣相搏為病則偏於營故為隱疹身體為癢癢者肌虛為風邪外薄故也名曰泄風即今之風燥瘡是也故日久不愈則成痂癩痂癩疥癬癘癩之類是也若氣强於風相搏為病則偏於衛故為水氣難以俯仰即今之支飲喘滿不得臥也若風氣兩相强擊為病則為風水故通身浮腫也以上諸證皆屬肌表故當發汗汗出乃愈也風水無汗當以越婢湯發汗若汗出惡風則為表陽虛故加附子也若不惡風小便通利非表陽有寒乃上焦有寒也上焦有寒惟兼病水者則其人口內必多生涎沫也集注尤怡曰風天之氣氣人之氣是皆失其和者也風濕相搏風强則氣從風而浸淫肌體故為癮疹氣强則風從氣而鼓湧水液故為水風氣並强兩相搏擊而水液從之則為風水汗之則風去而水行故曰汗出乃愈若惡風者表虛也不惡風而小便通利者以上焦有寒不能約束津液故其口多涎也寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目裹上微擁如蠶新臥起狀其頸脈動時時咳按其手足上陷而不起者風水注此承上條詳申風水之證脈也寸口脈沉而滑中有水氣之診也面目腫大中有水氣之證也有寒者其脈沉遲則為石水也有熱者其脈沉滑名曰風水也視其人之目胞上微擁似蠶如新臥起之狀人迎頸脈動甚時咳按其腫之手足陷而不起者皆風水之證也集注趙良曰內經云脈沉曰水脈滑曰風面腫曰風目腫如新臥起之狀曰水頸脈動喘咳曰水又腎風者面跗龐然少氣時熱其有跗腫者亦曰本於腎名風水皆出內經也程林曰沉者就下之性滑者流衍之象故沉滑者中有水也面腫曰風風鬱於經則熱故面跗腫大有熱名曰風水內經曰諸有水者微腫先見於目下也水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也頸脈人迎脈也水邪干土則頸脈動水之本在腎水之標在肺故時時咳也以手按其腹隨手而起此屬水脹如按水囊者必隨手而起今風水搏於手足胕屬肌肉之間按而散之猝不能聚故陷下而不起也風水脈浮身重汗出惡風者防己黃耆湯主之腹痛加芍藥注此承上條風水詳申其證以明其治也風水之病外風內水也脈浮惡風者風也身重腫者水也汗出表虛故用防己黃耆湯固表以散風水也若腹痛加芍藥甘草以調中也防己黃耆湯方見濕病中太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痹胸中塞不能食反聚痛暮躁不得眠此為黃汗痛在骨節咳而喘不渴者此為脾脹其狀如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗按脾脹之脾字當是肺字是傳寫之訛發汗即愈之下當有前條越婢加朮湯主之七字注此又詳申風水皮水黃汗肺脹四證之治法也太陽病謂頭痛發熱惡風也脈浮而緊似傷寒也傷寒法當骨節疼痛反不疼身體反重而酸面目浮腫其人不渴非傷寒也乃風水也發汗汗出即愈也若愈後而惡寒者此為過於發汗極虛得之當補表陽自可愈也有是證渴而不惡寒似傳裏也但跗浮腫其腹如鼓乃皮水也有是證胸中窒反聚痛不能食暮躁不得臥似裏實也但身腫而冷麻木如痹此為欲作黃汗也痛在骨節似傷寒也但其狀如水腫咳喘不渴此為肺脹也以上四證皆初病皮毛狀類傷寒故均以越婢加朮湯主之發汗即愈也若渴而下利小便數者則津液已奪故不可發汗也集注趙良曰脾脹恐是肺字之誤靈樞經云肺是動則病肺脹滿膨膨而喘咳也魏荔彤曰其狀如腫者按其手足未至陷而不起故曰如腫似腫而實非腫也尤怡曰太陽有寒則脈緊骨疼有濕則脈濡身重有風則脈浮體酸此明辨也今得傷寒脈而骨節不疼身體反重而酸即非傷寒乃風水外勝也風水在表而非裏故不渴風固當汗水在表者亦宜汗故曰汗出即愈然必氣盛而實者汗之乃愈不然則其表益虛風水雖解而惡寒轉增矣故曰惡寒者此為極虛發汗得之若其渴而不惡寒者則非病風而獨病水不在皮外而在皮中視風水為較深矣其證身腫而冷狀如周痹周痹者寒濕痹其陽也皮水為水氣淫於膚也胸中窒不能食者寒襲於外而氣窒於中也反聚痛暮躁不得眠者熱為寒鬱而寒甚於暮也寒濕外淫必流關節故曰此為黃汗痛在骨節其咳而喘不渴者水寒傷肺氣攻於表有如腫病而實同皮水故曰發汗則愈然而諸病若渴而下利小便數者則不可謂水氣當汗概發之也仲景叮嚀之意豈非慮人之津液先亡也哉或問風水外證骨節疼此云骨節反不痛身體反重而酸皮水不渴此云渴何也曰風與水合而成病其流注關節者則為骨節疼痛其浸淫肌體者則骨節不疼而身體酸腫由所傷之處不同故也皮水不渴者非言皮水本不渴也謂腹如鼓而不渴者病方外盛而未入裏猶可發其汗也此所謂渴而不惡寒者所以別於風水之不渴而惡風也風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之惡風加附子注此又承上條風水互詳其證而變其治也風水之邪全在表而不在裏故惡風一身悉腫脈浮不渴也初本無汗身無大熱續自汗出而不惡風寒表不虛也故用越婢湯以發之若惡風甚者表陽虛也前方加附子一枚以補其在表之陽也越婢湯方麻黃六兩石膏半斤生薑三兩甘草二兩大棗十五枚上五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風者加附子一枚炮風水加朮四兩皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之注此承皮水互詳其證以明其治也皮水之病是水氣相搏在皮膚之中故四肢聶聶瞤動也以防己茯苓湯補衛通榮祛散皮水也集注沈明宗曰此邪在皮膚而腫也風入於衛陽氣虛滯則四肢腫經謂結陽者腫四肢即皮水也皮毛受風氣虛而腫所謂水氣在皮膚中邪正相搏風虛內鼓故四肢聶聶而動是因表虛也蓋三焦之氣同入膀胱而行決瀆今水不行則當使小便利而病得除故防己茯苓除濕而利水以黃耆補衛而實表表實則邪不能容甘草安土而制水邪桂枝以和榮衛又行陽化氣而實四末俾風從外出水從內泄矣防己茯苓湯方防己三兩黃耆三兩桂枝三兩茯苓六兩甘草三兩上五味以水六升煮取二升分溫三服裏水越婢加朮湯主之甘草麻黃湯亦主之按裏水之裏字當是皮字豈有裏水而用麻黃之理閲者自知是傳寫之訛注皮水表虛有汗者防己茯苓湯固所宜也若表實無汗有熱者則當用越婢加朮湯無熱者則當用甘草麻黃湯發其汗使水外從皮去也越婢加朮湯方於越婢湯中加朮四兩甘草麻黃湯方甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒厥而皮水者蒲灰散主之按厥而二字當是衍文注水在皮膚浸淫日久必然腐潰而出水也當以蒲灰散敷之以燥水也蒲灰散方見消渴中水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯按為氣水之氣字當是風字若是氣字則無發汗之理且通篇並無氣水之病注水之為病其脈沉小屬少陰水也今脈不沉小而浮浮者為風非少陰水也若無水虛脹者為風水也風水發其汗即已風水脈沉者宜麻黃附子湯汗之脈浮者宜杏子湯汗之麻黃附子湯方麻黃三兩甘草二兩附子炮一枚上三味以水七升先煮麻黃去上沫內諸藥煮取二升半溫服八合日三服集解沈明宗曰麻黃附子湯今人置之不講余特舉而明之麻黃附子通陽開竅治水妙劑今人惟用腎氣湯丸壅補其內致陽氣不宣轉補轉壅邪無出路水腫日增咳血而死者不知凡幾矣杏子湯方麻黃四兩杏仁五十個甘草炙二兩上水七升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升得汗止服問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜黃耆芍藥桂枝苦酒湯主之注此承黃汗互詳其證以明其治也黃汗屬濕故身體腫屬風故發熱汗出而渴狀如風水者謂面目浮腫也汗沾衣色正黃如柏汁謂汗出黏黃也脈自沉者謂從水得之也究其得之之由以汗出入冷水中浴則悽愴之寒內入遏鬱汗液於肌腠從土蒸化而出故色黃也宜黃耆桂枝解肌邪以固衛氣白芍苦酒止汗液以攝營氣營衛調和其病已矣集注程林曰汗出則元府開入水浴則悽愴之水寒藏留於腠理皮膚之中則身腫發熱也汗出沾衣如柏汁則津液內竭是以汗出而渴也身腫雖狀如風水但風水之脈不沉汗不黃口不渴為異耳李升璽曰按汗出浴水亦是偶舉一端言之耳大約黃汗由脾胃濕久生熱積熱成黃濕熱交蒸而汗出矣魏荔彤曰黃汗者汗出之色黃而身不黃與發黃之證不同也尤怡曰黃汗之病與風水相似但風水脈浮而黃汗脈沉風水惡風而黃汗不惡風為異其汗沾衣色正黃如柏汁則黃汗之所獨也風水為風氣外合水氣黃汗為水氣外合熱氣熱被水遏互鬱交蒸汗液則黃用黃耆桂枝芍藥三味行陽以益陰則榮氣和而衛氣周蓋欲使榮衛大行而邪氣畢達耳黃耆芍藥桂枝苦酒湯方黃耆五兩芍藥三兩桂枝三兩上三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也方解服後心煩者以苦酒止汗太急也蓋汗出於心急止之則不得出故心煩也至六七日乃解者正復而邪自退也集解魏荔彤曰古人稱醋為苦酒非另有所謂苦酒也美酒醯即人家所制社醋即鎮江紅醋是也又醋之劣者即白酒醋各處皆是總以社醋入藥尤怡曰苦酒阻者欲行而未得遽行久積藥力乃自行耳故曰服至六七日乃解黃汗之病兩脛自冷假令發熱此屬厯節食已汗出又身常暮臥盜汗出者此勞氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之按此承黃汗詳申其證也但文義未屬必是錯簡不釋桂枝加黃耆湯方桂枝芍藥各二兩甘草二兩生薑三兩大棗十二枚黃耆二兩上六味以水八升煮取三升溫服一升須臾飲熱稀粥一升餘以助藥力溫覆取微汗若不汗更服寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉跗陽脈浮而數浮脈即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚即為水矣按此條文義不屬不釋寸口脈弦而緊弦則衛氣不行即惡寒水不沾流走於腸間按此條必有脫簡不釋問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉則為水緊則為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝咽喉塞噎脅下急痛醫以為流飲而大下之氣擊不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小瘥食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則浮咳喘逆當先攻擊衝氣令止乃治咳咳止其喘自瘥先治新病病當在後按此條文義不屬不釋
