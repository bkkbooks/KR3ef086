body:
  text: 卷五黃疸病脈證并治第十六寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行跗陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎跗陽脈緊為傷脾風寒相搏食穀即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰穀疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治心中懊憹而熱不能食時欲吐名曰酒疸注寸口脈浮而緩浮則為風緩則為痹痹非中鳳前已詳言之矣今跗陽緊數而尺脈浮四肢苦煩身面色黃乃疸病也黃土色也土病則見之土屬脾胃脾為陰土主濕胃為陽土主熱故凡病疸皆為濕瘀熱鬱也行於外則必四肢苦煩身面發黃也蓋其人素有濕熱外被風寒相搏內為女勞所傷及食穀飲酒或與濕瘀或與熱鬱皆能為是病也若胃脈數是熱勝於濕則從胃陽熱化熱則消穀故能食而謂之陽黃若胃脈緊是濕勝於熱則從脾陰寒化寒則不食故食即滿而謂之陰黃也陽黃則為熱疸酒疸陰黃則為女勞疸穀疸也若尺脈不沉而浮則為傷腎腎傷病疸亦為女勞疸也胃脈不緩而緊則為傷脾脾傷病疸亦為穀疸也穀疸則食穀即滿穀氣不消胃中苦濁清氣阻於上行故頭眩也濁氣流於膀胱故小便不通也女勞疸則額上黑腎病色也微汗出濕不瘀也五心熱薄暮發腎陰熱也膀胱急小便利下焦虛也腹滿如水狀脾腎兩敗故謂不治也若心中懊憹熱不能食時欲吐小腹滿小便不利雖見目青面黑必是酒疸病也脈沉渴欲飲水小便不利者皆發黃注脈沉主裏也渴欲飲水熱瘀也小便不利濕鬱也熱瘀濕鬱於裏故發黃也首條謂脈浮緩緊數皆令發黃是得之於外因也此條脈沉亦令發黃是得之於內因也故治黃有汗下二法也集注李彣曰脈沉而渴渴欲飲水小便不利則濕熱內蓄無從分消故發黃也疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔發於陽部其人振寒而發熱也注未成疸前小便不利而渴者是欲作疸病也已成疸後而渴者是熱深不已故難治也不渴者是熱淺將除故可治也疸發於陰者人必嘔逆嘔逆者陰裏為之也發於陽者人必振寒發熱寒熱者陽表為之也此以渴不渴別疸之難治可治以嘔逆寒熱辨黃之在表在裏也集注程林曰黃家以濕熱相搏有口燥鼻燥而未至於渴渴則津液內消邪氣獨勝不渴則津液未竭正氣未衰治之所以分難易也陰主裏濕勝於裏則嘔陽主表熱勝於表則振寒發熱也此條辨疸證之渴與不渴有輕重表裏之分也尤怡曰疸而渴則熱方熾而濕且日增故難治不渴則熱已減而濕亦自消故可治陰部者裏之藏府關於氣故嘔陽部者表之軀殼屬於形故振寒而發熱此陰陽內外淺深微甚之辨也腹滿舌痿黃躁不得睡屬黃家按舌痿黃之舌字當是身字必傳寫之訛注身痿而黃腹滿而躁不得睡者屬黃家之病在裏當下之也集注徐彬曰腹滿裏證也乃有腹滿而加身痿黃躁不得眠瘀熱外行此發黃之漸也故曰屬黃家諸黃家病但利其小便假令脈浮者當以汗解之宜桂枝加黃耆湯主之注諸黃家病謂一切黃家病也黃病無表裏證熱盛而渴者當清之濕盛小便不利者但當利其小便假令脈浮則為在表當以汗解之宜桂枝加黃耆湯於此推之可知脈沉在裏當以下解之也集注高世栻曰利小便及黃家一定之法故曰諸病黃家但利小便然亦自有宜汗者故又曰假令脈浮為在表當以汗解之汗解之法宜桂枝加黃耆湯用桂枝湯以解肌肌解則汗自出加黃耆以助表表和則營衛亦通矣桂枝加黃耆湯方見水氣病中師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱相得然黃家所得從濕得之一身盡發熱而黃肚熱熱在裏當下之注此詳申黃疸誤用火汗之為病也病疸者濕熱也今濕淫於內則胸滿煩喘熱淫於內則發熱口燥若病發時復以火劫其汗則為兩熱相合蓋黃家所得由濕得之則一身必盡熱而身面即發黃也今因火劫誤汗而發黃雖有表熱則不當汗也但捫其肚熱其熱在裏當下之以去其熱也集注程林曰濕淫於內則煩喘胸滿熱淫於內則發熱口燥復以火迫劫其汗反致兩熱相搏殊不知黃家之病必得之濕熱瘀於脾土故一身盡發熱而黃正以明火劫之誤也若肚有熱則熱在腹可下之以去其濕熱黃病腹滿小便不利而赤自汗出此為表和裏實當下之宜大黃硝石湯注此承上條互詳其證以明其治也腹滿小便不利而赤是熱在裏其人自汗出此為表和裏實也宜大黃硝石湯下之大黃硝石湯方大黃黃柏硝石各四兩梔子十五枚上三味以水六升煮取二升去滓內硝更煮取一升頓服集解李彣曰腹滿小便不利而赤裏病也自汗出表和也裏病者濕熱內甚用梔子清上焦濕熱大黃瀉中焦濕熱黃柏清下焦濕熱硝石則於苦寒瀉熱之中而有燥烈發散之意使藥力無所不至而濕熱悉消散矣黃疸病茵陳五苓散主之一本云茵陳湯及五苓散並主之按黃疸病之下當有小便不利者五字茵陳五苓散方有著落必傳寫之遺注黃疸病脈沉腹滿在裏者以大黃硝石湯下之脈浮無汗在表者以桂枝加黃耆湯汗之小便不利者不在表裏故以茵陳五苓散主之茵陳五苓散方茵陳蒿末十分五苓散五分方見痰飲中上二味和先食飲服方寸匕日三服集解尤怡曰此正治濕熱成疸者之法茵陳散熱鬱五苓利濕瘀也黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之注黃疸病小便當赤今不赤而白且欲自利雖腹滿而喘是濕盛無熱陰黃證也切不可除熱若除熱以涼藥下之則胃必寒而作噦噦者主之以小半夏湯以止噦也集注李彣曰小便色不變欲自利裏無實可知腹滿而喘脾氣虛而肺氣不利耳用苦寒藥攻裏除熱則胃寒而虛氣上逆故噦宜小半夏湯散逆止噦高世栻曰小便色不變非赤也欲自利非下利也若腹滿而喘雖似裏實不可投寒劑以除熱如大黃硝石湯不可用也若投寒劑而除熱則必噦噦厄逆也半夏生薑辛溫散寒故噦者當以小半夏湯主之也小半夏湯方見痰飲中黃疸之病當以十八日為期治之十日以上瘥反劇為難治注疸病屬脾脾主土土無定位寄旺於四季之末各十八日期之十八日者土旺之日也故治十日以上當瘥而不逾十八日之外也若逾十八日不瘥而反劇者則土衰矣故曰難治集注高世栻曰十八日乃脾土寄旺於四季之期十日土之成數也黃疸之病在於脾土故當以十八日為期然治之宜先故治之十日以上即當瘥至十日以上不瘥而疸病反劇者是謂難治謂土氣虛敗不可治也穀疸之為病寒熱不食食即頭眩心胸不安久久發黃為穀疸茵陳蒿湯主之注此詳申穀疸之為病也未成穀疸之時其人多病寒熱寒熱作時則不能食寒熱止時則或能食雖能食然食後即頭暈目眩心煩不安此為濕瘀熱鬱而內蒸將作穀疸之徵也久久身面必發黃為穀疸矣宜茵陳蒿湯利下使從大小二便而出之茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也陽明病脈遲者食難用飽飽則發煩頭眩小便必難此欲作穀疸雖下之腹滿如故所以然者脈遲故也注穀疸屬胃熱脈當數今脈遲脾藏寒也寒不化穀所以雖飢欲食食難用飽飽則煩悶胃中填塞健運失常也清者阻於上升故頭眩濁者阻於下降故小便難也此皆欲作穀疸之徵其證原從太陰寒濕鬱黷而生若誤以為陽明熱濕發黃下之雖腹滿暫減頃復如故所以然者脈遲寒故也此發明欲作穀疸屬脾陰寒化而不可下者也集注程林曰脈遲為寒寒不殺穀故食難用飽飽則穀氣不消胃中苦濁濁氣蘊蓄則發煩熏蒸則作眩也小便難者以脈遲則無陽以施化濁氣但留於胃而不宣是以欲作穀疸若下之徒虛其胃而腹滿如故也所以然者以脈遲為寒之故也黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治硝石礬石散主之注此詳申女勞疸之為病黃疸日晡所發熱乃陽明熱症當不惡寒也而反惡寒者非陽明熱症此或為女勞得之也女勞得之疸證雖膀胱急少腹滿而小便自利身雖盡黃而額上則黑雖發熱惟足下甚此少陰熱因作黑疸也故腹脹如水狀而大便必黑時溏知非水脹病乃為女勞得之疸脹病也時溏黑色者亦藏病及血之徵也血病者顏必變豈有色黑而血不病者乎女勞疸腹滿者為難治以其脾腎兩敗也以硝石入血消堅礬石入氣勝濕然此方治標固宜非圖本之治世久書訛姑辨其理也集注尤怡曰黃家日晡所本當發熱今發熱而反惡寒者此為女勞得之疸也熱在胃淺而腎深故熱深則先反惡寒也膀胱急額上黑足下熱大便黑皆腎熱之徵雖少腹滿脹有如水狀而實為腎氣不行非脾濕而水不行也惟是證兼腹滿則脾腎並傷而其治為難耳硝石鹹寒除熱礬石除痼熱在骨髓骨與腎合用以清腎熱也大麥粥和服恐傷胃也硝石礬石散方硝石礬石燒等分上二味為散以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是候也男子黃小便自利當與虛勞小建中湯注婦人産後經崩發黃色者乃脫血之黃色非黃疸也今男子黃而小便自利則知非濕熱發黃也詢知其人必有失血亡血之故以致虛黃之色外現斯時汗下滲利之法俱不可施惟當與虛勞失血同治故以小建中湯調養營衛黃自愈矣集注高世栻曰女為陰男為陽陰主血陽主氣男子黃陽氣虛也黃者土之色陽氣虛而土色外呈中無濕熱故小便自利此為虛也故當以小建中湯和其陰陽調其血氣也本論血痹虛勞篇有小建中湯主治虛勞故曰虛勞小建中意謂此男子黃而小便利亦為虛勞之證云爾小建中湯方見虛勞中酒黃疸者或無熱譫言小腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之注此詳申酒疸之為病也酒體濕而性熱過飲之人必生濕熱為疸病也無熱無外熱也譫語鼻燥有內熱也小腹滿濕熱蓄於膀胱也欲吐濕熱釀於胃中也其脈浮者酒熱在經先吐之以解外也沉弦者酒飲在裏先下之以解內也集注李彣曰胃足陽明之脈起於鼻之交頞中故鼻燥也夫病酒黃疸必小便不利其候心中熱足下熱是其證也注此詳酒疸之病濕熱生也必小便不利其候心中熱胃府熱也足下熱胃經熱也是其酒疸之證也集注程林曰夫小便利則濕熱行不利則濕留於胃胃脈貫膈下足跗上熏胃脘則心中熱下注足跗則足下熱也酒疸心中熱欲吐者吐之愈注此詳申酒疸宜吐之治也酒疸心中熱欲吐者謂胃中煩亂懊憹欲吐非吐之不能愈也集注程林曰後證熱深則懊憹欲吐今微熱則心中熱亦欲吐病屬上焦故吐之可愈也酒黃疸心中懊憹或熱痛梔子大黃湯主之注此詳申酒疸宜下之治也酒黃疸謂因飲酒過度而成黃疸也心中懊憹欲吐或自吐之而愈或服梔子豉湯吐之而愈皆可也若心中懊憹不欲吐或心中熱痛皆非吐之可愈故以梔子大黃湯下之愈也梔子大黃湯方梔子十四枚大黃一兩枳實五枚豉一升上四味以水六升煮取三升分溫二服集解魏荔彤曰酒黃疸心中懊憹或熱甚而痛梔子大黃湯主之蓋為實熱之邪立法也酒家積鬱成熱非此不除也酒疸下之久久為黑疸目青面黑心中如噉蒜虀狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之注酒疸心中懊憹或心中熱痛脈沉實者當下之若心中熱欲吐脈浮弱者當吐之而反下之則為逆也若其人素有勞倦下之則熱入於脾頃時腹滿如故則成穀疸也若其人素有女勞下之則熱入於腎雖黃微黑久久必變為黑疸也目青者精傷也面黑者腎傷也心中如噉蒜虀狀胃傷也大便黑色血傷也皮膚不仁血痹也此等證皆因酒疸脈浮弱者應吐而反下之之誤使然也集注趙良曰酒疸之黑非女勞疸之黑也蓋女勞之黑腎氣所發也酒疸之黑敗血之黑也因酒之濕熱傷脾胃脾胃不和陽氣不化陰氣不運若更下之久久則運化之用愈耗矣氣耗血積故腐瘀濁色越出面為黑味變於心咽作嘈雜心辣如噉蒜虀狀榮血衰而不行於皮膚抓之不仁輸於大腸便如黑漆其目青與脈浮弦皆血病也諸黃豬膏髮煎主之按諸黃謂一切黃也皆主豬膏髮煎恐未必盡然醫者審之此必有脫簡也集注程林曰扁鵲有黃經明堂有烙三十六黃法皆後人所未見唯聖濟總録載三十六黃方論詳明治法始備今豬膏髮煎能治諸黃當是黃之輕者可從小便而去至若陰黃急黃女勞之屬豈豬膏髮煎所能治乎醫者審之豬膏髮煎方豬膏半斤亂髮如雞子大三枚上二味和膏中煎之發消藥成分再服病從小便出諸黃腹滿而嘔者宜柴胡湯注嘔而腹痛胃實熱也然必有潮熱便硬始宜大柴胡湯兩解之若無潮熱便軟則當用小柴胡湯去黃芩加芍藥和之可也集注程林曰嘔而腹滿視其前後知何部不利利之則愈今黃家腹痛而嘔應內有實邪當是大柴胡湯以下之若小柴胡則可止嘔未可療腹痛也柴胡湯方見寒疝嘔吐中嘔吐噦下利病脈證并治第十七夫嘔家有癰膿不可治嘔膿盡自愈注嘔家嘔吐或穀或水或痰涎或冷沫今嘔而有膿此內有癰膿潰而嘔非嘔病也故曰不可治嘔膿盡自愈集注趙良曰經云熱聚於胃口而不行胃脘為壅胃脘屬陽明經陽明氣逆則嘔故膿不自咳出從嘔而出此癰之在胃脘上口者也若過半中在肺之下者膿則不從嘔出而從大便出矣程林曰夫癰潰則為膿膿上出必令嘔故不必治其嘔膿盡則嘔自止也先嘔却渴者此為欲解先渴却嘔者為水停心下此屬飲家注嘔病後渴飲而不嘔為胃氣和此欲解也因渴而後嘔嘔而復渴為水停心下此屬飲家之嘔非嘔病也集注趙良曰嘔則飲去飲去則陽氣回津液猶未布故渴耳雖渴終以邪去正回而必解也先渴却嘔者即前痰飲條中小半夏茯苓湯之證也程林曰先嘔却渴者為嘔後而胃無津液得水和之即愈先渴却嘔者本渴而飲水水停胃中作嘔也故屬水飲尤怡曰嘔家必有停痰宿水先嘔却渴者痰水已去而胃氣將復也故曰此為欲解先渴却嘔者因熱飲水過多熱雖解而飲旋積也此嘔因積飲所致故曰此為飲家嘔家本渴今反不渴者以心下有支飲故也此屬支飲注嘔病之人津液已傷本應渴也今反不渴者以心下素有支飲故也此屬支飲之嘔非嘔病也集注徐彬曰支飲者偏旁而不中正也高世栻曰支飲者水氣循經屈曲支行其形如腫是也支飲而嘔故曰此屬支飲飲咳篇云嘔家本渴渴為欲解今反不渴心下有支飲故也小半夏湯主之諸嘔吐穀不得下者小半夏湯主之注此詳諸嘔吐之病以明其治也嘔者有聲有物之謂也吐者有物無聲之謂也凡諸嘔吐飲食不得下咽者主之小半夏湯降逆安胃也集注趙良曰嘔吐穀不得下者有寒有熱不可概論也食入即吐熱也朝食暮吐寒也此則非寒非熱由中焦停飲氣結而逆故用小半夏湯沈明宗曰此痰飲多而致嘔之方也外邪內入而嘔必自飲食稍進此痰飲多而外邪少拒格胸胃之間氣逆而穀不得入故用生薑散邪半夏以消痰飲而止嘔逆小半夏湯方見痰飲中嘔吐而病在膈上後思水者解急與之思水者豬苓散主之注此詳申上條飲嘔以明其治也嘔吐病後則傷膈上津液若思水者急與飲之不復嘔吐者是病去胃和自解也思水者與飲之而仍嘔吐者是病未除而有水飲也主之豬苓散者利水以止嘔吐也集注程林曰上章言先嘔却渴此為欲解今嘔吐而病在膈上後思水者解亦與上證不殊故急與之以和胃然思水之人又有得水而貪飲則胃中熱少不能消水更與人作病故思水者用豬苓散以散水飲魏荔彤曰嘔吐而病在膈上後思水者欲解之徵也即論中所言先嘔後渴此為欲解之義也急與之嘔吐後傷津液水入而津液可復也若夫未曾嘔吐即思水者即論中所言先渴却嘔之證也是為水停心下應治其支飲而渴方愈也主以豬苓散利水補土以治濕邪者治渴而即以治上逆之嘔吐也豬苓散方豬苓茯苓白朮各等分上三味杵為散飲服方寸匕日三服嘔而發熱者小柴胡湯主之注嘔而腹滿是有裏也主之大柴胡湯攻裏以止嘔也今嘔而發熱是有表也主之小柴胡湯和表以止嘔也集注程林曰經曰嘔而發熱者柴胡湯證具夫嘔家未有發熱者以發熱屬半表半裏故與小柴胡湯以和之李彣曰傷寒發熱者為表證然邪欲侵裏裏氣拒而不納則逆而作嘔此半表半裏證也小柴胡為治半表半裏和解之劑小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草三兩半夏半升生薑三兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之注嘔而心煩心中懊憹內熱之嘔也今嘔而脈弱正氣虛也小便復利中寒盛也身有微熱而復見厥曰難治者此為寒盛格熱於外非嘔而發熱者比故以四逆湯勝陰回陽也集注高世栻曰嘔者水去寒猶在上小便當少今復利者寒亦在下也脈弱者氣衰於內身微熱者格陽於外嘔證如是則上下寒而內外虛若見手足逆冷而厥者則表裏陰陽之氣不相順接故為難治四逆湯主之生附子壯火回陽以治厥乾薑溫脾暖胃以治嘔甘草安中調上下以治內外也四逆湯方附子生用一枚乾薑一兩半甘草炙二兩上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩嘔而胸滿者茱萸湯主之注嘔逆之氣上衝於胸胸中氣實則不受邪必不滿也若胸中氣虛客寒邪氣得以留連故胸滿也主之吳茱萸湯補正氣降邪氣也集注徐彬曰胸乃陽位嘔為陰邪使胸之陽氣足以御之則不嘔嘔亦胸中無恙也乃嘔而胸滿是胸虛邪客不但胃不和矣虛邪屬陰故以吳茱萸之苦辛溫善驅濁陰者為君人參補虛為佐而以薑棗宣發上焦之正氣也茱萸湯方吳茱萸一升人參三兩生薑六兩大棗十二枚上四味以水五升煮取三升溫服七合日三服嘔而腸鳴心下痞者半夏瀉心湯主之注嘔而腸鳴腸虛而寒也嘔而心下痞胃實而熱也並見之乃下寒上熱腸虛胃實之病也故主之半夏瀉心湯用參草大棗以補正虛半夏以降客逆乾薑以勝中寒芩連以瀉結熱也集注程林曰嘔而腸鳴心下痞者此邪熱乘虛而客於心下故用芩連泄熱除痞乾薑半夏散逆止嘔內經曰脾胃虛則腸鳴又曰中氣不足腸為之苦鳴人參大棗甘草用以補中而和腸胃半夏瀉心湯方半夏洗半升黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草炙三兩上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服乾嘔吐逆吐涎沫半夏乾薑散主之注有聲有物謂之嘔有聲無物謂之噦即乾嘔也今有聲無物而吐涎沫故曰乾嘔吐逆吐涎沫也乾嘔吐酸苦胃中熱也乾嘔吐涎沫胃中寒也主之半夏乾薑散溫中止嘔也半夏乾薑散方半夏乾薑等分上二味杵為散取方寸匕漿水一升半煎取七合頓服之乾嘔吐涎沫頭痛者茱萸湯主之注乾嘔吐涎沫者以半夏乾薑散溫中止嘔也若更頭痛此屬寒氣盛而逆之甚也故用吳茱萸湯溫寒下氣大折衝逆之勢也集注徐彬曰上焦有寒其口多涎上焦既有寒邪格陽在上故主頭痛用吳茱萸溫補以驅濁陰也李彣曰太陰少陰經從足至胸俱不上頭二經並無頭痛證厥陰經上出額與督脈會於巔故乾嘔吐涎沫者裏寒也頭痛者寒氣從經脈上攻也不用桂附用吳茱萸者以其入厥陰經故耳餘皆溫補散寒之藥乾嘔而利者黃芩加半夏生薑湯主之注乾嘔者胃氣逆也若下利清徹乃腸中寒也今下利濁黏是腸中熱也故用黃芩湯以治其利合半夏生薑湯以治乾嘔也集注程林曰中焦不和則氣逆於上而作嘔迫於下而為利故用半夏生薑入上焦而止嘔甘草大棗入中焦而和脾黃芩芍藥入下焦而止利如是則正氣安而邪氣去三焦和而嘔利止矣魏荔彤曰此嘔為熱逆之嘔利為挾熱之利黃芩加半夏生薑湯方黃芩三兩甘草炙二兩芍藥二兩半夏半升生薑三兩大棗十二枚上六味以水一斗煮取三升去滓溫服一升日再夜一服食已即吐者大黃甘草湯主之注吐者有物無聲之謂也朝食暮吐者寒也食己即吐者火也以寒性遲火性急也故以大黃甘草湯緩中瀉火火平自不吐也集注王肯堂曰病人欲吐者不可下之又用大黃甘草治食已即吐何也曰欲吐者其病在上因而越之可也而逆之使下則必抑塞憤亂而益甚故禁之若既已吐矣吐而不已有升無降則當逆而折之引令下行無速於大黃故取之也程林曰經云諸逆衝上皆屬於火食已即吐是胃熱上逆而不能容食與反胃寒嘔水飲不同故用是湯以平胃熱高世栻曰食己即吐者非宿穀不化之胃反乃火熱攻衝之吐逆大黃甘草湯方大黃四兩甘草一兩上二味以水三升煮取一升分溫再服病人欲吐者不可下之注病人欲吐上越之勢方盛故不可下之若病人吐後其勢衰矣因其衰而濟之故已吐有可下之法也集注徐彬曰治病之法貴因勢利導故內經曰在上者越之在下者竭之今病欲上吐不可強之使下凡病皆然故曰病人欲吐者不可下之程林曰按欲字乃吐而未吐之義病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之注此承上條詳申欲吐之狀以明其治也喘者呼吸氣急也似喘不喘謂胸中似喘之不快而不似喘之氣急也嘔者吐物而有聲也似嘔不嘔謂似作嘔之狀而不似嘔之有物也噦者乾嘔也似噦不噦謂似乎噦之有聲而不似噦之聲連連也胸徹心中憒憒然無奈者總形容似喘不喘似嘔不嘔似噦不噦心中憒亂無奈懊憹欲吐之情狀也故以半夏降逆生薑安胃也集注沈明宗曰似喘不喘似嘔不嘔似噦不噦誠不是喘不是嘔不是噦也徹者通也竟是通心中憒憒然無奈即泛泛惡心之義也生薑半夏湯方半夏半升生薑汁一升上二味以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一服止停後服集解李彣曰生薑半夏辛溫之氣足以散水飲而舒陽氣然待小冷服者恐寒飲固結於中拒熱藥而不納反致嘔逆今熱藥冷飲下嗌之後冷體既消熱性便發情且不違而致大益此內經之旨也此方與前半夏乾薑湯略同但前溫中氣故用乾薑此散停飲故用生薑前因嘔吐上逆頓服之則藥力猛峻足以止逆降氣嘔吐立除此心中無奈寒飲內結難以猝消故分四服使胸中邪氣徐徐散也吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛按文蛤湯主之五字當在頭痛之下文義始屬是傳寫之訛兼主之主字衍文也注吐後而渴當少少與飲之胃和吐自止也若恣意貪飲則新飲復停而吐必不已也當從飲吐治之若兼感微風脈必緊頭必痛主之文蛤湯者是治渴兼治風水也故以越婢湯方中加文蛤越婢散風水也文蛤治渴不己也集注程林曰貪飲者飲水必多多則淫溢上焦必有溢飲之患故用此湯以散水飲方中皆辛甘發散之藥故亦主微風脈緊頭痛文蛤湯方文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十個大棗十二枚上七味以水六升煮取二升溫服一升汗出即愈集解李彣曰文蛤湯即大青龍湯去桂枝乃發汗之劑使水飲從毛竅中泄去以散水飲於外經云開鬼門潔淨府此一方兩得之以內有麻黃生薑等解表藥故兼主微風脈緊頭痛問曰病人脈數數為熱當消穀飲食而反吐者何也師曰以發其汗令陽氣微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛按問曰病人脈數至胃中虛冷故也等句己詳傷寒論陽明篇內錯簡在此且與脈弦者虛也文義不屬注弦飲脈也非虛脈也病吐者若見之則為胃氣無餘也胃氣無餘肝邪乘之而見弦脈故名曰虛也詢其所以致弦之由乃為寒在上醫反下之使胃氣盡而無餘則不能消化水穀致令朝食暮吐暮食朝吐變為中寒胃反也集注李彣曰食不得入是有火也食入反出是無火也此寒在上者法當溫中始愈反下之則愈虛寒而愈吐矣寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷按此條文義不屬必是錯簡跗陽脈浮而澀浮則為虛虛則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治按虛則傷脾之虛字當是澀字是傳寫之訛注前條因誤下而病胃反則脈弦此條不因誤下而病胃反則脈浮而澀也跗陽脈見浮而澀浮以候胃澀以候脾浮而無力為胃虛澀而無力為傷脾胃虛脾傷則不能消磨水穀故朝食暮吐暮食朝吐所吐皆仍然不化之宿穀故曰胃反也若脈緊澀則為邪盛正衰故其病難治也集注徐彬曰緊為寒盛澀為液竭正不勝邪故曰難治胃反嘔吐者大半夏湯主之注此承上條以明其治也胃反嘔吐者謂朝食暮吐暮食朝吐之嘔吐也主之大半夏湯者補脾胃止嘔吐也大半夏湯方半夏洗浣用二升人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮藥取一升半溫服一升餘分再服千金方云大半夏湯治胃反不受食食入即吐外臺方云大半夏湯治嘔心下痞硬者集解高世栻曰朝食暮吐宿穀不化名曰胃反胃反但吐不嘔然吐不離乎嘔故曰胃反嘔吐者用半夏助燥氣以消穀人參補元氣以安胃白蜜入水揚之使甘味散於水中水得蜜而和緩蜜得水而淡滲庶胃反平而嘔吐愈李升璽曰嘔家不宜甘味此用白蜜何也不知此胃反自屬脾虛經所謂甘味入脾歸其所喜是也況君以半夏味辛而止嘔佐以人參溫氣而補中胃反自立止矣胃反吐而渴欲飲水者茯苓澤瀉湯主之注胃反吐而不渴者寒也渴欲飲水者飲也故以茯苓澤瀉湯補陽利水也茯苓澤瀉湯方茯苓半斤澤瀉四兩甘草二兩桂枝二兩白朮三兩生薑四兩上六味以水一斗煮取三升內澤瀉再煮取二升半溫服八合日三服外臺方云茯苓澤瀉湯治消渴胃反脈絶集解李彣曰吐而渴者津液亡而胃虛燥也飲水則水停心下茯苓澤瀉降氣行飲白朮補脾生津此五苓散原方之義也然胃反因脾氣虛逆故加生薑散逆甘草和脾又五苓散治外有微熱故用桂枝此胃反無表熱而亦用之者桂枝非一於攻表藥也乃徹上徹下達表裏為通行津液和陽散水之劑也尤怡曰茯苓澤瀉湯治吐未已而渴欲飲水者以吐未已知邪未去則宜桂枝甘薑散邪氣茯苓澤瀉消水氣也噦逆者橘皮竹茹湯主之注噦即乾嘔也因其有噦吵之聲而無他物故不曰乾嘔而曰噦逆屬氣上逆為病也上逆之氣得出上竅皆能作聲故肺虛氣上逆則作咳氣從喉出而有咳逆之聲若為邪所阻則為喘滿故無聲也胃虛氣上逆則作噦氣從咽出而有噦逆之聲若與物凝結則為痞痛故無聲也是知氣病也明矣然邪氣所湊正氣必虛故用橘皮竹茹生薑以清邪氣人參甘草大棗以補正氣則上逆之氣自可順矣橘皮竹茹湯方橘皮二斤竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩上六味以水一斗煮取三升溫服一升日三服集解李彣曰噦有屬胃寒者有屬胃熱者此噦逆因胃中虛熱氣逆所致故用人參甘草大棗補虛橘皮生薑散逆竹茹甘寒疏逆氣而清胃熱因以為君尤怡曰胃虛而熱乘之則作噦逆橘皮生薑和胃散逆竹茹除熱止嘔噦人參甘草大棗益虛安中也乾嘔噦若手足厥者橘皮湯主之注乾嘔噦猶言乾嘔即噦也東垣以乾嘔為輕噦為重識仲景措辭之意也噦而手足厥乃胃陽虛是吳茱萸湯證也若初病形氣俱實雖手足厥非陽虛陰盛者比乃氣閉不達於四肢也故單以橘皮通氣生薑止噦也集注程林曰乾嘔噦則氣逆於胸膈間而不行於四末故手足為之厥橘皮能降逆氣生薑嘔家聖藥小劑以和之也然乾嘔非反胃厥非無陽故下咽氣行即愈橘皮湯方橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽則愈噦而腹滿視其前後知何部不利利之即愈注噦虛邪也噦而不腹滿者為正氣虛兼有熱者以橘皮竹茹湯主之兼有寒者以吳茱萸湯主之噦而腹滿者為邪氣實當視其二便大便不利者下之小便不利者通之即愈也集注朱肱曰前部不利豬苓湯後部不利調胃承氣湯趙良曰腹滿為實實則氣上逆而作噦故必視其前後何部不利而利之則滿去而噦止魏荔彤曰胃氣上逆沖而為噦治法當視其前後審大小便調不調也前部不利者水邪之逆也當利其小便而噦愈後部不利者熱邪實也當利其大使而噦愈夫六府氣絶於外者手足寒上氣腳縮五藏氣絶於內者利不禁下甚者手足不仁注氣絶非謂脫絶乃謂虛絶也六府之氣陽也陽氣虛不溫於外則手足寒縮陽虛則陰盛上逆故嘔吐噦也五藏之氣陰也陰氣虛不固於中則下利不禁利甚則中脫形衰故手足不仁也此發明嘔吐下利之原委也下利清穀裏寒外熱汗出而厥者通脈四逆湯主之注下利清穀裏寒也外熱汗出而厥陽亡也主之以通脈四逆湯回陽勝寒而利自止也通脈四逆湯方附子生用大者一枚乾薑三兩強人可四兩甘草炙二兩上三味以水三升煮取一升二合去滓分溫再服下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負跗陽者為順也按此條反微喘者死之下有少陰負跗陽者為順也一句文義不屬其注已詳見傷寒論辨脈篇內不復釋注下利手足厥冷脈絶無者有陰無陽之脈證也雖用理中四逆輩恐其緩不及事急灸臍下以通其陽若脈還手足溫者生脈不還手足不溫反微喘者陽氣上脫也故死集注程林曰下利而至於手足厥冷無脈則獨陰無陽灸之以復其陽而脈絶不來反微喘者則正氣又脫於上孤陽無根故死下利氣者當利其小便注下利氣者初利則為氣鬱於大腸而不外滲水氣併下但當利其小便輸其滲瀉之竅氣宣而利止也久利則為氣陷於大腸而不上舉又當於升補中兼利小便也集注尤怡曰下利氣者氣隨利失即所謂氣利是也氣利訶黎勒散主之注氣利所下之氣穢臭所利之物稠黏則為氣滯不宣或下之或利之皆可也若所利之氣不臭所下之物不黏則謂氣陷腸滑故用訶黎勒散以固腸或用補中益氣以舉陷亦可訶黎勒散方訶黎勒煨十枚上一味為散粥飲和頓服集解李彣曰氣利者下利氣虛下陷而滑脫也訶黎勒性斂澀能溫胃固腸粥飲和者假穀氣以助胃頓服者藥味併下更有力也尤怡曰氣利氣與屎俱失也訶黎勒澀腸而利氣粥飲安中益腸胃頓服者補下治下制以急也若下利脈數有微熱汗出令自愈設脈緊為未解注下利脈數內熱利也微熱汗出其邪衰矣故令自愈設脈緊者是表未衰故為未解也集注程林曰寒則下利脈數有微熱則裏寒去汗出則表氣和表裏俱和故令自愈設復緊者知寒邪尚在是為未解也下利有微熱而渴脈弱者令自愈注下利大熱而渴則為邪盛脈弱則為正虛不能愈也今微熱而渴脈弱者邪正俱衰故知自愈也集注程林曰下利大熱而渴則偏於陽無熱不渴則偏於陰皆不能愈以微熱而渴知陰陽和脈弱知邪氣去故即自愈下利脈數而渴者令自愈設不瘥必圊膿血以有熱故也注此承上條邪正俱衰病當自愈而不愈之義也設不瘥者則必表和熱退而數渴仍然是裏熱未除也故圊膿血集注魏荔彤曰下利固以陽氣有餘為吉又不可太盛成熱邪傷陰致陽復有偏勝之患下利寸脈反浮數尺中自澀者必圊膿血注此承上表裏已和病當自愈而不愈之義也下利裏病而得浮數表脈故曰脈反浮數也但尺中自澀則知熱陷血分必圊膿血也集注徐彬曰下利屬寒脈應沉遲反浮數其陽勝可知而尺中自澀澀為陽邪入陰此亦熱多故曰必圊膿血程林曰寸脈浮數為熱有餘尺脈自澀為血不足以熱有餘則挾熱而便膿血下利三部脈皆平按之心下堅者急下之宜大承氣湯注下利之人心下硬者諸瀉心湯證也若寸關尺三部脈皆平實有力雖下利宜攻堅也集注李彣曰下利按之心下堅者實也設或脈見微弱猶未可下今三部脈皆平則裏氣不虛可知自宜急下之此憑脈又憑證之法也大承氣湯方見痙病中下利脈遲而滑者實也利未欲止急下之宜大承氣湯注脈遲不能兼滑惟浮取之遲沉取之滑則有之矣今下利脈遲而滑謂浮遲而沉滑也浮遲則外和沉滑則內實欲止內實之下利當下之積去則止宜大承氣湯集注尤怡曰脈遲為寒然與滑俱見則不為寒而反為實以中實有物能阻其脈遲行夫利因實而致者實不去則利不止故宜急下下利脈反滑者當有所去下乃愈宜大承氣湯注下利脈反滑者是病虛脈實不相宜也若其人形氣如常飲食如故乃有當去之積未去也下之乃愈宜大承氣湯集注趙良曰下利虛證也脈滑實脈也以下利之虛證而反見滑實之脈故當有所去也程林曰經云滑為有宿食故當下去之而利自止下利已瘥至其年月日時復發者以病不盡故也當下之宜大承氣湯注下利瘥後至其或年或月或日而復發其利者此宿食積病攻之不盡故也若其人形氣不衰飲食尚強當攻其未盡自不復發其利也宜大承氣湯集注沈明宗曰此舊積之邪復病也下利瘥後至其年月日時復發者是前次下利之邪隱僻腸間今值藏府司令之期觸動舊邪而復發然隱僻之根未除終不能愈故用大承氣迅除之耳下利譫語者有燥屎也小承氣湯主之注下利裏虛證也譫語裏實證也何以決其有燥屎也若脈滑數知有宿食也其利穢黏知有積熱也然必脈證如此始可知其有燥屎也宜下之以小承氣湯於此推之而燥屎又不在大便硬不硬也集注李彣曰經云實則譫語故知有燥屎宜下小承氣湯方大黃四兩厚朴炙三兩枳實炙大者三枚上三味以水四升煮取一升二合去滓分溫二服得利則止下利脈反弦發熱身汗者自愈注下利脾病也弦肝脈也脾病不當見弦脈故曰脈反弦也下利裏病也發熱表證也若發熱身汗則為表與裏和雖脈弦亦可自愈也下利脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死注沉主裏弦主急下重後重也下利脈沉弦者故裏急後重也滯下之證發熱脈大則邪盛為未已也脈微弱數者則邪衰病當自止雖發熱不死也由此可知脈大身熱者死也熱利下重者白頭翁湯主之注此承上條以明其治也下利膿血裏急後重積熱已深故以白頭翁湯大苦大寒寒能勝熱苦能燥濕濕熱去下重自除矣集注程林曰熱利下重則熱迫於腸胃非苦不足以堅下焦非寒不足以除熱故加一熱字別以上之寒利尤怡曰此證濕熱下注故用白頭翁湯苦以除濕寒以勝熱也白頭翁湯方白頭翁黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服下利便膿血者桃花湯主之注初病下利便膿血者大承氣湯或芍藥湯下之熱盛者白頭翁湯清之若日久滑脫則當以桃花湯養腸固脫可也桃花湯方赤石脂一半銼一半篩末一斤乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫七合內赤石脂末方寸匕日三服若一服愈餘勿服下利清穀不可攻其表汗出必脹滿注詳見傷寒論太陰篇內不復釋下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也注詳見傷寒論厥陰篇內不復釋下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯注詳見傷寒論大陰篇內不復釋桂枝湯方桂枝三兩芍藥三兩甘草炙三兩生薑三兩大棗十二枚上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升以助藥力溫覆令一時許遍身漐漐微似有汗益佳不可令如水淋漓若一服汗出病瘥停後服下利後更煩按之心下濡者為虛煩也梔子豉湯主之注詳見傷寒論太陽中篇內不復釋梔子豉湯方梔子十四枚香豉綿裹四合上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分二服溫進一服得吐則止下利肺痛紫參湯主之按此文脫簡不釋紫參湯方紫參半斤甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服瘡癰腸癰浸淫病脈證并治第十八諸浮數脈應當發熱而反灑淅惡寒若有痛處當發其癰注諸浮數脈謂寸關尺六脈俱浮數也浮脈主表數脈主熱若是表邪則當發熱而灑淅惡寒也今非表邪應當發熱不當惡寒若有痛處乃當發癰之診非表邪之診也集注周揚俊曰病之將發脈必兆之夫浮數陽也熱也浮數兼見為陽中之陽是其熱必盡顯於外矣而反灑淅惡寒證不相應何哉必其氣血凝滯營衛不和如經所謂營氣不從逆於肉理乃生癰腫陽氣有餘營氣不行乃發為癰是也況其身已有痛處乎夫脈之見者陽也其將發而痛者亦屬陽故曰當發其癰師曰諸癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿注諸癰腫者謂諸陰陽癰腫也不論陰陽凡諸癰腫欲知有膿無膿當以手掩之腫上熱則能腐化成膿故熱者為有膿不熱者為無膿也集注周揚俊曰師之所以教人知癰已成欲其潰未成托之起也腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿薏苡附子敗醬散主之注癰生於內則氣血為癰所奪不能外營肌膚故枯皺如甲錯也腹皮急似腫脹但按之軟詢之腹無積聚審之身無表熱診之脈數非有外證也此為腸內有癰膿也主之薏苡附子敗醬散流通腸胃消癰腫也薏苡附子敗醬散方薏苡仁十分附子二分敗醬一名苦菜五分上三味杵為末取方寸匕以水二升煎減半頓服小便當下集解徐彬曰薏苡寒能除熱兼下氣勝濕利腸胃破毒腫敗醬善排膿破血利結熱毒氣故以為臣附子導熱行結故為反佐腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之注此承上條詳發其證以明其治也腸癰者其證則少腹腫硬按之即痛可知癰在內也尿時如淋尿色自調可知腫礙之也時時發熱汗出惡寒似有表病而實非表病也其脈遲緊則陰盛血未化其膿未成可下之大便當有血也若其脈洪數則陽盛血已腐其膿已成不可下也下之以大黃牡丹湯消瘀瀉熱也大黃牡丹湯方大黃四兩牡丹一兩桃仁五十個芒硝三合瓜子半升上五味以水六升煮取一升去滓內芒硝再煎沸頓服之有膿當下如無膿當下血集解李彣曰大黃芒硝泄熱桃仁行瘀丹皮逐血痹去血分中伏火瓜子主潰膿血問曰寸口脈微而澀法當亡血若汗出設不汗者云何答曰若身有瘡被刀斧所傷亡血故也注脈微氣奪也脈澀血奪也故曰法當亡血汗出也設無亡血汗出等病則必身有瘡被刀斧所傷亡血故也集注李彣曰汗出亡陽則脈微亡血傷陰則脈澀微與澀皆陰脈也設不汗而瘡瘍金瘡雖不亡陽而亡血故亦見微澀之脈也總是營衛虛衰之故病金瘡王不留行散主之注此承上條以明其治也金瘡謂刀斧所傷之瘡也亡血過多經絡血虛風寒易得干之故用王不留行散一以止血出一以防外邪也小瘡粉之即外敷也王不留行散方王不留行八月八日採十分蒴藋細葉七月七日採十分桑東南根白皮三月三日採十分甘草十八分川椒除目及閉口去汗三分黃芩二分乾薑二分芍藥二分厚朴二分上九味桑根皮以上三味燒灰存性勿令灰過各別杵篩合治之為散服方寸匕小瘡即粉之大瘡但服之産後亦可服如風寒桑東根勿取之前三物皆陰乾百日集解徐彬曰此乃概治金瘡方也蓋王不留行性苦平能通利血脈故反能止金瘡血逐痛蒴藋亦通利氣血尤善開痹周身肌肉肺主之桑根白皮最利肺氣東南根向陽生氣尤全以復肌肉之主氣故以此三物甚多為君甘草解毒和榮尤多為臣椒薑以養其胸中之陽厚朴以疏其內結之氣芩芍以清其陰分之熱為佐若有風寒此屬經絡客邪桑皮止利肺氣不能逐外邪故勿取浸淫瘡從口流向四肢者可治從四肢流來入口者不可治注浸淫瘡者浸謂浸浸淫謂不已謂此瘡浸淫留連不已也從口流向四肢者輕以從內走外也故曰可治從四肢流走入口者重以從外走內也故曰不可治浸淫者猶今之癩癘之類浸淫瘡黃連粉主之按此承上條以明其治黃連粉方脫簡集解尤怡曰黃連粉方未見大意以此為濕熱浸淫之病故取黃連一味為粉粉之苦以燥濕寒以除熱也跌蹶手指臂腫轉筋陰狐疝蛔蟲病脈證并治第十九師曰病跌蹶其人但能前不能却刺腨入二寸此太陽經傷也按證刺俱未詳必有缺文不釋病人常以手指臂腫動此人身體瞤瞤者藜蘆甘草湯主之按證未詳方亦缺不釋藜蘆甘草湯方缺轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白散主之注臂同背古通用臂腳直謂足背強直不能屈伸是轉筋之證也脈上下行謂迢迢長直微弦不和是轉筋之脈也中寒之人外寒盛則手足拘急轉筋痛不能忍甚者入腹則牽連少腹拘急而痛也主之雞屎白散以治風寒痹氣之在筋也雞屎白散方雞屎白上一味為散取方寸匕以水六合和溫服陰狐疝氣者偏有大小時時上下蜘蛛散主之注偏有大小謂睪丸左右有大小也時時上下謂睪丸入腹時出時入也疝厥陰之病也以與狐情狀相類故名之也主之蜘蛛散入肝以治少腹拘急而痛也集注趙良曰睪丸上下有若狐之出入無時也故曰狐疝李彣曰偏有大小以睪丸言時時上下以睪丸入小腹出囊中言尤怡曰陰狐疝氣者寒濕襲陰而睪丸受病或左或右大小不同或上或下出沒無時故名狐疝蜘蛛散方蜘蛛熬煎十四枚桂枝半兩上二味為散取八分一匕飲和服日再服蜜丸亦可集解尤怡曰蜘蛛有毒服之能令人利合桂枝辛溫入陰而逐其寒濕之氣也問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲按腹痛有蟲以洪大脈別之未詳必有缺文不釋蛔蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之注蛔蟲即今之人所名食蟲也蛔蟲之為病發作有時發則令人吐涎心痛欲死即服攻下毒藥非積之痛乃蟲之痛故不能止也主之甘草粉蜜湯者以蟲得甘蜜而上得鉛粉而殺從治之法也集注徐彬曰發作有時謂不恆痛也則與虛寒之綿綿而痛者異矣毒藥不止則必治氣治血攻寒逐積之藥俱不應矣故以甘草粉蜜主之白粉殺蟲甘草與蜜既以和胃又以誘蛔也李彣曰靈樞云蛔動則胃緩胃緩則廉泉開故涎下令人吐涎也蛔上入膈心在膈上故心痛須臾下膈則痛止故發作有時也廉泉任脈穴名在頷下骨尖中甘草粉蜜湯方甘草二兩粉一兩蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升瘥即止集解李彣曰蛔得甘則動其性喜故也胡粉有毒能殺蟲置粉於甘草蜜湯中誘蛔食之也蛔厥者當吐蛔今病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之按此為藏寒之此字當是非字若是此字即是藏厥與辨蛔厥之義不屬注蛔厥者謂蛔痛手足厥冷也若藏寒痛厥則不吐蛔此蛔厥藏寒之所由分也靜而時煩乃蛔上入其膈故煩須臾復止得食又吐又煩是蛔聞食臭出故也主之烏梅丸者以蛔得酸則靜得辛則伏得苦則下方中大酸大辛大苦信為治蟲之要劑也烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤當歸四兩附子炮六兩川椒去汗四兩桂枝六兩人參六兩黃柏六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧子大先食飲服十丸日三服稍加至二十丸禁生冷滑臭等食集解李彣曰烏梅味酸黃連黃柏味苦桂枝蜀椒乾薑細辛味辛以蛔得酸則止得苦則安得甘則動於上得辛則伏於下也然胃氣虛寒人參附子以溫補之吐亡津液當歸以辛潤之則蛔厥可愈矣
