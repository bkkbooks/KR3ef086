body:
  text: 卷八正誤存疑篇金匱要略一書其世遠而就闕誤也與傷寒論等如漀飥之䅽字與緩中補虛用大黃䗪蟲丸主之之類俱不可以為法爰加斟酌其改移刪補諸式與夫存疑之二十八條悉倣傷寒論敘次云正誤藏府經絡先後第一師曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭腹中病按頭中病之頭字當是腹字經中從無頭中病之文且文義不屬當改之師曰吸而微數其病在中焦實也當下之卽愈虛者不治在上焦者其吸促遠在下焦者其吸遠促此皆難治呼吸動搖振振者不治按吸促之促字當是遠字吸遠之遠字當是促字方合病義當移之問曰寸脈沉大而滑沉則為實滑則為氣實氣相摶血厥氣入藏卽死入府卽愈此為卒厥何謂也師曰脣口青身冷為入藏卽死如身和汗自出為入府卽愈按寸脈沉大而滑沉則為實滑則為氣實氣相摶之十八字文理不順衍文也當刪之血氣入藏之血字當是厥字始與卒厥相合當改之問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰欬上氣喘噦咽腸鳴脹滿心痛拘急五藏病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中裏䅽漀飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡按字典無䅽字當是漀字漀音傾側水也後之積聚門䅽氣之䅽字亦誤問曰病有急當救裏救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救裏後身體疼痛清便自調者急當救表也按此條註詳見傷寒論太陰篇內故不復釋夫諸病在藏欲攻之當隨其所得而攻之如渴者小便不利與猪苓湯餘皆倣此按如渴者之下當有小便不利四字必是遺失當補之痙濕暍第二病者身熱足寒頸項强急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗者寒濕相摶其表益虛卽惡寒甚發其汗已其脈如蛇按痙病也之下諸句與上文義不屬與後條之為欲解脈如故諸句文義相屬宜分於彼太陽病發熱無汗反惡寒者名曰剛痙按反惡寒之反字衍文也玩痙病之條自知當惡寒也宜刪之若發其汗者寒濕相摶其表益虛卽惡寒甚發其汗已其脈如蛇暴腹脹大者為欲解脈如故反伏弦者痙按暴腹脹大者五字衍文也當刪之瘧病第四師曰瘧脈自弦弦數者多熱弦遲者多寒弦小沉緊者下之瘥弦遲者可温之弦浮緊者可發汗鍼灸也弦浮滑大者可吐之弦數者風發也以飲食消息止之按弦小緊者之小字當是沉字則有可下之理弦緊者當是弦浮緊則有可發汗之理弦浮大者當是弦滑大則有可吐之理且不遺本文瘧脈自弦之意當改之補之師曰陰氣孤絕陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰癉瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消鑠肌肉按此言癉瘧其文脫簡內經已詳不復釋温瘧者其脈如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯主之按此言温瘧其文脫筒內經已詳不復釋瘧多寒者名曰牝瘧蜀漆散主之按此言牝瘧其文脫簡內經已詳不復釋中風厯節第五寸口脈遲浮而緩遲浮則為寒風緩則為虛榮緩則為亡血衛緩則為中風邪氣中經浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣卽急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經卽重不勝邪入於府卽不識人邪入於藏舌卽難言口吐涎按寸口脈浮而緊緊則為寒浮則為虛寒虛相摶邪在皮膚此五句原文在本條之首當在後條之首寸口脈遲而緩遲則為寒緩則為虛榮緩則為亡血衛緩則為中風邪氣中經此六句原文在後條當在此條之首文氣始各得相屬必系錯簡當移之其中有浮者血虛一句必是衍文當刪之寸口脈遲而緩遲則為寒二遲字當是浮字寒字當是風字始得文義了然且遲緩二脈不能並見當改之寸口脈浮而緊緊則為寒浮則為虛風寒虛風相摶邪在皮膚則身癢而癮疹心氣不足邪氣入中則胸滿而短氣按浮則為虛寒虛相摶二虛字應是風字當改之味酸則傷筋筋傷則緩名曰泄鹹則傷骨骨傷則痿名曰枯枯泄相摶名曰斷泄絕榮氣不通衛不獨行榮衛俱微三焦無所御四屬斷絕身體羸瘦獨足腫大黃汗出脛冷假令發熱便為厯節也病厯節不可屈伸疼痛烏頭湯主之按名曰斷泄之泄字當是絕字始與下文相屬當改之諸肢節疼痛身體尫羸腳腫如脫頭眩短氣温温嗢嗢欲吐桂枝芍藥知母湯主之按温温應是嗢嗢當改之血痹虛勞第六人年五六十其病脈大者痹俠背行若腸鳴馬刀俠癭瘰者皆為勞得之按若腸鳴三字與上下文不屬必是錯簡當刪之俠癭之癭字當是瘰字且先勞後瘰先瘰後勞者有之從未見勞癭先後病也當改之勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒虛精自出酸削不能行按陰寒精自出之寒字應是虛字當改之男子面色白者主渴及亡血卒喘悸脈浮者裏虛也按脈浮者裏虛也句當是衍文夫失精家少腹弦急陰頭寒目眩發洛脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之按此條脈得諸芤五句與上文義不屬衍文也另分一條在本門十二條之次脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相摶此名為革婦人則半產漏下男子則亡血失精按此條註詳見傷寒論辨脈篇內故不復釋五勞極虛羸瘦腹滿不能飲食緩中補虛食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑大黃䗪蟲丸主之按兩目黯黑句下緩中補虛四字當在不能飲食之下必是傳寫之譌當移之肺痿肺癰欬嗽上氣第七問曰病欬逆脈之何以知此為肺痿肺癰當有膿血吐之則死其脈何類師曰寸口脈微浮而數微浮則為風數則為熱微浮則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則欬口乾喘滿咽燥不渴時唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死按肺癰之上當有肺痿二字不然本文論肺痿之義則無著落必是脫簡當補之脈微之三微字當是三浮字始與文氣相屬當改之大火逆上氣咽喉不利止逆下氣者麥門冬湯主之按大逆上氣之大字當是火字文義病藥始相屬當改之腹滿寒疝宿食第十腹滿時減復如故此為寒當與温藥宜厚朴生薑甘草半夏人參湯主之按此篇無治虛寒腹滿之方當與温藥之下當有宜厚朴生薑甘草半夏人參湯主之十四字必是脫簡閱傷寒論太陰篇自知當補之病者痿黃躁燥而不渴胸胃中寒實而利不止者死按躁而不渴當是燥而不渴文氣通順胸中寒實當是胃中寒實若是胸中寒實如何曰下利不止者死當改之其脈數而緊乃弦狀如弓弦按之不移脈數弦者脈緊大而遲者必心下堅當下其寒脈大而緊者陽中有陰可下之按其脈數而緊乃弦狀如弓弦按之不移脈數弦者之十九字當是衍文閱傷寒論辨脈法自知刪之當下其寒四字當在必心下堅之下文義始屬當移之脇下偏滿痛發熱其脈緊弦此寒也以温藥下之宜大黃附子湯按脇下偏痛之偏字當是滿字當改之按之心下滿痛有潮熱者此為實也當下之宜大柴胡湯按按之心下滿痛之下當有有潮熱三字若無此三字則不當與大柴胡湯當補之腹痛脈弦而緊弦則衛氣不行卽惡寒緊則不欲食邪正相摶卽為寒疝繞臍痛苦發則白自汗出手足厥冷其脈沉緊者大烏頭煎主之按此條脈重出下條有證無脈其脈沉緊者五字當在下條裏急之下然脈弦而緊是勁急之甚當屬寒疝之重者其白汗之白字當是自字改之下條其脈沉緊者是裏痛之脈當屬寒疝之輕者當移之寒疝腹中痛及脇痛裏急其脈沉緊者當歸生薑羊肉湯主之按脇痛裏急之下當有上條其脈沉緊者五字寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之按抵當二字衍文也問曰人病有宿食何以別之師曰寸口脈浮而大按之反濇尺中亦微大而濇故知有宿食大承氣湯主之按尺中亦微而濇之微字當按傷寒論作大是字當改之五藏風寒積聚第十一肺中風者口燥而喘身頭運而重冒風而腫脹按身運而重當是頭運而身重冒而腫脹當是冒風而腫脹乃與文義始為相屬當改之補之肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也按兩臂不舉舌本燥二句而汗出三字文義不屬必是錯簡不可為後世法不釋肝著其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之按旋覆花湯主之六字與肝著之病不合當是衍文心傷者其人勞倦卽頭面赤而下重心中痛而自煩發熱當臍跳其脈弦沉此為心藏傷所致也按其脈弦之弦字當是沉字沉為腎脈文義相屬當改之邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲狂陽氣衰者為狂癲按陰氣衰者為癲之癲字當是狂字陽氣衰者為狂之狂字當是癲字內經曰重陰者癲重陽者狂當改之跗陽脈浮而濇浮則胃氣强濇則小便數浮濇相摶大便則堅其脾為約麻子仁丸主之按此條註詳見傷寒論陽明篇內故不復釋問曰病有積有聚有䅽漀氣何謂也師曰積者藏病也終不移聚者府病也發作有時展轉痛移為可治䅽漀氣者脇下痛按之則愈復發為䅽漀氣諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍傍上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之按䅽作漀解見首篇驚悸吐衄下血胸滿瘀血第十二病人面無血色無寒熱脈沉浮弦者衄脈浮沉弱手按之絕者下血煩欬者必吐血按脈沉當是脈浮脈浮當是脈沉文義始屬當改之寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶此名曰革婦人則半產漏下男子則亡血按此條註詳見傷寒辨脈篇內故不復釋心氣不足有餘吐血衄血瀉心湯主之按心氣不足二字當是有餘二字若是不足如何用此方治之當改之痰飲欬嗽第十三夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下裏虛脈偏弦者飲也按微者短氣句下古本有脈雙弦者寒也諸句文義不屬另分一條在本門二十七條之次假令瘦病人臍下有悸吐涎沫而癲巔眩此水也五苓散主之按瘦人之瘦字當是病字癲眩之癲字當是巔字巔者頭也文義始屬當改之夫心下有留飲其人背寒冷如掌大留飲者脇下痛引缺盆欬嗽則轉甚胸中有留飲其人短氣而渴喘四肢厯節痛脈沉者有留飲按此條古本於四肢厯節痛之下有脈沉者有留飲一句當另為一條始合論脈之義短氣而渴之渴字當是喘字四肢上當有缺文病者脈伏其人慾自利利反快此為留飲欲去故也雖利心下續堅滿甘遂半夏湯主之按心下續堅滿句下此為留飲欲去故也八字當在利反快之下此傳寫之譌當移之水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脇下支滿嚏而痛水在腎心臍下悸按心下悸之心字當是臍字當改之支飲胸腹滿者厚朴大黃湯主之按支飲胸滿之胸字當是腹字若是胸字無用承氣湯之理當改之脈弦數遲有寒飲冬夏難治按脈弦數之數字當是遲字始與寒飲之理合當改之欬逆倚息不得臥小青龍湯主之青龍湯下汗已多唾口燥寸脈沉尺脈微手足厥逆氣從少腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時復冒者與茯苓桂枝五味甘草湯治其氣衝按按小青龍湯下已之下字當是汗字蓋大小青龍湯皆汗劑也當改之消渴小便利淋第十四厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食卽吐蚘下之利不止按此條是傷寒論厥陰經正病與雜病消渴之義不同必是錯簡寸口脈浮而遲浮卽為虛遲卽為勞虛則衛氣不足勞則榮氣竭按此條當在虛勞篇中錯簡在此跗陽脈浮而數浮卽為氣數卽消穀而大便堅氣盛則溲數溲數卽堅堅數相摶卽為消渴按而大堅句不成文大字下當有便字當補之水氣病第十五少陰脈緊而沉沉則為水小便卽難脈得諸沉者當責有水身體腫重按脈得諸沉者一條乃始論水氣病之脈當列於篇首但古本脈得諸沉之上有少陰脈緊而沉四句文義不屬并有脫簡不釋且刪之夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絕者有水可下之按其人消渴之下古本有病水腹大小便不利其脈沉絕者有水可下之四句與上文義不屬當另分為一條在本門五條之次始合裏水脈證裏水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之按越婢加朮湯主之七字當在後太陽病脈浮而緊條內發汗卽愈之下文義始屬必是錯簡在此觀其裏有水之之文豈有用越婢加朮湯發表之藥自可知也心水者其身重而少氣不得臥煩而躁其人陰腫按其人陰腫四字當在腎水條內錯簡在此當移之腎水者其腹大臍腫腰痛不得尿陰下濕如牛鼻上汗其足逆冷面反瘦其人陰腫按面反瘦之下當補上條其人陰腫四字師曰寸口脈遲而濇遲則為寒濇為血不足跗陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿腸鳴相逐氣轉膀胱榮衛俱勞陽氣不通卽身冷陰氣不通卽骨疼陽氣前通則惡寒陰氣前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分桂枝去芍藥加麻黃附子細辛湯主之按名曰氣分之下當補入下條桂枝去芍藥加麻黃附子細辛湯主之十五字氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻黃附子細辛湯主之按氣分心下堅大如盤邊如旋杯水飲所作之十六字當是衍文觀心下堅之本條自知桂枝去芍藥加麻黃附子細辛湯主之之十五字當在上條氣分之下文氣始屬正是氣分之治法必是錯簡在此當移之脈浮而洪浮則為風洪則為氣風氣相摶風强則為隱疹身體為癢癢為泄風久為痂癩氣强則為水難以俯仰風氣相擊身體洪浮腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗按身體洪腫之洪字當是浮字改之此為黃汗四字當是衍文太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出卽愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節欬而喘不渴者此為脾肺脹其狀如腫發汗卽愈越婢加朮湯主之然諸病此者渴而下利小便數者皆不可發汗按脾脹之脾字當是肺字改之發汗卽愈之下當補入前條之越婢加朮湯主之七字裏皮水越婢加朮湯主之甘草麻黃湯亦主之按裏水之裏字當是皮字豈有裏水而用麻黃之理當改之厥而皮水者蒲灰散主之按厥而二字當是衍文水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣風水發其汗卽已脈沉者宜麻黃附子湯浮者宜杏子湯按為氣水之氣字當是風字若是氣字則無發汗之理且通篇並無氣水之病當改之黃疸病第十六腹滿舌身痿黃躁不得睡屬黃家按舌痿黃之舌字當是身字當改之黃疸病小便不利者茵陳五苓散主之按黃疸病之下當有小便不利者五字茵陳五苓散方有著落當補之嘔吐噦下利第十七吐後渴欲飲水而貪飲者兼主微風脈緊頭痛文蛤湯主之按文蛤湯主之五字當在頭痛之下文義始屬當移之兼主之主字衍文也問曰病人脈數數為熱當消穀引食而反吐者何也師曰以發其汗令陽氣微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛按問曰病人脈數至胃中虛冷故也等句已詳傷寒論陽明篇內錯簡在此且與脈弦者虛也文義不屬跗陽脈浮而濇浮則為虛虛濇則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而濇其病難治按虛則傷脾之虛字應是濇字當改之下利手足厥冷無脈者灸之不温若脈不還反微喘者死少陰負跗陽者為順也按此條反微喘者死之下有少陰負跗陽者為順也一句文義不屬其註已詳見傷寒論辨脈篇內故不復釋下利清穀不可攻其表汗出必脹滿按此條註詳見傷寒論太陰篇內故不復釋下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也按此條註詳見傷寒論厥陰篇內故不復釋下利腹脹滿身體疼痛者先温其裏乃攻其表温裏宜四逆湯攻表宜桂枝湯按此條註詳見傷寒論太陰篇內故不復釋下利後更煩按之心下濡者為虛煩也梔子豉湯主之按此條註詳見傷寒論太陽中篇故不復釋跌蹶手指臂腫轉筋陰狐疝蚘蟲病第十九蚘厥者當吐蚘今病者靜而復時煩此非為藏寒蚘上入膈故煩須臾復止得食而嘔又煩者蚘聞食臭出其人當自吐蚘蚘厥者烏梅丸主之按此為藏寒之此字當是非字若是此字何以辨寒厥當改之婦人產後病第二十一產後七八日無太陽證少腹堅痛此惡露不盡熱在裏結在膀胱也不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜卽愈宜大承氣湯主之按熱在裏結在膀胱也之八字當在本條上文惡露不盡之下未有大承氣湯下膀胱血之理當移之再倍二字當是衍文產後中風病痙者發熱面正赤喘而頭痛竹葉湯主之按產後中風之下當有病痙者三字始與方合若無此三字則人參附子施之於中風發熱可乎而又以竹葉命名者何所謂也且方內有頸項强用大附子之文本篇有證尤方則可知必有脫簡當補之婦人雜病第二十二婦人之病因虛積冷結氣為諸經水斷絕至有厯年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脇疼痛與藏相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下來未多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼痛奄忽眩冒狀如厥癲或有憂慘悲傷多嗔非有鬼神此皆帶下久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其鍼藥治危得安其雖同病脈各異源子當辨記勿謂不然按在下來多之來字當是未字本條皆經水斷絕之病若系來多則與上文不合與下文經候不勻亦不合當改之又本條內此皆帶下四字當在非有鬼神之下文義始屬當移之婦人藏躁喜悲傷欲哭象如神靈所作數欠伸甘草小麥大棗湯主之按甘草小麥大棗湯方義未詳必是譌錯問曰婦人年五十所病下利血數十日不止暮卽發熱少腹裏急腹滿手掌煩熱脣口乾燥何也師曰此病屬帶下何以故曾經半產瘀血在少腹不去何以知之其證脣口乾燥故知之當以温經湯主之按所病下利之利字當是血字文義始屬當改之帶下經水不利少腹滿痛經一月再不見者土瓜根散主之按再字當是不字若是再字一月兩來與上文不利不合當改之寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶此名曰革婦人則半產漏下旋覆花湯主之按此條詳在傷寒論辨脈法篇錯簡在此旋覆花湯主之一句亦必是錯簡半產漏下則氣已下陷焉有再用旋覆花下氣之理婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之按此條註詳見傷寒論少陽篇內故不復釋婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈按此條註詳見傷寒論少陽篇內故不復釋婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼和胸脇滿結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之按此條註詳見傷寒論少陽篇內故不復釋陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出則愈按此條註詳見傷寒論陽明篇內故不復釋胃氣下泄陰吹而正喧此穀氣之實也膏髮煎導之長服訶黎勒丸按膏髮煎導之五字當是衍文此穀氣之實也之下當有長服訶黎勒丸之六字後陰下氣謂之氣利用訶黎勒散前陰下氣謂之陰吹用訶黎勒丸文義始屬蓋訶黎勒丸以訶黎勒固下氣之虛以厚朴陳皮平穀氣之實藥病相合此方錯簡在雜療篇內下小兒疳蟲蝕齒一方殺蟲解毒或另有小兒門或列在雜方內茲列於婦人雜病之末亦錯簡也雜療第二十三長服訶黎勒丸方按此方當移在前篇穀氣之實也之下果實菜穀禁忌第二十五食躁式或躁方按食躁式躁之式字當是或字應改之存疑藏府經絡先後第一問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰欬上氣喘噦咽腸鳴脹滿心痛拘急五藏病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中裏䅽飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷干下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡百合狐惑陰陽毒第三論曰百合病者百脈一宗悉致其病也意欲食復不能食常默默然欲臥不能臥欲行不能行飲食或有美時或有不用聞食嗅時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每尿時頭痛者六十日乃愈若尿時頭不痛淅然者四十日愈若尿快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月微見者各隨證治之血痹虛勞第六男子平人脈虛弱細微者善盜汗也奔豚氣第八師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之腹滿寒疝宿食第十寒氣厥逆赤丸主之五藏風寒積聚第十一心中風者翕翕發熱不能起心中飢食卽嘔吐驚悸吐衄下血胸滿瘀血病第十二火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之心下悸者半夏麻黃丸主之痰飲欬嗽第十三欬逆倚息不得臥小青龍湯主之青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從少腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時復冒者與茯苓桂枝五味甘草湯治其氣衝衝氣卽低而反更欬胸滿者用苓桂五味甘草湯去桂加乾薑細辛以治其欬滿欬滿卽止而更復渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃發其陽故也若面熱如醉此為胃熱上衝熏其面加大黃以利之水氣病第十五寸口脈浮而遲浮脈則熱遲脈則潛熱潛相摶名曰沉跗陽脈浮而數浮脈卽熱數脈卽止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相摶水走皮膚卽為水矣寸口脈弦而緊弦則衛氣不行卽惡寒水不沾流走於腸間問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微欬喘審如師言其脈何類師曰寸口脈沉而緊沉則為水緊則為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後營衛相干陽損陰盛結寒微動腎氣上衝咽喉塞噎脇下急痛醫以為留飲而大下之氣擊不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小瘥食飲過度腫復如前胸脇苦痛象若奔豚其水揚溢則浮欬喘逆當先攻擊衝氣令止乃治欬欬止其喘自瘥先治新病病當在後黃汗之病兩脛自冷假令發熱此屬厯節食已汗出又身常暮臥盜汗出者此榮氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤卽胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之黃疸病第十六諸黃猪膏髮煎主之嘔吐噦下利病第十七下利肺痛紫參丸主之跌蹶手指臂腫轉筋陰狐疝蚘蟲病第十九師曰病跌蹶其人但能前不能却刺腨入二寸此太陽經傷也病人常以手指臂腫動此人身體瞤瞤者黎蘆甘草湯主之問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蚘蟲婦人妊娠第二十師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者却一月加吐下者則絕之婦人懷娠六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子藏開故也當以附子湯温其藏婦人懷妊腹中㽲痛當歸芍藥散主之妊娠小便難飲食如故當歸貝母苦參丸主之婦人傷胎懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈婦人產後第二十一婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之產後下利虛極白頭翁加甘草阿膠湯主之婦人雜病第二十二婦人陷經漏下黑不解膠薑湯主之雜療第二十三退五藏虛熱四時加減柴胡飲子治傷寒令愈不復紫石寒食散方
