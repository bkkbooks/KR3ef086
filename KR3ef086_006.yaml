body:
  text: 卷六婦人妊娠病脈證并治第二十師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者却一月加吐下者則絶之注婦人經斷得平脈無寒熱則內外無病其人渴不能食乃妊娠惡阻之漸也故陰脈雖小弱亦可斷為有孕但惡阻於法六十日當有此證設醫不知是孕而治逆其法却一月即有此證也若更加吐下者則宜絶止醫藥聽其自愈可也然脈平無寒熱用桂枝湯與妊娠渴不能食者不合且文義斷續不純其中必有脫簡集注徐彬曰平脈者不見病脈一如平人也陰脈小弱者脈形小不大軟弱無力非細也諸脈既平而獨下焦陰脈微見不同是中上二焦無病乃反見渴不能食之證則渴非上焦之熱不能食亦非胃家之病矣少陽有默默不欲食之證今無寒熱亦無少陽表證可疑矣是渴乃陰火上熾不能食乃惡心阻食陰脈小乃胎元蝕氣故曰名妊娠也李彣曰此節病證即妊娠惡阻是也寸為陽脈主氣尺為陰脈主血陰脈小弱者血不足也血以養胎則液竭而渴又脾為坤土厚德載物胎氣賴以奠安不能食者脾氣弱也凡有他病而渴不能食者脈必不平而有寒熱今雖不能食反得平脈又無寒熱故主妊娠桂枝湯方見下利中婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不足者其癥不去故也當下其癥桂枝茯苓丸主之注經斷有孕名曰妊娠妊娠下血則為漏下婦人宿有癥痼之疾而育胎者未及三月而得漏下下血不止胎動不安者此為癥痼害之也已及六月而得漏下下血胎動不安者此亦癥痼害之也然有血衃成塊者以前三月經雖斷血未盛胎尚弱未可下其癥痼也後三月血成衃胎已強故主之桂枝茯苓丸當下其癥痼也此示人妊娠有病當攻病之義也此條文義不純其中必有闕文姑存其理可也集注婁全善曰凡胎動多當臍今動在臍上者故知是癥也程林曰此有癥病而懷胎者雖有漏血不止皆癥痼之為害非胎動胎漏之證下其癥痼妊娠自安此內經所謂有故無殞亦無殞也方氏曰胎動胎漏皆下血而胎動有腹痛胎漏無腹痛故胎動宜行氣胎漏宜清熱魏荔彤曰胎與衃之辨當於血未斷之前三月求之前三月之經水順利則經斷必是胎前三月有曾經下血者則經斷必成衃桂枝茯苓丸桂枝茯苓牡丹去心桃仁去皮尖芍藥各等分上五味末之煉蜜和丸如兔屎大每日食前服一丸不知加至三丸婦人懷娠六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子藏開故也當以附子湯溫其藏方未見注婦人懷娠六七月脈弦發熱似表證也若其胎愈脹腹痛惡寒而無頭痛身痛則非表證也少腹如扇狀其惡寒如扇風之侵襲也所以然者因其人陽虛子藏開寒邪侵入故用附子湯溫子藏而逐寒但方缺文亦不純必有殘缺集注程林曰胎脹腹痛亦令人發熱惡寒少腹如扇者陰寒勝也妊娠陰陽調和則胎氣安今陽虛陰盛不能約束胞胎故子藏為之開也附子湯用以溫經李彣曰按子藏即子宮也臍下三寸為關元關元左二寸為胞門右二寸為子戶命門為女子系胞之處非謂命門即子藏也蓋命門是穴名在腰後兩腎中附脊骨之第十四椎之兩旁今經文明説少腹如扇者子藏開則子藏在少腹明矣豈有在少腹者而反謂其在脊後者乎此誤也尤怡曰脈弦發熱有似表證而乃身不痛而腹反痛背不惡寒而腹反惡寒甚至少腹陳陳作冷若或扇之者其所以然者子藏開不能闔而風冷之氣乘之也夫藏開風入其陰內勝則其脈弦為陰氣而發熱且為格陽矣胎脹者熱則消寒則脹也附子湯方未見然溫裏散寒之意概可推矣師曰婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之注五六月墮胎者謂之半産婦人有漏下下血之疾至五六月墮胎而下血不絶者此癥痼之害也若無癥痼下血惟腹中痛者則為胞阻胞阻者胞中氣血不和而阻其化育也故用芎歸膠艾湯溫和其血血和而胎育也集注程林曰漏下者妊娠經來脈經以陽不足謂之激經也半産者以四五月墮胎墮胎必傷其血海血因續下不絶也若妊娠下血腹中痛為胞阻則用膠艾湯以治尤怡曰婦人經水淋瀝及胎産前後下血不止者皆衝任脈虛而陰氣不能守也是惟膠艾湯能補而固之芎歸膠艾湯方芎藭阿膠甘草各二兩艾葉當歸各三兩芍藥四兩乾地黃上七味以水五升清酒三升合煮取三升去滓內膠令消盡溫服一升日三服不瘥更作婦人懷娠腹中㽱痛當歸芍藥散主之按妊娠腹中急痛用此方未詳其義必是脫簡不釋當歸芍藥散方當歸三兩芍藥一斤茯苓四兩白朮四兩澤瀉半斤芎藭半斤上六味杵為散取方寸匕酒和日二服妊娠嘔吐不止乾薑人參半夏丸主之注妊娠嘔吐謂之惡阻惡阻者謂胃中素有寒飲惡阻其胎而妨飲食也主之以乾薑去寒半夏止嘔惡阻之人日日嘔吐必傷胃氣故又佐人參也集注程林曰寒在胃脘則令嘔吐不止故用乾薑散寒半夏生薑止嘔人參和胃半夏乾薑能下胎婁全善云余治娠阻病纍用半夏未嘗動胎亦有故無殞之義臨病之工何必拘泥尤怡曰此益虛溫胃之法為妊娠中虛而有寒者設也夫陽明之脈順而下行者也有寒則逆有熱亦逆逆則飲必從之而妊娠之體精凝血聚每多蘊而成熱者矣按外臺方青竹茹橘皮半夏各五兩生薑茯苓各四兩麥冬人參各三兩為治胃熱氣逆嘔吐之法可補仲景之未備也乾薑人參半夏丸方乾薑人參各一兩半夏二兩上三味末之以生薑汁糊為丸如梧子大飲服十丸日三服妊娠小便難飲食如故當歸貝母苦參丸主之按方證不合必有脫簡不釋當歸貝母苦參丸方當歸貝母苦參各四兩上三味末之煉蜜為丸如小豆大飲服三丸加至十丸妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之注妊娠外有水氣則浮腫灑淅惡寒水盛貯於肌膚故身重內有水氣則小便不利水盛阻遏陽氣上升故起即頭眩也用葵子茯苓者是專以通竅利水為主也葵子茯苓散方葵子一升茯苓三兩上二味杵為散飲服方寸匕日三服小便利則愈婦人妊娠宜常服當歸散主之注妊娠無病不須服藥若其人瘦而有熱恐耗血傷胎宜常服此以安之集注尤怡曰妊娠最慮熱傷故於芎歸芍藥養血之中用黃芩清熱佐白朮和胃也震亨稱黃芩白朮為安胎聖藥夫芩朮非能安胎者也去其濕熱其胎自安耳當歸散方當歸黃芩芍藥芎藭各一斤白朮半斤上五味杵為散酒飲服方寸匕日再服妊娠常服即易産胎無苦疾産後百病悉主之妊娠養胎白朮散主之注妊娠婦人肥白有寒恐其傷胎宜常服此集注尤怡曰妊娠傷胎有因熱者亦有因寒者隨人藏氣之陰陽而各異也當歸散正治熱之劑白朮散君白朮和胃臣川芎調血使蜀椒去寒佐牡蠣安胎也則正治寒之劑也仲景並列於此其所以昭示後人者深矣白朮散方白朮芎藭蜀椒去汗三分牡蠣上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之以後渴者大麥粥服之病雖愈服之勿置婦人傷胎懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈按文義未詳此穴刺之落胎必是錯簡不釋婦人産後病脈證并治第二十一問曰新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難注新産之婦畏其無汗若無汗則榮衛不和而有發熱無汗似乎傷寒表病者但舌無白苔可辨也故喜其有汗而又恐汗出過多表陽不固風邪易入而為項強腰背反張之痙病也新産之婦畏血不行若不行則血瘀於裏而有發熱腹痛似乎傷寒裏病者但以舌無黃苔可辨也故喜其血下而又恐血下過多陰亡失守虛陽上厥而為昏冒不省合目汗出之血暈也新産雖喜其出汗喜其血行又恐不免過傷陰液致令胃干腸燥而有潮熱譫語大便硬難似乎陽明胃家實者故仲景於産後首出三病不只為防未然之病而更為辨已然之疑也昏冒而曰鬱冒者謂陰陽虛鬱不相交通而致冒也集注尤怡曰痙筋病也血虛汗出筋脈失養風入而益其徑也鬱冒神病也亡陰血虛陽氣遂厥而陰復鬱之則頭眩而目瞀大便難者液病也胃藏津液滲灌諸陽亡津液胃燥則大腸失其潤而便難也三者不同其為亡血傷津則一也産婦鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之注此承上條互詳其義以明其治也産婦昏冒脈微弱者是氣血俱虛應得之診也不能食者是胃氣未和應得之候也大便反堅者是腸胃枯乾應得之病也究之鬱冒所以然者由血虛則陰虛陰虛則陽氣上厥而必冒也冒家欲解必大汗出者是陽氣鬱得以外泄而解也故産婦喜汗出也由此推之血瘀致冒解必當血下是陰氣鬱得以內輸而解也最忌者但頭汗出則為陰亡下厥孤陽上出也大便堅嘔不能食用小柴胡湯必其人舌有苔身無汗形氣不衰者始可故病得解自能食也若有汗當減柴胡無熱當減黃芩嘔則當倍薑半虛則當倍人參又在臨證之變通也大便堅七八日更發熱用大承氣湯亦必其人形氣俱實胃強能食者始可也若氣弱液乾因虛致燥難堪攻下者則又當內用元明粉以軟堅燥外用諸導法以潤廣腸緩緩圖之也集注尤怡曰鬱冒雖有客邪而其本則為裏虛故其脈微弱也嘔不能食大便反堅但頭汗出津液上行不下逮之象所以然者亡陰血虛孤陽上厥而津液從之也厥者必冒冒家欲解必大汗出者陰陽乍離故厥而冒及陰陽復通汗乃大出而解也産婦新虛不宜多汗而此反喜汗出者血去陰虛陽受邪氣而獨盛汗出則邪去陽弱而後與陰相和所謂損陽而就陰是也小柴胡湯見嘔吐中大承氣湯見痙病中産婦腹中㽱痛當歸生薑羊肉湯主之并治腹中寒疝虛勞不足注産後暴然腹中急痛産後虛寒痛也主之當歸生薑羊肉湯者補虛散寒止痛也并治虛勞不足寒疝腹痛者亦以其虛而寒也集注程林曰産後血虛有寒則腹中急痛內經曰味厚者為陰當歸羊肉味厚者也用以補産後之陰佐生薑以散腹中之寒則㽱痛自止夫辛能散寒補能去弱三味辛溫補劑也故并主虛勞寒疝魏荔彤曰妊娠之㽱痛胞阻於血寒也産後腹中㽱痛者裏虛而血寒也一阻一虛而治法異矣當歸生薑羊肉湯方見寒疝中産後腹痛煩滿不得臥枳實芍藥散主之注産後腹痛不煩不滿裏虛也今腹痛煩滿不得臥裏實也氣結血凝而痛故用枳實破氣結芍藥調腹痛枳實炒令黑者蓋因産婦氣不實也并主癰膿亦因血為氣凝久而腐化者也佐以麥粥恐傷産婦之胃也集注尤怡曰産後腹痛而至煩滿不得臥知血鬱而成熱且下病而礙上也與虛寒㽱痛不同矣枳實芍藥散方枳實燒令黑勿太過芍藥等分上二味杵為散服方寸匕日三服并主癰膿以麥粥下之師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利注産婦腹痛屬氣結血凝者枳實芍藥散以調之假令服後不愈此為熱灼血乾著於臍下而痛非枳實芍藥之所能治也宜下瘀血主之下瘀血湯攻熱下瘀血也並主經水不通亦因熱灼血乾故也下瘀血湯方大黃三兩桃仁二十枚蟅蟲熬去足二十枚上三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝集注程林曰蟅蟲主開血閉大黃主攻瘀血桃仁主破死血産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱在裏結在膀胱也按熱在裏結在膀胱也之八字當在本條上文惡露不盡之下未有大承氣湯下膀胱血之理必是傳寫之訛再倍二字當是衍文注無太陽證無表證也少腹堅痛有裏證也因其産後七八日有蓄血裏證而無太陽表證則可知非傷寒太陽隨經瘀熱在裏之病乃産後惡露未盡熱結膀胱之病當主以下瘀血可也若不大便不食譫語煩躁發熱日晡更甚至夜即愈此為胃實之病非惡露不盡之病以其日晡更甚至夜即愈則可知病不在血分而在胃也故以大承氣湯下之集注李彣曰此一節具兩證在內一是太陽蓄血證一是陽明裏實證因古人文法錯綜故難辨也無太陽證謂無表證也少腹堅痛者以肝藏血少腹為肝經部分故血必結於此則堅痛亦在此此惡露不盡是為熱在裏結在膀胱此太陽蓄血證也宜下去瘀血若不大便煩躁脈實譫語者陽明裏實也再倍發熱者熱在裏蒸蒸發於外也陽明旺於申酉戌日晡是陽明向旺時故煩躁不能食病在陽而不在陰故至夜則愈此陽明府病也宜大承氣湯以下胃實按傷寒論曰陽明病不能食攻其熱必噦以胃中虛冷故也又云發熱者尤當先解表乃可攻之況在産後豈可妄議攻下哉必認證果真方可用此産後風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在耳可與陽旦湯注産後續感風邪數十日不解頭微痛惡寒時熱汗出表未解也雖有心下悶乾嘔之裏但有桂枝證在可與陽旦湯解表可也陽旦湯即桂枝湯加黃芩陽旦證即桂枝證也集注沈明宗曰上下三條乃産後感冒證也世謂産後氣血兩虛不論外感內傷皆以補虛為主而仲景拈傷寒中之風傷衛發熱仍以表裏陰陽去邪為訓故云産後中風數十日不解頭微痛惡寒時時有熱汗出乃太陽表未解也但心下悶乾嘔是外邪入於胸中之裏太陽表裏有邪謂之陽旦證故以桂枝湯加黃芩而為陽旦湯以風邪在表故用桂枝解肌邪入胸膈之間當以清涼解其內熱故加黃芩正謂不犯其虛是益其餘不補正而正自補不驅邪而邪自散斯為産後感冒入神之妙方也奈後人不察其理反謂芍藥酸寒能伐生生之氣桂枝辛熱恐傷其血棄而不用以致病劇不解只因未窺仲景門牆耳故千金方以此加飴糖當歸為當歸建中湯治産後諸虛或外感病推仲景之意嘗以此湯加減出入治産後諸病屢獲神效故表出之尤怡曰夫審證用藥不拘日數表裏既分汗下斯判上條裏熱成實雖産後七八日與大承氣而不傷於峻此條表不解雖數十日之久與陽旦湯而不慮其散非通於權變者未足語此也陽旦湯方即桂枝湯內加黃芩桂枝湯方見下利中産後中風發熱面正赤喘而頭痛竹葉湯主之按産後中風之下當有病痙者之三字始與方合若無此三字則人參附子施之於中風發熱可乎而又以竹葉命名者何所謂也且方內有頸項強用大附子之文本篇有證無方則可知必有脫簡注産後汗多表虛而中風邪病痙者主之竹葉湯發散太陽陽明兩經風邪用竹葉為君者以發熱面正赤有熱也用人參為臣者以産後而喘不足也頸項強急風邪之甚故佐附子嘔者氣逆故加半夏也集注程林曰産後血虛多汗出喜中風故令病痙今證中未至背反張而發熱面赤頭痛亦風痙之漸也竹葉湯方竹葉一把葛根三兩防風一兩桔梗桂枝人參甘草各一兩附子炮一枚大棗十五枚生薑三兩上十味以水一斗煮取二升半分溫三服溫覆使汗出頸項強用大附子一枚破之如豆大前藥揚去沫嘔者加大半夏半升洗婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之按此條文義證藥未詳竹皮大丸方生竹茹二分石膏二分桂枝一分甘草七分白薇一分上五味末之棗肉和丸彈子大以飲服一丸日二夜二服有熱者倍白薇喘者加柏實一分集解濟陰綱目云中虛不可用石膏煩亂不可用桂枝此方以甘草七分配衆藥六分又以棗肉為丸仍以一丸飲下可想其立方之微用藥之難審虛實之不易也仍飲服者尤慮夫虛虛之禍耳用是方者亦當深省産後下利及虛極白頭翁加甘草阿膠湯主之按此條文義證藥不合不釋白頭翁加甘草阿膠湯方白頭翁甘草阿膠各二兩秦皮黃連柏皮各三兩上六味以水七升煮取二升半內膠令消盡分溫三服婦人雜病脈證并治第二十二婦人之病因虛積冷結氣為諸經水斷絶至有厯年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與藏相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下來多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冒狀如厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然按此條為婦人雜病提綱當冠篇首以揭病情在下來多之來字當是未字本條皆經水斷絶之病若系來多則與上文不合與下文經候不勻亦不合又本條內有此皆帶下一句當在非有鬼神之下文義相屬是傳寫之訛注此條為婦女諸病綱領其病之所以異於男子者以其有月經也其月經致病之根源則多因虛損積冷結氣也三者一有所感皆能使經水斷絶至有厯年寒積胞門以致血凝氣結而不行者先哲云女子以經調為無病若經不調則變病百出矣以下皆言三者阻經之變病其變病之不同各因其人之藏府經絡寒熱虛實之異也如寒外傷經絡其人上焦素寒則凝堅在上故上焦胸肺受病也形寒傷肺則氣滯阻飲故嘔吐涎唾也若其人上焦素熱寒同其化久則成熱熱傷其肺故成肺癰而形體損瘦也若其人中焦素寒則在中盤結故繞臍疝痛也或兩脅疼痛是中焦之部連及肝藏故也或其人中焦素熱則不病寒疝而病結熱於中矣中熱故不能為寒疝而繞臍之痛仍在關元也其人脈數當生瘡若無瘡則熱必灼陰皮膚失潤故肌粗若魚鱗也然此嘔吐涎唾寒疝疼痛肌若魚鱗等病亦時著男子非止女子病也在下未多謂經候不勻而血不多下也邪侵胞中乃下焦之部故病陰中掣痛少腹惡寒也或痛引腰脊下根氣街急痛腰膝疼煩皆胞中衝任為病所必然也或痛極奄忽眩冒狀如厥癲亦痛甚之常狀也若其人或有憂慘悲傷多嗔之遇而見此眩冒厥巔之證實非有鬼神也凡此胞中衝任血病皆能病帶故諺曰十女九帶也然帶下病久津液必傷形必羸瘦診其脈虛審其多寒豈止病此三十六病而千變萬端矣雖千變萬端然必審脈陰陽虛實緊弦與病參究行其針藥治危得安也其有病雖同而脈不同者則當詳加審辨故曰子當辨記勿謂不然也婦人咽中如有炙臠半夏厚朴湯主之注咽中如有炙臠謂咽中有痰涎如同炙肉咯之不出咽之不下者即今之梅核氣病也此病得於七情鬱氣凝涎而生故用半夏厚朴生薑辛以散結苦以降逆茯苓佐半夏以利飲行涎紫蘇芳香以宣通鬱氣俾氣舒涎去病自愈矣此證男子亦有不獨婦人也集注尤怡曰凝痰結氣阻塞咽嗌之間千金所謂咽中帖帖如有炙肉吞之不下吐之不出者是也半夏厚朴湯方半夏一升厚朴三兩茯苓四兩生薑五兩干蘇葉二兩上五味以水七升煮取四升分溫四服日三夜一服婦人藏躁喜悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之按甘草小麥大棗湯方義未詳必是訛錯注藏心藏也心靜則神藏若為七情所傷則心不得靜而神躁擾不寧也故喜悲傷欲哭是神不能主情也象如神靈所憑是心不能神明也即今之失志癲狂病也數欠伸喝欠也喝欠頓悶肝之病也母能令子實故證及也甘草小麥大棗湯方甘草三兩小麥一升大棗十枚上三味以水六升煮取三升溫分三服亦補脾氣婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之注吐涎沫形寒飲冷也不溫散而反下之則寒飲虛結成痞硬也當先治其吐涎沫以小青龍湯治外寒內飲俟涎沫止以半夏瀉心湯乃治痞也集注尤怡曰吐涎沫上焦有寒飲也不與溫散而反下之則寒內入而成痞然雖痞而猶吐涎沫是寒飲未已不可治痞當先治飲而後治痞亦如傷寒例表解乃可攻痞也小青龍湯方見肺癰中瀉心湯方見驚悸中問曰婦人年五十所病下利數十日不止暮即發熱少腹裏急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之按所病下利之利字當是血字文義相屬必是傳寫之訛注婦人年已五十衝任皆虛天癸當竭地道不通矣今下血數十日不止宿瘀下也五心煩熱陰血虛也唇口乾燥任衝血傷不上榮也少腹急滿胞中有寒瘀不行也此皆曾經半産崩中新血難生瘀血未盡風寒客於胞中為帶下為崩中為經水愆期為胞寒不孕均用溫經湯主之者以此方生新去瘀暖子宮補衝任也集注李彣曰婦人年五十則已過七七之期任脈虛太衝脈衰天癸竭地道不通時也所病下利據本文帶下觀之當是崩淋下血之病蓋血屬陰陰虛故發熱暮亦屬陰也任主胞胎衝為血海二脈皆起於胞宮而出於會陰正當少腹部分衝脈俠臍上行故衝任脈虛則少腹裏急有乾血亦令腹滿內經云任脈為病女子帶下瘕聚是也手背為陽掌心為陰乃手三陰過脈之處陰虛故掌中煩熱也陽明脈俠口環唇與衝脈會於氣街皆屬於帶脈難經云血主濡之以衝脈血阻不行則陽明津液衰少不能濡潤故唇口乾燥斷以病屬帶下以曾經半産少腹瘀血不去則津液不布新血不生此則唇口乾燥之所由生也溫經湯方吳茱萸三兩當歸芎藭芍藥各二兩人參桂枝牡丹皮阿膠生薑各二兩甘草二兩半夏半升麥門冬去心一升上十二味以水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼取崩中去血或月水來過多及至期不來集解李彣曰內經云血氣虛者喜溫而惡寒寒則凝澀不流溫則消而去之此湯名溫經以瘀血得溫即行也方內皆補養氣血之藥未嘗以逐瘀為事而瘀血自去者此養正邪自消之法也故婦人崩淋不孕月事不調者並主之帶下經水不利少腹滿痛經一月再見者土瓜根散主之按再字當是不字若是再字一月兩來與上文不利不合是傳寫之訛注此亦前條在下未多經候不勻之證帶下胞中病也胞中有宿瘀從氣分或寒化則為白帶從血分或熱化則為赤帶從氣血寒熱錯雜之化則為雜色之帶也若兼經水不利少腹滿痛乃有瘀血故也其經至期不見主以土瓜根散者土瓜能逐瘀血蟅蟲能開血閉桂枝合芍藥舒陽益陰通和營氣則瘀去血和經調帶止矣土瓜根散方土瓜根芍藥桂枝蟅蟲各三分上四味杵為散酒服方寸匕日三服寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半産漏下旋覆花湯主之按此條詳在傷寒論辨脈法篇錯簡在此旋覆花湯主之一句亦必是錯簡半産漏下則氣已下陷焉有再用旋覆下氣之理旋覆花湯方旋覆花三兩蔥十四莖新絳少許上三味以水三各升煮取一升頓服之婦人陷經漏下黑不解膠薑湯主之注陷經者謂經血下陷即今之漏下崩中病也黑不解不成文膠薑湯方亦缺集注李彣曰陷經漏下謂經脈下陷而血漏下不止乃氣不攝血也黑不解者瘀血不去則新血不生榮氣腐敗也然氣血喜溫惡寒用膠薑湯溫養氣血則氣盛血充推陳致新而經自調矣按此條文義必有缺誤姑採此注以見大意婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之注敦大也少腹胞之室也胞為血海有滿大之狀是血蓄也若小便微難而不渴者水亦蓄也此病若在生育之後則為水與血俱結在血室也主之大黃甘遂湯是水血並攻之法也大黃甘遂湯方大黃四兩甘遂二兩阿膠二兩上三味以水三升煮取一升頓服之其血當下婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之注詳見傷寒論少陽篇內不復釋婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈注詳見傷寒論少陽篇內不復釋婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼和胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之注詳見傷寒論少陽篇內不復釋陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出即愈注詳見傷寒論陽明篇內不復釋婦人經水不利下抵當湯主之注婦人經水不利下言經行不通利快暢下也乃婦人恆有之病不過活瘀導氣調和衝任足以愈之今曰抵當湯主之夫抵當重劑文內並無少腹結痛大便黑小便利發狂善忘寒熱等證恐藥重病輕必有殘缺錯簡讀者審之抵當湯方水蛭熬三十個虻蟲熬去翅足三十枚桃仁去皮尖二十個大黃酒浸三兩上四味為末以水五升煮取三升去滓溫服一升婦人經水閉不利藏堅癖不止中有乾血下白物礬石丸主之注藏陰內也不止不去也經水閉而不通瘀宿血也陰中堅塊不去血乾凝也下白物化血成帶也用礬石丸坐藥治之此方治下白物若從濕化者可也恐未能攻堅癖乾血也集注尤怡曰藏堅癖不止者子藏乾血堅凝成癖而不去也乾血不去則新血不榮而經閉不利矣由是蓄泄不時胞宮素濕所積之血與濕化而成白物時時自下是宜先去其藏之濕礬石燥濕水杏仁潤乾血也礬石丸方礬石燒三分杏仁一分上二味末之煉蜜和丸如棗核大內藏中劇者再內之婦人六十二種風及腹中血氣刺痛紅藍花酒主之注六十二種風無可考腹中血氣刺痛用紅藍花酒通經行血誠要方也紅藍花酒方紅藍花一兩上一味以酒一大升煎減半頓服一半未去再服婦人腹中諸疾痛當歸芍藥散主之注諸疾腹痛謂婦人腹中諸種疾痛也既曰諸疾痛則寒熱虛實氣食等邪皆令腹痛豈能以此一方概治諸疾痛耶當歸芍藥散主之必是錯簡當歸芍藥散方見妊娠中婦人腹中痛小建中湯主之注若因木盛土衰中虛急痛者用此補虛緩中定痛可也小建中湯方見虛勞中問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得尿也以胞系了戾故致此病但利小便則愈宜腎氣丸主之注病不在胃故飲食如故也病在於胞故不得尿也陽氣不化故煩熱也水不得下行故倚息不得臥也名曰轉胞以胞系乖戾不爽也故致此病但當利小便則愈主之腎氣丸以溫行下焦陽氣陽氣化則尿出諸病自解矣胞者乃謂尿胞非血胞也集注趙良曰此方在虛勞中治腰痛小便不利小便拘急此亦用之何也蓋因腎虛用之也用此補腎則氣化氣化則水行而愈矣然轉胞之病豈盡由下焦腎虛氣不化出致耶或中焦脾虛不能散精歸於胞及上焦肺虛不能下輸布於胞或胎重壓其胞或忍尿入房皆足成此病必求其所因以治之也腎氣丸方乾地黃八兩薯蕷四兩山茱萸四兩澤瀉三兩茯苓三兩牡丹皮三兩桂枝附子炮各一兩上八味末之煉蜜和丸梧子大酒下十五丸加至二十五丸日再服集解李彣曰方名腎氣丸者氣屬陽補腎中真陽之氣也內具六味丸壯腎水以滋小便之源附桂益命門火以化膀胱之氣則熏蒸津液水道以通而小便自利此所以不用五苓散而用腎氣丸也婦人陰寒溫中坐藥蛇牀子散主之注陰寒前陰寒也治以溫中坐藥蛇牀子性溫熱能壯陽故納之以助陽驅陰也集注沈明宗曰此治陰掣痛少腹惡寒之方也胞門陽虛受寒現證不一非惟少腹惡寒之一證也但寒從陰戶所受不從表出當溫其受邪之處則病得愈故以蛇牀子一味大熱溫助其陽納入陰中俾子宮得暖邪去而病自愈矣蛇牀子散方蛇牀子仁上一味末以白粉少許和合相得如棗大綿裹內之自然溫少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之注陰中即前陰也生瘡蝕爛乃濕熱不潔而生𧈟也用狼牙湯洗之以除濕熱殺𧈟也狼牙非狼之牙乃狼牙草也如不得以狼毒代之亦可其瘡深洗不可及則用後法也集注李彣曰少陰屬腎陰中腎之竅也內經曰滑者陰氣有餘又云數則為熱故陰中生瘡蝕爛皆濕熱所致狼牙味苦性寒寒能勝熱苦能殺蟲故主洗之狼牙湯方狼牙四兩上一味以水四升煮取半升以綿纏筋如繭浸湯瀝陰中日四遍胃氣下泄陰吹而正喧此穀氣之實也膏髮煎導之按膏髮煎導之之五字當是衍文此穀氣之實也之下當有長服訶梨勒丸之六字後陰下氣謂之氣利用訶梨勒散前陰下氣謂之陰吹用訶梨勒丸文義始屬藥病亦對蓋訶梨勒丸以訶梨勒固下氣之虛以厚朴陳皮平穀氣之實亦相允合方錯簡在雜療篇內下小兒疳蟲蝕齒一方殺蟲解毒或另有小兒門或列在雜方內今於婦人雜病之末亦錯簡也注腎虛不固則氣下泄陰吹而正喧謂前陰出氣有聲也此穀氣之實謂胃氣實而腎氣虛也以訶黎勒丸固下氣而瀉穀氣也膏髮煎方見黃疸中小兒疳蟲蝕齒方雄黃葶藶上二味未之取臘月豬脂熔以槐枝綿裹頭四五枚點藥烙之雜療方第二十三退五藏虛熱四時加減柴胡飲子方冬三月加柴胡八分白朮八分陳皮五分大腹檳榔并皮子者四枚生薑五分桔梗七分春三月加枳實減白朮共六味夏三月加生薑三分枳實五分甘草三分共八味秋三月加陳皮三分共六味上各㕮咀分為三帖一帖以水三升煮取二升分溫三服如人行四五里進一服如四體壅添甘草少許每帖分作三小帖每小帖以水一升煮取七合溫服再合滓為一服重煮都成四服疑非仲景方按此方證不屬不釋長服訶黎勒丸方訶黎勒陳皮厚朴各三兩上三味末之煉蜜丸如桐子大酒飲眼二十丸加至三十丸按此方當在前篇穀氣之實也之下三物備急丸方大黃一兩乾薑一兩巴豆去皮心熬外研如脂一兩上藥各須精新先搗大黃乾薑為末研巴豆內中合治一千杵用為散蜜和丸亦加密器中𫎓之莫令泄氣主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口噤停尸卒死者以暖水苦酒服大豆許三四丸或不下捧頭起灌令下咽須臾當差如未差更與三丸當腹中鳴即吐下便差若口噤亦須折齒灌之方解方名備急者以備暴然諸腹滿腹急痛及中惡客忤噤閉卒死者也若口噤亦須折齒灌之是恐人不急救則死之義然不如後人管吹入鼻中之法為良集解李彣曰人卒得病欲死者皆感毒厲邪陰不正之氣而然三物相須能蕩邪安正或吐或下使穢氣上下分消誠足備一時急需也治傷寒令愈不復紫石寒食散方紫石英白石英赤石脂鍾乳碓煉栝蔞根防風桔梗文蛤鬼臼各十分太乙餘糧燒十分乾薑附子炮去皮桂枝去皮各四分上十三味杵為散酒服方寸匕按方未詳不釋尸厥脈動而無氣氣閉不通故靜而死也治方菖蒲屑內鼻兩孔中吹之令人以桂屑著舌下注形如不病人有氣而脈動失常名曰行尸卒死不知人無氣而脈動如故名曰尸厥尸厥乃正氣暴然為邪氣閉塞不通故靜而似死用菖蒲內鼻桂著舌下是通心神啓陽氣也又方剔取左角髮方寸燒末酒和灌令入喉立起方解菖蒲吹鼻桂著舌下而不愈者則用此法是以髮乃血之餘血乃心所生用燒則發其陽用酒則行氣血用本人者喜一氣相通也救卒死方薤搗汁灌鼻中方解卒然昏死皆尸厥也薤白類蒜而小北人謂之小根菜南人謂之釣喬是也其味極辛搗汁灌鼻亦通竅取嚏之意也又方雄雞冠割取血管吹內鼻中豬脂如雞子大苦酒一升煮沸灌喉中雞肝及血塗面上以灰圍四旁立起大豆二七粒以雞子白并酒和盡以吞之方解雄雞冠血及肝卵白豬脂大豆酒醋等物無非用陽物以勝陰祟也管吹內鼻中謂將雞冠血或合熱酒含在不病人口內以葦管或筆管插入病人鼻孔中使氣連藥吹之其藥自能下咽氣通噤自開也救卒死而壯熱者方礬石半斤以水一斗半煮消以漬腳令沒踝注厥而身壯熱者陽厥府病也外以礬水浸腳蓋以厥起於下而收攝陽氣也集注程林曰厥陽獨行故卒死而壯熱岐伯曰血之與氣并走於上則為大厥厥則暴死礬石收攝藥也以之浸足而收斂其厥逆之氣救卒死而目閉者方騎牛臨面搗薤汁灌耳中吹皂莢鼻中立效救卒死而張口反折者方灸手足兩爪後十四壯了飲以五毒諸膏散有巴豆者注卒死張口反折者用灸以通陽氣但飲以五毒諸膏方救卒死而四肢不收失便者方馬屎一升水三斗煮取二斗以洗之又取牛洞稀糞也一升溫酒灌口中灸心下一寸臍上三寸臍下四寸各一百壯瘥注尸厥目閉口張失便反張四肢不收陰厥藏病也有如是之證者用騎牛臨面之法正所以厭邪也薤汁灌耳皂角吹鼻皆通其諸竅而閉塞者可通也灸手足甲後以通外陽法也馬屎取吐之法灸中脘關元以通內陽之法也救小兒卒死而吐利不知是何病方狗屎一丸絞取汁灌之無濕者水煮乾者取汁方解凡屎皆發陽氣用狗屎亦取發陽氣也救卒死客忤死還魂湯主之方麻黃去節三兩杏仁去皮尖七十個甘草炙一兩上三味以水八升煮取三升去滓分令咽之通治諸感忤注中惡客忤便閉裏實者仲景用備急丸可知無汗表實者不當用備急丸通裏當用還魂湯以通表也通裏者抑諸陰氣也通表者扶諸陽氣也昧者不知以麻黃為入太陽發汗之藥抑知不溫覆取汗則為入太陰通陽之藥也陽氣通動魂可還矣又方韭根一把烏梅二七個吳茱萸炒半升上三味以水一斗煮之以病人櫛內中三沸櫛浮者生沉者死煮取三升云滓分飲之方解韭根吳茱萸烏梅之治亦收陽氣法也浮為陽沉為陰陽生陰死義也救自縊死旦至暮雖已冷必可治暮至旦小難也恐此當言分氣盛故也然夏時夜短於晝又熱猶應可治又云心下若微溫者一日以上猶可治之方徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手少挽其髮常弦弦勿縱之一人以手按揉胸上數動之一人摩捋臂脛屈伸之若已僵但漸漸強屈之并按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須臾可少桂湯及粥清含之令濡喉漸漸能咽及稍止更令兩人以兩管吹其兩耳朵此法最善無不活者注旦至暮陽氣有餘陽主生故雖已冷必可治也暮至旦陰氣有餘陰主死故稍難也自縊之人必可治者恐此當有言語忿爭氣盛不散故可治也暮至旦固難治然遇夏時夜短於晝又熱皆陽氣有餘猶應可治又云心下若微溫者雖一日以上猶可治之觀此諄諄告切仲景仁心惟恐人畏其繁瑣而不治也此法嘗試之十全八九始知言果不謬弦弦猶言緊緊也揉胸按腹摩臂脛屈伸之皆引導其氣之法也凡中暍死不可使得冷得冷便死療之方屈草帶繞暍人臍使三兩人尿其中令溫亦可用熱泥和屈草亦可扣瓦碗底按及車缸以著暍人取令尿須得流去此謂道路窮卒無湯當令尿其中欲使多人尿取令溫若湯便可與之不可泥及車缸恐此物冷暍既在夏月得熱泥土暖車缸亦可用也注中暑卒死之人不可置放陰涼之處恐其閉熱在內猶被凍之人不可沃以熱湯恐其閉寒在內反為大害也救溺死方取竈中灰二石餘以埋人從頭至足水出七孔即活嘗試蠅子落水而死者用竈灰埋之自活集解李彣曰竈灰得火土相生之氣以埋人則外溫衛氣而內滲水濕故能使水出七孔而活治墜馬及一切筋骨損方大黃切浸湯成汁一兩緋帛燒灰如手大亂髮燒灰用如雞子大久用炊單布燒灰一尺敗蒲一握三寸桃仁去皮尖熬四十九個甘草炙銼如中指節上七味以童子小便量多少煎湯成內酒一大盞次下大黃去滓分溫三服先銼敗蒲席半領煎湯浴衣被蓋覆斯須通利數行痛處立瘥利及浴水赤勿怪即瘀血也注外浴以散其瘀內服以下其瘀斯兩得之矣集注徐彬曰從高墜下法當救損傷筋骨為主然頓跌之勢內外之血必無不瘀瘀不去則氣不行氣不行則傷不愈故以桃仁大黃逐瘀為主緋帛紅花之餘亂髮血之餘合童便以消瘀血湯浴能活周身氣血然筋骨瘀血必有熱氣滯鬱故以炊單布受氣最多而易消者以散滯通氣從其類也加少炙甘草補中以和諸藥也
