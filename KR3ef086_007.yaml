body:
  text: 卷七金匱要略廿四廿五兩門原列在卷末其文似後人補入註家或註或刪但傳世已久難以削去茲仍附原文另為一篇以存參考云禽獸魚蟲禁忌并治第二十四凡飲食滋味以養於身食之有妨反能為害自非服藥煉液焉能不飲食乎切見時人不閑調攝疾疢競起若不因食而生苟全其生須知切忌者矣所食之味有與病相宜有與身為害若得宜則益體害則成疾以此致危例皆難療凡煮藥飲汁以解毒者雖云救急不可熱飲諸毒病得熱更甚宜冷飲之肝病禁辛心病禁鹹脾病禁酸肺病禁苦腎病禁甘註此言五藏有病而禁之以五味何也肝木病若與之以辛辛助肺氣恐克肝也故肝病則禁辛心火病若與之以鹹鹹能益水恐水尅火也故心病則禁鹹脾土病若與之以酸酸味屬肝恐木尅土也故脾病則禁酸肺金病若與之以苦苦味屬火恐尅金也故肺病則禁苦腎水病若與之以甘甘能補脾脾主尅水故腎病則禁甘春不食肝夏不食心秋不食肺冬不食腎四季不食脾辨曰春不食肝者為肝氣旺脾氣敗若食肝則又補肝脾氣敗尤甚不可救又肝旺之時不可死氣入肝恐傷魂也若非旺時卽虛以肝補之佳餘藏準此註此言四時有宜食有不宜食者如春為肝旺則脾弱故宜食脾而不宜食肝若食肝則肝益旺而脾更弱故曰不可救又云肝旺之時不可以死氣入肝卽內經毋伐天和之意若伐天和則傷肝肝主魂恐復傷魂也若非旺時卽虛虛則以肝補肝故謂之佳餘藏準此凡肝藏自不可輕噉自死者彌甚註謂諸畜獸臨殺之時必有所驚肝有所忿食之俱不利故曰不可輕噉如獸自死者必中毒而死更不可食也凡心皆為神識所舍勿食之使人來生復其對報矣註人與物雖別而貪生畏死之心則一也惟其心為神識所舍故曰勿食之凡肉及肝落地不著塵土者不可食之猪肉落水浮者不可食諸肉不乾火炙而動見水自動者不可食之六畜肉熱血不斷者不可食之諸五藏及魚投地塵土不汚者不可食之註以上五條皆怪異非常必不可食之諸肉及魚若狗不食鳥不啄者不可食之註凡禽獸不食之肉必有毒不可食之肉中有如朱點者不可食之註朱點惡血所聚此色惡不食也父母及本身所屬之相不可食食之令人神魂不安註此為仁人孝子之心也食肥肉及熱羹不可飲冷水註食肥肉熱羹後繼飲冷水冷熱相搏膩膈不行不腹痛吐利必成痞變積慎之慎之穢飯餒肉臭魚食之皆傷人註言敗腐之物皆不宜食也自死禽獸口閉者不可食之註凡自死之物其肉皆有毒口閉則毒不得外泄切不可食六畜自死皆疫死則有毒不可食之註疫毒能死六畜其肉必有疫毒故不可食獸自死北首及伏地者食之殺人註凡獸北向自死及死不僵而伏地者食之多殺人食生肉飽飲乳變白蟲註食生肉飽卽飲乳酪則成濕熱必變生白蟲疫死牛肉食之令病洞下亦致堅積宜利藥下之註疫死牛肉有毒不可食食之若洞瀉為其毒自下或致堅積宜下藥利之脯藏米甕中有毒及經夏食之發腎病註脯肉藏米甕中受濕熱鬱蒸之氣及經夏己腐者食之腐氣入腎故發腎疾治自死六畜肉中毒方用黃柏搗屑取方寸匕服註六畜自死肉中有毒中其毒者以此方服之苦能解毒也治食鬱肉漏脯中毒方燒犬屎酒服方寸匕每服人乳汁亦良飲生韭汁三升亦得註鬱肉密藏經宿之肉也漏脯經漏水之脯也食之中毒以燒犬屎人乳汁生韭汁量其輕重而解之治黍米中藏乾脯食之中毒方大豆濃煮汁飲之數升卽解亦治狸肉漏脯等毒註同上鬱肉大豆汁亦能解毒治食生肉中毒方掘地深三尺取其下土三升以水五升煮數沸澄清汁飲一升卽愈註地漿能解諸毒掘得黃土有泉滲出謂之地漿三尺大概言也未見黃土皆穢土得黃土乃可取用治食六畜鳥獸肝中毒方水浸豆豉絞取汁服數升愈註食禽肉獸肝中毒在胃故用豆豉涌吐其毒馬腳無夜眼者不可食之夜眼一名附蟬尸註凡馬皆有夜眼若無者其形異故勿食之食酸馬肉不飲酒則殺人註馬肉味酸有毒故飲酒以解之馬肉不可熱食傷人心註馬屬火肉熱火甚恐傷心當冷食之馬鞍下肉食之殺人註鞍下肉久經汗漬有毒食之殺人白馬黑頭者不可食之註食療云食之令人癲白馬青蹄者不可食之註白馬青蹄騎之不利人食之必取害故不可食馬肉㹠肉共食醉飽臥大忌註馬肉屬火㹠肉屬水共食已屬不和若醉飽卽臥則傷脾氣故曰大忌驢馬肉合猪肉食之成霍亂註諸肉雜食恐難消化亂於腸胃故成霍亂馬肝及毛不可妄食中毒害人註漢史云文成食馬肝而死故曰不可妄食恐中其毒也治馬肝毒中人未死方馬肝一名懸熢雄鼠屎二七粒末之水和服日再服註馬食鼠屎則腹脹是鼠能制馬也故中馬肝毒以此解之又方人垢取方寸匕服之佳註人垢卽人頭垢也用方寸匕酒化下得吐為佳治馬肉中毒欲死方香豉二兩杏仁三兩上二味蒸一食頃熟杵之服日再服方解日華子云黑豆調中下氣治牛馬瘟毒杏仁下氣氣下則毒亦解矣又方煮蘆根汁飲之良方解蘆根味甘性寒解諸肉毒疫死牛或目赤或黃食之大忌註牛疫死目或赤或黃疫毒甚也大忌食之牛肉共猪肉食之必作寸白蟲註牛肉共猪肉食之脾胃濕熱者能生寸白蟲當戒之青牛腸不可合犬肉食之牛肺從三月至五月其中有蟲如馬尾割去勿食食之損人註凡牛腸肺值三月至五月濕熱交蒸之時必生其蟲戒勿食之牛羊猪肉皆不得以楮木桑木蒸炙食之令人腹內生蟲註古人煉藥多用桑柴火楮實子能健脾消水楮木亦可燒用何以蒸炙諸肉食之卽生蟲乎其或物性相反也噉蛇牛肉有毒食之殺人不可食註噉蛇牛何以識認惟毛髮向後順者是也治噉蛇牛肉食之欲死方飲人乳汁一升立愈以泔水洗頭飲一升愈牛肚細切水一斗煮取一升暖飲之大汗出愈註人乳能解馬肝牛肉之毒用頭垢吐其毒而愈用牛肚不甚善治食牛肉中毒方甘草煮汁飲之卽愈方解甘草味甘能解百毒羊肉其有宿熱者不可食之註羊肉性熱若其人有素熱者忌食之羊肉不可共生魚酪食之害人註羊肉熱與生魚酪乳共食必不益人也羊蹄甲中有珠子白者名羊懸筋食之令人癲按此義未詳白羊黑頭食其腦作腸癰註諸腦有毒惟此羊腦食之作腸癰羊肝共生椒食之破人五藏註羊肝生椒皆屬於火共食恐損傷人五藏也猪肉共羊肝和食之令人心悶註猪肉滯羊肝膩共食則氣滯而心悶矣猪肉以生胡荽同食爛人臍註胡荽與猪肉不可同食不可多者恐動風疾云爛人臍此義未詳猪脂不可合梅子食之註猪脂滑利梅子酸濇性相反也故不可合食猪肉合葵食之少氣按此義未詳鹿肉不可合蒲白作羹食之發惡瘡註鹿肉性温九月至正月堪食他月食之則冷痛如和蒲作羹食之發惡瘡此義未詳麋脂及梅李子若孕婦食之令子青盲男子傷精集註李彣曰人目以陰為體以陽為用麋陰獸也梅及李味酸苦亦屬陰類孕婦三物合食則陰氣太盛陽氣絕少故令子青盲也男子精氣宜温暖陰盛則精寒本草云麋脂令陰痿按麋蹄下有二竅為夜目淮南子云孕婦見麋而生子四目今三物合食令子青盲皆物類相感胎教慎之麞肉不可合鰕及生菜梅李果食之傷人註麞肉性温八月至十一月食之勝羊肉餘月食之動氣鰕能動風生菜梅李動痰合食之皆令人病白犬自死不出舌者食之害人註凡犬死必吐舌惟中毒而死其舌不吐毒在內也故食之害人痼疾人不可食熊肉令終身不愈註人有痼疾不可食熊肉因熊性猛悍食之痼疾永不除食狗鼠餘令人發瘻瘡註狗鼠食物有餘存者其物必有涎滴因涎有毒人若食此物必發瘻瘡治食犬肉不消心下堅或腹脹口乾大渴心急發熱妄語如狂或洞下方杏仁合皮熟研用一升以沸湯三升和取汁分三服利下肉片大驗方解此以相畏相制之義也犬肉畏杏仁故用此而諸證悉除矣婦人妊娠不可食兔肉及鱉雞鴨令子無聲音註妊娠食兔肉令子缺唇食鱉肉令子短項食羊犬令子多熱食雞鴨令子無聲音此數者妊婦皆不當食也兔肉不可合白雞肉食之令人面發黃註兔肉酸寒多食損元氣絕血脈令人萎黃白雞雖得庚金太白之象實屬風木能助肝火二物合食動脾氣而發黃故不可合食兔肉著乾薑食之成霍亂註兔肉酸寒陰性也乾薑辛熱陽性也性味相反同食者必成霍亂凡鳥自死口不閉翅不合者不可食之註諸鳥自死必閉口斂翅若開口張翅恐有毒不可食諸禽肉肝青者食之殺人註肝青者被毒所傷若食之必殺人雞有六翮四距者不可食之距雞腳爪也註形有怪異者有毒故不可食烏雞白頭者不可食之註色有不相合者有毒不可食雞不可合葫蒜食之滯氣註雞蒜同食能動風動痰風痰發動故氣滯山雞不可合鳥獸肉食之註山雞食蟲蟻有毒與鳥獸肉相反故戒合食雉肉久食令人瘦註雉肉小毒發瘡疥生諸蟲以此則令人瘦鴨卵不可合鱉肉食之註二物性寒發冷氣不可合食雀肉不可合李子食之註雀肉性暖大温李子性寒味酸温得寒酸而滯氣故不可合食婦人妊娠食雀肉飲酒令子淫亂無恥註雀之性淫酒能亂性妊娠當戒食之古慎胎教也燕肉勿食入水為蛟龍所噉註蚊龍嗜燕人食燕者不可入水雷公曰海竭江枯投游波而立泛以蚊龍嗜燕故也凡渡江海者切不可食燕肉鳥獸有中毒箭死者其肉有毒解之方大豆煮汁及鹽汁服之解方解箭傷有毒凡鳥獸被箭死者肉毒人食之先服鹽汁次服豆汁解不及者死魚頭正白如連珠至脊上食之殺人魚頭中無腮者不可食之殺人魚無腸膽者不可食之三年陰不起女子絕生魚頭似有角者不可食之魚目合者不可食之註以上皆怪異之形色必有毒也六甲日勿食鱗甲之物註六甲值日食鱗甲物犯其所忌故曰勿食魚不可合雞肉食之註魚屬火善動雞屬木生風風火相煽故勿合食魚不得合鸕鷀肉食之註鸕鷀嗜魚凡物相制相犯者皆不可合食鯉魚鮓不可合小豆藿食之魚子不可合猪肝食之害人小豆藿卽小豆葉也鯉魚不可合犬肉食之鯽魚不可合猴雉肉食之醍魚合鹿肉生食令人筋甲縮青魚鮓不可合胡荽及生葵并麥醬食鰌鱔不可合白犬血食之註以上六條皆能助熱動風合食俱不宜龜肉不可合酒果子食之註龜多神靈不可輕食若酒果合食更非所宜也鱉目凹陷者及腹下有王字形者不可食之其肉不得合雞鴨食之註鱉無耳以目為聽目凹陷及腹有王字形者皆有毒慎之性與雞鴨相反故不可合食龜鱉肉不可合莧菜食之註龜鱉皆與莧菜相反若合食之必成鱉瘕鰕無鬚及腹下通黑煮之反白者不可食之註無鬚腹黑反白者怪異之鰕也故不可食食膾飲乳酪令人腹中生蟲為瘕註膾乃牛羊魚之腥聶而切之為膾乳酪酸寒與膾同食則生蟲為瘕故戒合食膾食在胃不化吐不出速下除之久成癥病治之方橘皮一兩大黃二兩朴硝二兩上三味以水一大升煮至小升頓服卽消方解橘皮解魚毒得硝黃使下從大便而出也食膾多不消結為癥病治之方馬鞭草上一味搗汁飲之或以薑葉汁飲之一升亦消又可服吐藥吐之方解馬鞭草主治癥癖血瘕破血殺蟲薑葉解毒皆可用之食魚後食毒兩種煩亂治之方橘皮濃煎汁服之卽解方解橘皮味苦辛温下氣通神故能解毒食鯸鮧魚中毒方蘆根煮汁服之卽解方解鯸鮧卽河豚魚味美其腹腴呼為西施乳頭無腮身無鱗其肝毒血殺人脂令舌麻子令腹脹眼令目花惟蘆根汁能解之蟹目相向足斑目赤者不可食之註蟹目相背若目相向足斑目赤者有毒故戒勿食食蟹中毒治之方紫蘇煮汁飲之三升紫蘇子搗汁飲之亦良冬瓜汁飲三升食冬瓜亦可方解紫蘇冬瓜俱能解蟹毒故用之凡蟹未遇霜多毒其熟者乃可食之註蟹未經霜有毒不可生食經霜則毒無蜘蛛落食中有毒勿食之註蜘蛛有毒凡落食上不可食有毒故也凡蜂蠅蟲蟻等多集食上食之致瘻註蟲類有毒凡蟲集食上者食之則致瘻果實菜穀禁忌并治第二十五內經曰天食人以五氣地食人以五味果實菜穀皆地產也又云五穀為養五果為助五菜為充是以草實曰蓏木實曰果禮云棗曰新之栗曰撰之桃曰膽之柤梨曰攢之則治果實有法矣烹葵斷壺紀乎豳風芥醬芼羹以養父母則用五菜有道矣牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥則配五穀有方然其物有不宜常食者有不宜食者經云陰之所生本在五味陰之五宮傷在五味人安可不知其所禁忌乎果子生食生瘡註果生之性多濕多熱而有毒或生食之故令生瘡腹脹作泄果子落地經宿蟲蟻食之者人大忌食之註凡果落地隔夜尚不可食而況蟲蟻食者乎見之者切不可食生米停留多日有損處食之傷人註凡食之物停留多日或隔夜者若有損處卽蟲鼠所嚙之餘皆有毒傷人桃子多食令人熱仍不得入水浴令人病寒熱淋瀝病註桃味甘酸性熱若多食者令人熱入水浴者則濕與熱相摶不得宣散故令人外寒熱內成癃症也杏酪不熟傷人一云殺人註杏味酸苦有毒酪釀未熟若食之恐害人也梅多食壞人齒註梅味苦酸若多食者令人齒損齒者骨之餘也因腎主液而合骨故傷齒李不可多食令人腹脹註李味酸濇若多食則中氣不舒故令人腹脹林檎不可多食令人百脈弱註林檎味酸濇多食則令百脈不得宣故脈弱橘柚多食令人口爽不知五味註尚書注小曰橘大曰柚二者其味皆酸而性寒若過食則口雖爽而五味不知焉梨不可多食令人寒中金瘡產婦亦不宜食註梨味甘酸性寒若過食則令人中焦寒金瘡產婦更宜戒之櫻桃杏多食傷筋骨註櫻桃杏味酸性寒若過食則傷筋骨內經云酸則傷筋寒主傷腎故傷筋骨安石榴不可多食損人肺註安石榴味酸濇酸濇則氣滯肺主氣宜利而不宜滯滯則傷損矣故不可過食也胡桃不可多食令人動痰飲集註程林曰胡桃潤肺消痰何以動痰飲因其性熱多食則令人火動煎熬津液而為痰飲矣生棗多食令人熱渴氣脹寒熱羸弱者彌不可食傷人註棗性熱生渴味甘生滿羸弱者內熱必盛脾胃必虛故令人寒熱尤不可食食諸果中毒治之方猪骨煆黑上一味為末水服方寸匕亦治馬肝及漏脯等毒方解以猪骨治果子毒物性相制使然治馬肝毒者以猪畜屬水馬畜屬火此水尅火之義也治漏脯毒者亦骨肉相感之義耳木耳赤色及仰生者勿食菌仰卷者及赤色者不可食註木耳諸菌皆覆卷而生若仰卷而生形色皆異必有毒也故不可食食諸菌中毒悶亂欲死治之方人糞汁飲一升土漿飲一二升大豆濃煮汁飲服諸吐利藥並解集解李彣曰悶亂欲死毒在胃也服吐利藥並解使毒氣上下分消也食楓樹菌而笑不止治之以前方集解李彣曰心主笑笑不止是毒氣入心也以前方治之則解耳誤食野芋煩亂欲死治之以前方集解李彣曰煩出於肺煩亂欲死故知毒氣入肺也亦用前方蜀椒閉口者有毒誤食之戟人咽喉氣病欲絕或吐下白沫身體痹冷急治之方肉桂煎汁飲之多飲涼水一二升或食蒜或濃煮豉飲之並解方解蜀椒味辛辣性熱有毒閉口者其毒更勝如桂與蒜皆大辛大熱之物通血脈辟邪穢以熱治熱是從治之法也冷水清涼解熱地漿得土氣以萬物本乎土亦莫不復歸於土見土則毒已化矣飲豉汁者吐以去其毒也正月勿食蔥令人面生游風註蔥味辛散通陽氣而走頭面食生蔥過於發散故面生游風二月勿食蓼傷人腎註蓼味辛散辛能走腎二月卯木主令腎主閉藏若食之則傷腎故曰勿食三月勿食小蒜傷人志性註蒜辛熱有毒奪氣傷神三月陽氣盛故勿食四月八月勿食胡荽傷人神註胡荽辛温開竅四月陽氣盛八月陰氣斂若食此辛散之味必傷神也五月勿食韭令人乏氣力註韭春食則香夏食則臭是月食之則乏氣力五月五日勿食一切生菜發百病註五月五日天中節是日純陽人當養陽以順時若食生菜是伐天和故百病發焉六月七月勿食茱萸傷神氣註茱萸辛熱走氣六月陽氣盛張七月陰微將斂若食此辛熱之味有傷神氣也八月九月勿食薑傷人神註薑性熱味辛辣八九兩月秋主收斂過於辛散故傷人之神朱子晦庵云秋食薑夭人天年謂其辛走氣瀉肺也十月勿食椒損人心傷人脈註椒性熱味辛辣十月陽氣盡斂若食此辛熱之味必損心傷脈十月勿食被霜生菜令人面無光目濇心痛腰疼或發心瘧瘧發時手足十指爪皆青困萎註道藏云六陰之月萬物至此歸根復命以待來復不可食寒冷生菜性冷經霜則寒若食此是伐天和故有此等證十一月十二月勿食薤令人多涕唾註薤味辛散走肺氣食之令人多涕唾四季勿食生葵令人飲食不化發百病非但食中藥中皆不可用深宜慎之註脾旺寄於四時之季月生葵滑利傷脾若食之則飲食不化而發百病蔥韭初生芽者食之傷人心氣註初生芽者含抑鬱而未透發故食傷心氣飲白酒食生韭令人病增註酒多濕韭性熱濕熱相合令人病增生蔥不可共蜜食之殺人獨顆蒜彌甚註蔥蒜皆不可共蜜食若共食令人利下棗合生蔥食之令人病按此義未詳食糖蜜後四日內食生蔥韭令人心痛註蜜與蔥及韭蒜皆相反雖食蜜後四日內猶忌之若犯令人心痛生蔥和雄雞白犬肉食之令人七竅經年流血集註李彣曰此皆生風發火之物若合食則血氣更淖溢不和故七竅流血夜食諸薑蒜蔥等傷人心註此皆辛熱辣物夜屬陰氣主收斂不宜食而食之則擾陽氣故曰傷人心蕪菁根多食令人氣脹註此言不可過食若過食則動氣而脹也薤不共牛肉作羹食之成瘕病韭亦然註薤韭同牛肉食皆難克化積而不消則成癥瘕蓴多食動痔病註藥性滑有毒滑而易下故發痔病野苣不可同蜜食之作內痔註野苣味苦性寒若同蜜食必成內痔白苣不可共酪同食作䘌蟲註白苣味苦性寒乳酪味甘性熱一寒一熱而成濕濕成則生蟲故曰不可食黃瓜食之發熱病註黃瓜多濕有毒程林曰動寒熱虛熱天行熱病及病後皆不可食葵心不可食傷人葉尤冷黃背赤背赤莖者勿食之註葵心有毒背葉反常亦有毒不可食胡荽久食之令多忘註胡荽辛温開竅久食耗心血故令人多忘病人不可食胡荽及黃花菜註胡荽耗氣黃花菜破氣耗血皆病人忌食芋不可多食動病註芋滯有毒多食則脾困而脹生故戒多食妊娠食薑令子餘指註餘指手多一指也薑形類指物性相感如此蓼多食發心病蓼和生魚食之令人奪氣陰核疼痛集註孫思邈曰食蓼過多有毒發心痛以氣味辛温故也生魚鮓屬合食則相犯奪氣也陰核痛亦濕熱致病耳芥菜不可共兔肉食之成惡邪病註凡物性相反不可同食同食則成惡邪病小蒜多食傷人力註小蒜辛温小毒若多食氣散故傷心力食躁式躁方按食躁式躁之式字當是或字應改之註食躁或躁者卽今之食後時或惡心欲吐不吐之病也故以豉湯吐之豉濃煮汁飲之鉤吻與芹萊相似誤食之殺人解之方註太陰之精名曰鉤吻入口則死葛洪云鉤吻生處無他草莖上有毛薺苨八兩上一味水六升煮取二升温分二服菜中有水莨菪葉圓而光有毒誤食令人狂亂狀如中風或吐血治之方甘草煮汁服之卽解春秋二時龍帶精入芹菜中人偶食之為病發時手青腹滿痛不可忍名蚊龍病治之方硬糖二三斤上一味日兩度服之吐出如蜥蠍三五枚瘥方解芹生陂澤之中蚊龍雖變化莫測其精焉能入此大抵是蜥蜴虺蛇春夏之交遺精於此耳且蛇嗜芹尤為可證按外臺祕要云蚊龍子生在芹上誤食入腹變成龍子飴粳米杏仁乳餅煮粥食之吐出蚊子大驗張機用硬糖治之考本草並無硬糖當是粳米飴糖無疑二物味甘甘能解毒是也食苦瓠中毒治之方黍穰煮汁數服之解註風俗通云燒穰可以殺瓠又云種瓜之家不燒漆物性相畏有如是也人過食苦瓠吐利不止者以黍穰汁解之本諸此扁豆寒熱者不可食之註扁豆性滯而補如患寒熱者忌之久食小豆令人枯燥註小豆卽赤豆也性主利水久食令肌膚枯燥食大豆屑忌噉猪肉註大豆卽黃豆也若同猪肉食之則閉氣故忌之小兒尤當忌之大麥久食令人作㿍集註李彣曰㿍疥同蓋麥入心久食則心氣盛而內熱內經曰諸瘡瘍皆屬心火故作㿍白黍米不可同飴蜜食亦不可合葵食之註黍米多熱多食心煩飴蜜味甘多食中滿食療云黍米同葵食成痼疾物性相反如此荍麥麵多食之令人髮落按此義未詳鹽多食傷人肺註鹽味鹹過食傷肺發嗽哮喘食冷物冰人齒食熱物勿飲冷水註寒熱相摶脾胃乃傷飲酒食生蒼耳令人心痛註酒性純陽蒼耳味苦有毒苦先入心飲酒以行其毒故心痛夏月大醉汗流不得冷水洗著身及使扇卽成病註夏月飲酒汗流則腠理開若浴水及使扇寒風相摶或卽成黃汗或卽成漏風戒之慎之飲酒大醉灸腹背令人腸結註灸家云毋灸大醉人卽此義也醉後勿飽食發寒熱註醉則肝膽之氣肆行木來侮土故曰勿食飽發寒熱飲酒食猪肉臥秫稻穗中則發黃註酒性多濕多熱飲酒食肉則濕熱交蒸於中宮臥秫稻穰中則濕熱困於外故發黃也食飴多飲酒大忌按諺云酒家忌甘此義未詳凡酒及水照見人影動者不可飲之註見此影動者乃怪異也切不可飲之醋合酪食之令人血瘕註酪性黏滯醋性酸收故令成血瘕食白米粥勿食生蒼耳成走注註白米粥蒼耳子同食成走注病然必性味不合也食甜粥已食鹽卽吐註粥甘鹽鹹先食甜已復過食鹽卽吐理必然也犀角箸攪飲食沫出及澆地墳起者食之殺人註抱朴子云犀食百草及眾木之棘故知飲食之毒若攪飲食沫出者必有毒也澆地墳起者此怪異也故食之殺人飲食中毒煩滿治之方苦參三兩苦酒一升半上二味煮三沸三上三下服之吐食出卽瘥方解苦參味苦苦酒味酸酸苦涌泄而去其毒煩滿自除又方犀角湯亦佳註中毒煩滿毒在胃中犀角解胃中毒貪食食多不消心腹堅滿痛治之方鹽一升水三升上二味煮令鹽消分三服當吐出食便瘥方解鹽鹹能軟堅又能涌泄堅滿自除礬石生入腹破人心肝亦禁水註礬性酸濇無故用之傷心肝礬得水則化物性相畏故亦禁水商陸以水服殺人註商陸大毒能行水而忌水服物性相惡而然葶藶子敷頭瘡藥氣入腦殺人註葶藶大寒雖能敷瘡殺蟲然藥氣善能下行則瘡毒亦內攻入腦矣故殺人水銀入人耳及六畜等皆死以金銀著耳邊水銀則吐註水銀大毒入耳則沉經墜絡皆能死人以金銀著耳門引之則吐出此物性感召之理猶磁石之引鍼也苦楝無子者殺人註苦楝有雌雄兩種雄者無子根赤有毒服之使人吐不能止有至死者雌者有子根白有微毒可入藥用凡諸毒多是假毒以投無知時宜煮薺苨甘草汁飲之通除諸毒藥註凡諸毒多借飲食以投毒而服毒之人原自不知若覺之則時時煮甘草薺苨湯飲之以二物能解草石百毒也
