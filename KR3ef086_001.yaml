body:
  text: 卷一傷寒論論傷寒金匱要略論雜病乃仲景全書傷寒論得成無己創註續者五十餘家故得昌明宇內金匱要略人罕言之雖有趙良徐彬等註釋但其文義古奧係千載殘編錯簡頗多疑義闕文亦復不少承譌襲謬隨文蔓衍宜後人視為迂遠束諸高閣今於其失次者序之殘缺者補之博採群書詳加註釋俾二書並行於世庶後之業醫者不為俗說所誤知仲景能治傷寒未嘗不能治雜證也藏府經絡先後病脈證第一夫人秉五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五藏元真通暢人卽安和客氣邪風中人多死千般疢難不越三條一者經絡受邪人藏府為內所因也二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷以此詳之病由都盡若人能養慎不令邪風乾忤經絡適中經絡未流傳府藏卽醫治之四肢才覺重滯卽導引吐納鍼灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱苦酸辛甘不遣形體有衰病則無由人其腠理腠者三焦通會元真之處為血氣所注理者是皮膚藏府之文理也按此篇乃一書之綱領前人誤編為次篇先後失序今冠於首以統大意註五常者五行也五行之氣風暑濕燥寒也五行之味酸苦甘辛鹹也夫人稟此而有其形則藏府日與氣味相通不曰五氣而曰風氣者該他氣而言也蓋風貫四氣猶仁貫四德故曰因風氣而生長也然風氣雖能生萬物亦能害萬物者蓋主氣正風從其所居之鄉而來主長養萬物者也客氣邪風從其衝後而來主殺害萬物者也人在氣交之中其生其害猶水能浮舟亦能覆舟也天之五氣人得之則為五藏真元之氣若通暢相生雖有客氣邪風勿之能害人自安和如不通暢則客氣邪風乘隙而入中人多死然人致死之由雖有千般疢難大要不外三因一者中虛經絡受邪卽入藏府此為內所因也二者中實雖感於邪藏府不受惟外病軀體四肢九竅血脈壅塞此為外所中也三者房室金刃蟲獸所傷非由中外虛實感召其邪是為不內外因也以此三者詳之千般疢難病由悉盡矣若人能慎養形氣不令客氣邪風乾忤經絡卽適中經絡未傳藏府遂醫治之自可愈也四肢九竅才覺重滯尚未閉塞卽導引吐納鍼灸按摩亦可愈也更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱五味各得其宜不使形氣有衰萬病疢難無由而入其腠理矣腠者一身空隙血氣往來之處三焦通會真元之道路也理者皮膚藏府內外井然不亂之條理也按正風者從八方應時而來相生和緩之主氣也邪風者從其衝後而來相尅衝烈之客氣也如時當東風而來西風也所謂後者以已過之時言也集註趙良曰人在氣交中秉地之剛柔以成五藏百骸之形秉天之陰陽以成六經之氣形氣合一神機發用駕行穀氣出入內外同乎天度升降浮沉應夫四時主宰於身形之中謂之元真外感者客氣也靈樞曰虛邪不能獨傷必因身形之虛而後客之蓋天人之氣各有正不正人氣正則不受邪不正則邪乘之天氣正則助其生長不正則害之人氣不正者由七情動中服食不節房欲過度金刃蟲獸傷其氣血盡足以受病也天氣不正者由四時不和八風不常盡足以傷萬物也問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪卽勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經曰虛虛實實補不足損有餘是其義也餘藏準此註此承上條受病三因以明其治也上工良醫也中工常醫也已病已然之病也未病未然之病也假如現在肝病此已然之病也肝病將來傳脾此未然之病也良醫知肝病傳脾見人病肝先審天時衰旺次審脾土虛實時旺脾實則知不受肝邪不須補脾直治已病之肝若時衰脾虛則知肝必傳脾先補未病之脾兼治已病之肝彼常醫不曉四時所勝五藏相傳之理見肝之病惟瀉已病之肝不知補未病之脾也上工不但知肝實必傳脾虛之病而且知肝虛不傳脾虛反受肺邪之病故治肝虛脾虛之病則用酸入肝以補已病之肝用焦苦入心以助不病之心用甘入脾以益不實之脾使火生土使土制水水弱則火旺火旺則制金金被制則木不受邪而肝病自愈矣此亢則害承乃制制則生化化生不病之理隔二隔三之治故曰此治肝補脾之要妙也然肝虛則用此法若肝實則不用此法也中工不曉虛實虛者瀉之是為虛虛實者補之是為實實非其義也上工知其虛實補其不足損其有餘是其義也其餘四藏皆準此法傷字作制字看集註徐彬曰假如肝經之病肝木勝脾土知邪必傳脾經治宜實脾為先此脾未病而先實之所謂治未病也不憂本藏之虛而憂相傳不已其病益深故先以實脾為急務也程林曰經云因其輕而揚之因其重而減之因其衰而彰之所謂因者乘其機也治未病者謂治未病之藏府非治未病之人也見肝之病當先實脾使土旺則能勝水水不行則火盛而制金金不能干木肝自愈矣此治肝補脾治未病之法也高世栻曰實脾專為制水使火盛金衰肝不受制則肝自愈其理甚精微故曰此治肝補脾之要妙也問曰病人有氣色見於面部願聞其說師曰鼻頭色青腹中痛苦冷者死一云腹中冷苦痛者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死其目正圓者痙不治又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲註氣色見於面部而知病之死生者以五氣入鼻藏於五藏其精外榮於面也色者青赤黃白黑也氣者五色之光華也氣色相得者有氣有色平人之色也卽經云青如翠羽赤如雞冠黃如蟹黃白如豚膏黑如烏羽者生也氣色相失者色或淺深氣或顯晦病人之色也卽經云浮澤為外沉濁為內察其浮沉以知淺深察其夭澤以觀成敗察其散搏以知新故視色上下以知病處色粗以明沉夭為甚不明不澤其病不甚也有色無氣者色枯不澤死人之色也卽經云青如藍葉黃如黃土赤如衃血白如枯骨黑如炱者死也鼻者明堂也明堂光澤則無病矣而曰見青色為腹中痛鼻苦冷甚者死黑色為水為勞黃色為上寒下熱小便難面目鮮明內有留飲色白為亡血色赤為熱為風若見於冬為非其時者死目直視正圓不合如魚眼者痙不治此氣色主病之大略也其詳皆載內經師曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病一作痛按頭中病之頭字當是腹字經中從無頭中病之文且文義不屬必是傳寫之譌註病人語聲寂然謂寂然不語也若惡人語是心病也喜驚呼者謂不惡人語且喜驚呼是知其病不在心而在外也故曰骨節間病也病人語聲喑喑然不徹者謂聲不響亮而不了徹也此有礙於息氣故知為心膈間病也病人語聲啾啾然細而長者謂唧唧噥噥小而悠長也因不敢使氣急促動中故知腹中病也師曰息搖肩者心中堅息引胸中上氣者欬息張口短氣者肺痿唾沫註息者一呼一吸也搖肩謂抬肩也心中堅謂胸中壅滿也呼吸之息動形抬肩胸中壅氣上逆者喘病也呼吸引胸中之氣上逆喉中作癢梗氣者欬病也呼吸張口不能續息似喘而不抬肩者短氣病也蓋肺氣壅滿邪有餘之喘也肺氣不續息正不足之短氣也然不足之喘亦有不續息者有餘之短氣亦有胸中壅滿者肺氣上逆者必欬也欬時唾痰嗽也若欬唾涎沫不已者非欬病也乃肺痿也師曰吸而微數其病在中焦實也當下之卽愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治按吸促之促字當是遠字吸遠之遠字當是促字方合病義必傳寫之譌註此承上文言喘分三焦有可治不可治之辨也喘肺病也肺主氣司呼吸故以呼吸氣促謂之喘也若呼吸氣均促是病在呼吸阻升降之氣也故知喘在中焦也呼之氣促吸之氣長病在呼呼出心與肺故知喘在上焦也呼之氣長吸之氣短病在吸吸入腎與肝故知喘在下焦也喘之實者謂邪氣盛則實也中實則必腹滿便硬當下之可治也喘之虛者謂正氣奪則虛也中虛則必腹軟便滋不堪下難治也若喘而呼吸動搖振振不能擎身者則為形氣不相保勿論虛實不治也曰吸而微數數卽促也促卽短也遠卽長也吸不言呼略辭也猶言呼吸均短呼短吸長吸短呼長也師曰寸口脈動者因其王時而動假令肝旺色青四時各隨其色肝色青而反色白非其時色脈皆當病註寸口者統言左右三部脈也脈動法乎四時命乎五藏然必因其旺時而動則為平脈也假令肝旺於春隨其時色當青脈當弦此不病之色脈也若色反白脈反浮此非其時乃病之色脈也四時準此集註尤怡曰旺時當時至而氣旺乃脈乘之而動其色亦應之如肝旺於春脈弦而色青此其常也推之四時無不皆然若色當青而反白為非其時而有是色不特肝病為然卽肺亦當病矣問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得温和以未得甲子天因温和此為未至而至也似得甲子而天未温和此為至而不至也以得甲子而天大寒不解此為至而不去也以得甲子而天温如盛夏五六月時此為至而太過也註冬至之後得甲子日夜半少陽之氣始生天漸温和氣之常也若未得甲子天卽温和此為未至而至也氣未應至而先至者是來氣有餘也已得甲子陽氣漸盛天未温和此為至而不至也氣應至而不至者是來氣不足也若天大寒不解此為至而不去也氣應去而不去者是去氣太過也若天過温如盛夏時此為至而太過也氣應至而甚者是至氣太過也太過者其氣淫則薄其所不勝乘其所勝也不及者其氣迫則所勝妄行所生者受病所不勝薄之也此內經所謂謹候其時氣可與期餘皆倣此師曰病人脈浮者在前其病在表浮者在後其病在裏腰痛背强不能行必短氣而極也註脈浮虛風之候也關前之寸脈浮者病在表也關後之尺脈浮者病在裏也虛風在表故主腰痛背强不能行也虛風在裏故主短氣而極也問曰經云厥陽獨行何謂也師曰此為有陽無陰故稱厥陽註陰陽偕行順也陰陽獨行逆也厥逆也逆陽獨行此為有陽無陰故稱厥陽也集註李彣曰厥陽卽陽厥也內經云陽氣衰於下則為寒厥陰氣衰於下則為熱厥此厥陽獨行有陽無陰之大概也高世栻曰按此為有陽無陰是為厥陽也經曰陰氣衰於下則為熱厥帝曰熱厥何如而然也岐伯曰陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營於四肢也乃腎氣日衰陽氣獨勝此所以為有陽無陰而為厥陽獨行也問曰寸脈沉大而滑沉則為實滑則為氣實氣相搏血氣入藏卽死入府卽愈此為卒厥何謂也師曰脣口青身冷為入藏卽死如身和汗自出為入府卽愈按寸脈沉大而滑沉則為實滑則為氣實氣相搏之十八字文理不順衍文也血氣入藏之血字當是厥字始與卒厥相合必傳寫之譌也註此詳申陽厥陰厥生死之義也厥氣者逆氣也卽逆陽逆陰之氣也氣逆則亂於胸中故忽然眩仆名曰卒厥若脣口青身冷是陰進陽退則為入藏卽死也若身温汗自出是陰消陽長則為入府卽愈也集註沈明宗曰邪氣入藏神明昏憒卒倒無知謂之卒厥若脣口青身冷神機不能出入藏氣垂絕所以主死經曰血氣並走於上則為大厥暴厥是也若身和汗出乃邪氣入府不得出入一時卒倒非藏絕之比頃時陽機外達邪氣隨之外泄故知入府卽愈問曰脈脫入藏卽死入府卽愈何謂也師曰非為一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入裏者卽死註此詳申入藏卽死入府卽愈之義也卒厥之病多脈脫而不見脈脫不見而死者是正氣不反也脈脫不見而生者是邪氣閉而復通也非為厥氣一病百病入藏入府皆然也譬如浸淫癘風等瘡從口起流向四肢可治從四肢流來入口者不可治也蓋以病向外者可治病入裏者難醫亦此義也集註趙良曰脫者去也經脈乃藏府之隧道為邪氣所逼故絕氣脫去其脈而入於內五藏陰也六府陽也陰主死而陽主生所以入藏卽死入府卽愈而可治非惟藏府之陰陽然也凡內外陰陽之邪毒出入表裏者皆然也徐彬曰凡病邪能出陽為淺故生閉陰不出為深故死非止一病百病皆然復以浸淫瘡喻之若從口起而流向四肢者是邪從內發於外泄而不進故可治若從四肢起流入口者是邪由外入於內進而不泄此藏氣傷敗故不可治問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰欬上氣喘噦咽腸鳴脹滿心痛拘急五藏病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中裏䅽飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡按字典無䅽字當是漀字漀音傾側水也後之積聚門䅽氣之䅽字亦誤註此章曰十八曰九十等文乃古醫書之文今不可考難以强釋五勞七傷等說亦詳在千金故不復註也頭痛項腰脊臂腳掣痛病皆在外故為陽病也欬上氣喘噦咽腸鳴脹滿心痛拘急病皆在內故為陰病也清邪居上謂霧邪本乎天也濁邪居下謂濕邪本乎地也六淫天邪故名大邪六淫傷外故曰中表也七情人邪故名小邪七情傷內故曰中裏也䅽飥者飲食也飲食之邪從口而入食傷隔夜不化故名曰宿食也五邪謂風寒濕霧飲食也夫五邪之中人莫不各以類而相從前者早也風中於早從陽類也寒中於暮從陰類也霧邪清輕故傷皮膚濕邪濁重故流關節飲食失節故傷脾胃極寒之食傷經以經屬陰也極熱之食傷絡以絡屬陽也問曰病有急當救裏救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救裏後身體疼痛清便自調者急當救表也註詳見傷寒論太陰篇內不復釋夫病痼疾加以卒病當先治其卒病後乃治其痼疾也註痼疾舊病也卒病新疾也當以舊病為本為緩新疾為標為急急則治標緩則治本故先治卒病後治痼疾也集註趙良曰痼疾病已沉痼非旦夕可取效者卒病謂卒然而來新感之病可取效於旦夕者乘其所入未深急去其邪不使稽留而為患也且痼疾之人正氣素虛邪尤易傳設多瞻顧致令兩邪相合為患不淺故仲景立言於此使後學者知所先後也沈明宗曰此有舊疾復感新邪當分先後治也痼者邪氣堅固難拔卒者邪氣驟來而易去也若病者素有痼疾而忽加卒病務當先治卒病不使邪氣相併轉增舊疾但久病乃非朝夕可除須當緩圖所以後乃治其痼疾也師曰五藏病各有得者愈五藏病各有所惡各隨其所不喜者為病病者素不應食而反暴思之必發熱也註此明五藏各有所得而愈言以情志相勝也卽如怒傷肝得悲而愈此悲勝怒也亦有得之時日而愈者經曰病在肝愈於夏是喜得子氣制其勝我者也夏不愈勝於秋是惡其勝我者得旺氣也秋不死持於冬是我喜得母氣以生我也起於春是喜自得其位而氣旺也餘藏倣此病者云云謂平素不愛食之物及當病之時而反暴思食是病邪藏氣之變故雖思食而食之必發熱也集註程林曰內經云肝色青宜食甘心色赤宜食酸肺色白宜食苦脾色黃宜食酸腎色黑宜食辛此五藏得飲食而愈者肝病愈於丙丁起於甲乙心病愈於戊己起於丙丁脾病愈於庚辛起於戊己肺病愈於壬癸起於庚辛腎病愈於甲乙起於壬癸此五藏自得其位而愈者五藏所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥各隨其所惡而不喜者為病也若病人素不食而暴食之則入於陰長氣於陽必發熱也夫諸病在藏欲攻之當隨其所得而攻之如渴者與猪苓湯餘皆倣此按如渴者之下當有小便不利四字必傳寫之遺也註藏者裏也凡諸病在裏有可攻之證雖欲攻之當隨其所得之輕重而攻之不可卒意而攻之也如渴者小便不利先與猪苓湯利其小便俟小便利乃可攻也餘皆倣此謂他證或有未可遽攻者皆倣此也痙濕暍病脈證并治第二病者身熱足寒頸項强急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗者寒濕相搏其表益虛卽惡寒甚發其汗已其脈如蛇按諸家以剛柔二痙列為首條今以此為第一條者蓋剛柔之辨俱從此條分出痙病之最備者宜冠諸首再痙病也之下若發其汗六句與上文義不屬與後之十一條中為欲解脈如故反伏弦者痙句文義相屬宜分於彼註病人身熱惡寒太陽證也頸項强急面赤目赤陽明證也頭熱陽鬱於上也足寒陰凝於下也太陽之脈循背上頭陽明之筋上挾於口風寒客於二經則有頭搖口噤反張拘强之證矣此皆痙病之形證故首揭之以為要領集註李彣曰手三陽之筋結入於頷頰足陽明之筋上挾於口風寒乘虛入其筋則攣故牙關急而口噤夫痙脈按之緊如弦直上下行註痙之為病其狀勁急强直故其脈亦勁急强直按之緊勁急之象也如弦直行之象也脈經云痙家其脈伏堅直上下註痙家其脈緊弦直上下者以痙病屬太陽表也脈經所云其脈伏堅直上下者以痙病屬陽明裏也蓋痙家原屬二經故有太陽葛根湯汗之陽明大承氣湯下之之治也伏堅沉實也直上下弦直也卽沉實弦直之脈也太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙按反惡寒之反字衍文也玩痙病之條自知當惡寒也註痙病既屬太陽當以太陽虛實例之故曰太陽病發熱無汗惡寒為實邪名曰剛痙者强而有力也發熱汗出不惡寒為虛邪名曰柔痙者强而無力也太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之註此申明剛痙在表以明其治也太陽病為頭項强痛發熱等證也無汗謂傷寒也太陽傷寒小便不當少今反少者是寒氣盛而收引也不當氣上衝胸今氣上衝胸是寒氣盛而上逆也不當口噤不得語今口噤不得語是寒氣盛牙關緊急而甚也以太陽傷寒而有此衝擊勁急之象是欲作剛痙之病也麻黃湯能治太陽而不能治陽明故以葛根湯兼太陽陽明兩經之治為剛痙無汗之正法也痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯註此申痙病入裏以明其治也痙病而更胸滿裏氣壅也臥不著席反張甚也腳攣急勁急甚也必齘齒牙緊甚也此皆陽明熱盛灼筋筋急而甚之象故以大承氣湯直攻其熱非攻陽明之實也其曰可與非盡言其可與有慎重之意大承氣湯方大黃酒洗四兩厚朴炙去皮半斤枳實炙五枚芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一二沸分温再服得下止服太陽病其證備身體强几几然脈反沉遲此為痙栝蔞桂枝湯主之註太陽病其證備謂頭痛項强發熱惡風寒具見也而更身體强有几几然俯仰不能自如之象痙病也但脈反見沉遲太陰之脈非太陽浮緊無汗剛痙者比故不與葛根湯而與栝蔞桂枝湯和太陽之表清太陰之裏也栝蔞桂枝湯方栝蔞根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上六味以水九升煮取三升分温三服取微汗汗不出食頃啜熱粥發之太陽病發熱脈沉而細者名曰痙為難治註發熱太陽病也脈沉細少陰脈也而名曰痙者必有或剛或柔之證見也以太陽痙證而見少陰之脈表裏兼病也夫太陽之邪鬱於外故病發熱少陰之邪凝於內故脈沉細然痙病而見弦緊之脈是為本脈卽或沉遲尚為可治今沉而細邪入少陰陽氣已衰豈易治乎故曰難也夫風病下之則痙復發汗必拘急註以上論痙皆外感風寒濕而為病也亦有因風邪為病不應下而下之傷液不應汗而汗之傷津以致津液枯燥筋失所養而病痙者故曰風病下之則痙復發汗必拘急此不可以外感痙病治之當以專養津液為務也太陽病發汗太多因致痙註此承上文詳申發汗過多成痙之義也太陽病當發汗若發汗太過腠理大開表氣不固邪風乘虛而入因成痙者乃內虛所召入也宜以桂枝加附子湯主之固表温經也由此推之凡病出汗過多新產金瘡破傷出血過多而變生此證者皆其類也暴腹脹大者為欲解脈如故反伏弦者痙按本門首條痙病也之下若發其汗六句當移於此條之首文義始屬此條暴腹脹大者句衍文也當刪之註不但風病發汗過多則痙卽寒濕相摶之病發汗過多亦痙也發汗過多其表益虛表虛則必卽惡寒甚也發寒濕汗後其脈不直緊如蛇之曲緩則為邪退不成痙病為欲解也若脈仍直緊不緩或不直緊反伏堅弦急者為邪不退成痙病矣瘡家雖身疼痛不可發汗汗出則痙註瘡家初起毒熱未成法當汗散已經潰後血氣被傷雖有身痛表證亦不可發汗恐汗出血液愈竭筋失所養因而成痙或邪風乘之亦令痙也痙病有灸瘡難治註痙病宜灸如有灸瘡若不發膿則為營衛已絕故曰難治濕家之為病一身盡疼發熱身色如熏黃也註濕家謂病濕之人濕之為病或因外受濕氣則一身盡痛或因內生濕病則發熱身黃若內外同病則一身盡痛發熱身色如熏黃也濕家之身痛發黃不似傷寒之身痛發黃者以無六經之形證也集註徐彬曰此言全乎濕而久鬱為熱者若濕挾風者風走空竅故痛只在關節今單濕為病則浸淫遍體一身盡痛不止關節矣然濕久而鬱鬱則熱故發熱熱久而氣蒸於皮毛故疼之所至卽濕之所至濕之所至卽熱之所至而色如熏黃者熏火氣也濕為火氣所熏故髮色黃帶黑而不亮也濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈註此申上條詳其義出其脈別其治也濕家病身疼發熱面黃而喘此內生外受之濕病也外宜羌活勝濕湯內宜茵陳五苓散喘甚大陷胸丸若更頭痛鼻塞而煩其脈大證類傷寒但其人裏和能食知非傷寒不可發汗乃頭中寒濕之邪故頭痛鼻塞惟宜納藥鼻中取黃水從涕出而寒濕以泄病可愈也所納之藥如瓜蒂散之類集註魏荔彤曰頭中為諸陽之首非寒濕能犯之地今頭中有寒濕則熱氣挾之上炎非寒濕外邪自能然也有濕熱則內為之主持也熱引濕邪上干清分鼻必為塞故用納鼻藥宣通清氣而病愈矣濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之註濕家外證身痛甚者羌活勝濕湯內證發黃甚者茵陳五苓散若惟身煩痛而不發黃者則為外感寒濕與麻黃加朮湯發其汗寒濕兩解也慎不可以火攻之者謂不可以火劫大發其汗必致變也集註趙良曰濕與寒合令人身疼大法表實成熱則可發汗無熱是陽氣尚微汗之恐虛其表是證雖不云熱而煩以生煩由熱也所以服藥不敢大發其汗且濕亦非暴汗可散用麻黃湯治寒加朮去濕使其微汗耳不可火攻火攻則增其熱必有他變所以戒人慎之喻昌曰麻黃加朮則雖發汗不至多汗而朮得麻黃并可以行表裏之濕不可以火攻者反增發熱也麻黃加朮湯方麻黃去節三兩桂枝去皮二兩甘草炙二兩杏仁去皮尖七十個白朮四兩上五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓温服八合覆取微似汗按桂枝氣味辛甘全在於皮若去皮是枯木矣如何有解肌發汗之功宜刪此二字後倣此太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候小便不利大便反快但當利其小便註此承上條互詳其義謂濕家身痛不可發汗當有利小便之法也太陽病一身關節煩疼若脈浮細者濕在外也當汗之小便不利大便反快脈沉細者濕在內也當利之今濕氣淫於內外故關節煩疼著而不行小便不利大便反快此名濕痹雖有身痛其脈不浮細故不可發汗設脈沉細故但當利小便若小便利濡瀉止痹不愈身仍疼痛汗之可也集註趙良曰痹痛也因其關節煩疼脈沉而細則名曰濕痹也經云濕勝則濡瀉小便不利大便反快者是濕氣內勝也但當先利小便以瀉腹中濕氣故云治濕不利小便非其治也設小便利已而關節之痹不去又必自表治之李彣曰太陽經行身之表外邪皆得傷之故亦受濕氣也關節疼痛者濕留關節也濕氣鬱蒸而生熱故煩也經云沉潛水蓄沉細為內濕脈痹者閉塞不通之謂卽內經濕氣勝者為著痹之意今小便不利是濕盛於內也卽內經濕勝則濡泄也利小便則濕去而瀉煩止矣濕家其人但頭汗出背强欲得被覆向火若下之早則噦或胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也註濕家頭汗出者乃上濕下熱蒸而使然非陽明內實之熱蒸而上越之汗也背强者乃濕邪重著之强非風濕拘急之强也欲覆被向火者乃一時濕盛生寒非傷寒之惡寒也若誤以陽明內濕之熱上越之頭汗而遂下之則濕從寒化卽乘虛入於上則肺氣逆而胸滿入於中則胃不和而為噦入於下則膀胱氣化不行為小便不利舌上白滑如苔者蓋以誤下熱陷丹田有熱也寒聚於上胸中有寒也所以渴欲得水而不能飲由下有熱而生口燥煩由上有寒而不化生津液雖口燥舌乾而不能多飲也濕家下之額上汗出微喘小便利者死下利不止者亦死註此承上條互詳誤下以明濕家頭汗之死證也夫誤下額汗微喘若小便不利是濕家額汗之喘未可言死也今小便反利則知非濕氣上溢乃上脫額汗之喘故曰死若下利不止亦知非濕去之利乃中脫直下之利故曰亦死集註趙良曰此妄下之因而致逆逆則陽自上越陰自下脫其額上汗出微喘者陽之越小便利與下利不止者陰之脫也陰陽離決必死之兆也自此而推之下之雖額上汗出微喘若大小便不利者是陰氣不脫而陽之根猶在也下之雖大小便利設額上無汗與喘是陽氣不越而陰之根猶在也則非離決可以隨其證而治之李瑋西曰前云濕家當利小便以濕氣內瘀小便原自不利宜用藥利之此下後裏虛小便自利液脫而死不可一例概也病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯註病者謂一身盡痛之病人也濕家一身盡痛風濕亦一身盡痛然濕家痛則重著不能轉側風濕痛則輕掣不可屈伸此痛之有別者也濕家發熱早暮不分微甚風濕之熱日晡所必劇蓋以濕無來去而風有休作故名風濕原其由來或為汗出當風或為久傷取冷相合而致則麻黃杏仁薏苡甘草湯發散風濕可與也明矣集註程林曰一身盡疼發熱風濕在表也日晡申時也陽明王於申酉戌土惡濕今為風濕所干當其旺時邪正相搏則反劇也汗亦濕類或汗出當風而成風濕者或勞傷汗出而入冷水者皆成風濕之病也魏荔彤曰痙家非風不成雖有寒亦附於風濕痹無寒不作雖有風亦附於寒此一定之理也麻黃杏仁薏苡甘草湯方麻黃去節湯泡半兩甘草炙一兩薏苡仁半兩杏仁去皮尖炒十枚上銼麻豆大每服四錢水盞半煮八分去滓温服有微汗避風風濕脈浮身重汗出惡風者防己黃耆湯主之註脈浮風也身重濕也寒濕則脈沉風濕則脈浮若浮而汗不出惡風者為實邪可與麻黃杏仁薏苡甘草湯汗之浮而汗出惡風者為虛邪故以防己白朮以去濕黃耆甘草以固表生薑大棗以和營衛也集註趙良曰此證風濕皆從表受之其病在外故脈浮汗出凡身重有肌肉痿而重者有骨痿而重者此之身重乃風濕在皮毛之表故不作疼虛其衛氣而濕著為身重故以黃耆實衛甘草佐之防己去濕白朮佐之然則風濕二邪獨無散風之藥何耶蓋汗多知其風已不留以表虛而風出入乎其間因之惡風爾惟實其衛正氣壯則風自退此不治而治者也尤怡曰風濕在表法當從汗而解乃汗不得發而自出表尚未解而已虛汗解之法不可守矣故不用麻黃出之皮毛之表而用防己驅之肌膚之裏服後如蟲行皮中及腰下如冰皆濕下行之徵也然非耆朮甘草焉能使衛陽復振而驅濕下行哉防己黃耆湯方防己一兩甘草半兩白朮七錢半黃耆去蘆一兩一分上銼麻豆大每抄五錢匕生薑四片大棗一枚水盞半煎八分去滓温服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰以下温令微汗瘥風濕相摶一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也註風濕相摶一身盡痛法當從汗而解而汗亦不可失其宜也值雨淫濕盛之時若發其汗使大出亦不能愈以風氣去濕氣在故不愈然治風濕者必俟其天氣晴明發其汗使微微似欲汗出者則風濕皆去病斯愈矣集註徐彬曰此言風濕當汗解而不可過也謂風濕相摶疼痛原當汗解值天陰雨則濕更甚可汗無疑而不愈何故蓋風性急可驟驅濕性滯當漸解汗大出則驟風去而濕不去故不愈若發之微則出之緩緩則風濕俱去矣然則濕在人身黏滯難去驟汗且不可而況驟下乎故前章曰下之死此但云不愈見用法不當而非誤下比也傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴脈浮虛而濇者桂枝附子湯主之若大便堅小便自利者去桂枝加白朮湯主之註此承上條詳申脈證以明其治也謂此風濕之病雖得之傷寒八九日而不嘔不渴是無傷寒裏病之證也脈浮虛濇是無傷寒表病之脈也脈浮虛表虛風也濇者濕也身體煩疼風也不能轉側濕也乃風濕相摶之身體疼痛非傷寒骨節疼痛也與桂枝附子湯温散其風濕從表而解也若脈浮實者則又當以麻黃加朮湯大發其風濕也如其人有是證雖大便硬小便自利而不議下者以其非邪熱入裏之硬乃風燥濕去之硬故仍以桂枝附子湯去桂枝者以大便堅小便自利不欲其發汗再奪津液也加白朮者以身重著濕在肌分用以佐附子逐水氣於皮中也集註程林曰風淫所勝則身煩疼濕淫所勝則身體難轉側風濕相摶於營衛之間不干於裏故不嘔不渴也脈浮為風濇為濕以其脈近於虛故用桂枝附子湯温經以散風濕小便利者大便必硬桂枝近於解肌恐大汗故去之白朮能去肌濕不妨乎內故加之凡方後有如蟲如醉如冒等狀者皆藥勢將行使然周揚俊曰傷寒至八九日亦云久矣既不傳經復不入府者因風濕持之也所現外證煩疼者風也不能轉側者濕也不嘔不渴者無裏證也其脈浮虛而濇正與相應然後知風濕之邪在肌肉而不在筋節故以桂枝表之不發熱為陽氣素虛故以附子逐濕兩相綰合自不能留矣桂枝附子湯方桂枝去皮四兩附子炮去皮破八片三枚甘草炙二兩生薑切三兩大棗擘十二枚上五味以水六升煮取二升去滓分温三服白朮附子湯方白朮二兩附子炮去皮一枚半甘草炙一兩生薑切一兩半大棗擘六枚上五味以水三升煮取一升去滓分温三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪卽是朮附并走皮中逐水氣未得除故耳風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之註風濕相摶身體煩疼重著不能轉側者濕勝風也今掣痛不可屈伸風勝濕也掣痛不可屈伸近之則痛劇汗出短氣惡風不欲去衣皆風邪壅盛也小便不利濕內蓄也身微腫者濕外摶也以甘草附子湯微汗之祛風為主除濕次之也此上二條皆詳風濕之義以明風濕之治也甘草附子湯方甘草炙二兩附子炮去皮二枚白朮二兩桂枝去皮四兩上四味以水六升煮取三升去滓温服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙方解甘草附子湯卽桂枝附子湯去薑棗加白朮也去薑棗者畏過散也加白朮者燥中濕也日三服初服一升不得汗則仍服一升若得微汗則解解則能食解已徹也可止再服若汗出而復煩者是解未徹仍當服也但不可服一升恐已經汗出而過汗也服五合可也如不解再服六七合為妙似此服法總是示人不可盡劑之意學者宜詳求之太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之註中暑熱病亦由太陽而入故曰太陽中熱者暍是也汗出惡寒身熱而渴頗似太陽温熱之病但温熱無惡寒以熱從裏生故雖汗出而不惡寒也中暍暑邪由表而入故汗出惡寒也究之於脈温熱之浮浮而實中暍之浮浮而虛以暑熱傷氣也究之於渴温熱之渴初病不過欲飲中暍之渴初病卽大引飲也温熱則傳經變病不一中暍則不傳不愈卽死也雖同為太陽經中之病而虛實施治自有不同用白虎加人參湯主之者蓋以益氣為主清暑熱次之也集註李彣曰熱傷氣氣泄則汗出氣虛則惡寒熱蒸肌腠則身熱熱傷津液則作渴此惡寒身熱與傷寒相類然所異者傷寒初起無汗不渴中暍初起卽汗出而渴也白虎加人參湯方知母六兩石膏碎一斤甘草二兩粳米六合人參三兩上五味以水一斗煮米熟湯成去滓温服一升日三服太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身卽熱口開前板齒燥若發其汗則惡寒甚加温鍼則發熱甚數下之則淋甚註此承上文互詳證脈不可妄行汗下也中暍本有汗若發熱無汗身重疼痛者雖證似傷寒然見弦細芤遲虛脈則非傷寒也且有小便己洒洒然惡寒毛聳之狀皆太陽膀胱表氣為暑所傷而畏也手足逆冷者暑傷氣氣不能達四肢則寒也小有勞身卽發熱口開前板齒燥者勞則動熱暑熱益烈傷陰液也此皆中暍危證若以發熱無汗惡寒身痛誤為傷寒之表妄行發汗則表氣愈虛惡寒更甚也若以手足逆冷誤為陽虛妄加温鍼則暑邪愈盛發熱更熾也若以壯熱齒乾誤為胃火而數下之則水源竭濇尿淋窘甚也凡此之證皆中暍妄行汗下温鍼致變以白虎加人參湯主之或人參湯調辰砂六一散亦可也集註程林曰內經云先夏至為病温後夏至為病暑又曰熱病者皆傷寒之類也以其太陽受病與傷寒相似亦令發熱惡寒身重而疼痛也經曰寒傷形暑傷氣氣傷則氣消而脈虛弱所以弦細芤遲也小便已毛聳者陽氣內陷不能衛外手足亦逆冷也勞動則擾乎陽故熱甚則口開口開則前板齒燥也發汗虛其陽則惡寒甚温鍼動火邪則發熱甚下之亡津液則淋甚也太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之註太陽中暍之證身熱而倦者暑也身熱疼重者濕也脈微弱者暑傷氣也以此證脈揆之乃因夏月中暑之人暴貪風涼過飲冷水水氣雖輸行於皮中不得汗瀉所致也此時卽以香薷飲大順散汗之可立愈矣若稍緩水氣既不得外瀉勢必內攻於中而作喘腫脹矣喘則以葶藶大棗湯腫脹則以瓜蒂一物湯下之可也集註周揚俊曰無形之熱傷其肺金則用白虎加人參湯有形之水傷其肺金則用瓜蒂湯各有所主也李彣曰中暍邪在表故身熱傷冷水故身疼中暑傷氣氣虛故脈微弱也瓜蒂治身面四肢浮腫散皮膚中水氣苦以泄之也一物瓜蒂湯方瓜蒂二十個上銼以水一升煮取五合去滓頓服
